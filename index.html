<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактор игры: Лаборатория (Genially)</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&family=Montserrat:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #121212;
            --bg-panel: #1e1e24;
            --neon-purple: #8b5cf6;
            --neon-purple-hover: #7c3aed;
            --text-light: #f3f4f6;
            --border-color: #374151;
            --success: #10b981;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'DM Sans', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Settings */
        .sidebar {
            width: 400px;
            background-color: var(--bg-panel);
            border-right: 1px solid var(--border-color);
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .sidebar h2 {
            margin: 0 0 10px 0;
            font-size: 1.2rem;
            border-bottom: 2px solid var(--neon-purple);
            padding-bottom: 5px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-bottom: 15px;
        }

        .form-group label {
            font-size: 0.9rem;
            color: #9ca3af;
        }

        input, select, button {
            background-color: var(--bg-dark);
            color: var(--text-light);
            border: 1px solid var(--border-color);
            padding: 10px;
            border-radius: 8px;
            font-family: inherit;
        }

        input[type="color"] {
            padding: 2px;
            height: 40px;
            width: 100%;
        }

        button {
            background-color: var(--border-color);
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
        }

        button:hover {
            background-color: #4b5563;
        }

        .btn-primary {
            background-color: var(--neon-purple);
            border-color: var(--neon-purple);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--neon-purple-hover);
        }

        /* Player & Task Cards */
        .card {
            background-color: #2a2a35;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 1px solid var(--border-color);
        }

        /* Main Preview Area */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .preview-container {
            flex: 1;
            background-color: #000;
            border: 2px solid var(--neon-purple);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .generate-btn {
            padding: 12px 24px;
            font-size: 1.1rem;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            background-color: var(--neon-purple);
            color: white;
            transition: 0.3s;
        }
        .generate-btn.success {
            background-color: var(--success);
        }
    </style>
</head>
<body>

    <!-- SIDEBAR WITH SETTINGS -->
    <div class="sidebar">
        <h2>Общие настройки</h2>
        
        <div class="form-group">
            <label>Язык игры</label>
            <select id="lang" onchange="updatePreview()">
                <option value="ru">Русский</option>
                <option value="en">English</option>
            </select>
        </div>

        <div class="form-group">
            <label>Шрифт</label>
            <select id="fontFamily" onchange="updatePreview()">
                <option value="DM Sans">DM Sans</option>
                <option value="Montserrat">Montserrat</option>
                <option value="Roboto">Roboto</option>
            </select>
        </div>

        <div class="form-group">
            <label>Очки для победы (полная колба)</label>
            <input type="number" id="maxScore" value="5" min="1" onchange="updatePreview()">
        </div>

        <div class="form-group">
            <label>Цвет жидкости</label>
            <input type="color" id="liquidColor" value="#00ffcc" onchange="updatePreview()">
        </div>

        <div class="form-group">
            <label>Фон игры (URL или Файл)</label>
            <input type="text" id="bgUrl" placeholder="Ссылка на картинку" onchange="updatePreview()">
            <input type="file" accept="image/*" onchange="handleFileUpload(event, 'bgUrl')">
        </div>

        <div class="form-group">
            <label>Размер аватаров (%)</label>
            <input type="range" id="avatarSize" min="50" max="150" value="100" onchange="updatePreview()">
        </div>

        <h2>Игроки (Аватары)</h2>
        <div id="playersList"></div>
        <button onclick="addPlayer()">+ Добавить игрока (до 4)</button>

        <h2>Задания (Вопросы)</h2>
        <div id="tasksList"></div>
        <button onclick="addTask()">+ Добавить вопрос</button>
    </div>

    <!-- MAIN AREA -->
    <div class="main-content">
        <div class="header">
            <h2>Предпросмотр игры</h2>
            <button id="generateBtn" class="generate-btn" onclick="generateCode()">Сгенерировать код</button>
        </div>
        <div class="preview-container">
            <iframe id="previewFrame"></iframe>
        </div>
    </div>

    <script>
        // State
        let config = {
            players: [],
            tasks: []
        };

        // Initialize default
        window.onload = () => {
            addPlayer('Игрок 1', 'https://cdn-icons-png.flaticon.com/512/4140/4140048.png');
            addPlayer('Игрок 2', 'https://cdn-icons-png.flaticon.com/512/4140/4140047.png');
            addTask('Сколько будет 2+2?', ['3', '4', '5'], 1);
            updatePreview();
        };

        function addPlayer(name = '', url = '') {
            if (config.players.length >= 4) return alert("Максимум 4 игрока!");
            let id = Date.now();
            config.players.push({ id, name, url });
            renderPlayers();
            updatePreview();
        }

        function removePlayer(id) {
            config.players = config.players.filter(p => p.id !== id);
            renderPlayers();
            updatePreview();
        }

        function addTask(q = '', options = ['', '', ''], correctIdx = 0) {
            let id = Date.now();
            config.tasks.push({ id, question: q, options, correctIdx });
            renderTasks();
            updatePreview();
        }

        function removeTask(id) {
            config.tasks = config.tasks.filter(t => t.id !== id);
            renderTasks();
            updatePreview();
        }

        function handleFileUpload(event, targetId) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    // Convert to base64
                    document.getElementById(targetId).value = e.target.result;
                    if(targetId.startsWith('p_url_')) {
                        let pid = parseInt(targetId.split('_')[2]);
                        let player = config.players.find(p => p.id === pid);
                        if(player) player.url = e.target.result;
                    }
                    updatePreview();
                };
                reader.readAsDataURL(file);
            }
        }

        function renderPlayers() {
            const container = document.getElementById('playersList');
            container.innerHTML = '';
            config.players.forEach((p, idx) => {
                container.innerHTML += `
                    <div class="card">
                        <div class="form-group">
                            <input type="text" placeholder="Имя" value="${p.name}" onchange="config.players[${idx}].name=this.value; updatePreview()">
                            <input type="text" id="p_url_${p.id}" placeholder="URL Аватара" value="${p.url}" onchange="config.players[${idx}].url=this.value; updatePreview()">
                            <input type="file" accept="image/*" onchange="handleFileUpload(event, 'p_url_${p.id}')">
                            <button onclick="removePlayer(${p.id})" style="background:#ef4444; color:white; margin-top:5px;">Удалить</button>
                        </div>
                    </div>`;
            });
        }

        function renderTasks() {
            const container = document.getElementById('tasksList');
            container.innerHTML = '';
            config.tasks.forEach((t, idx) => {
                let optionsHTML = t.options.map((opt, oIdx) => `
                    <div style="display:flex; gap:5px; margin-top:5px;">
                        <input type="radio" name="correct_${t.id}" ${t.correctIdx === oIdx ? 'checked' : ''} onchange="config.tasks[${idx}].correctIdx=${oIdx}; updatePreview()">
                        <input type="text" placeholder="Вариант ${oIdx+1}" value="${opt}" onchange="config.tasks[${idx}].options[${oIdx}]=this.value; updatePreview()">
                    </div>
                `).join('');

                container.innerHTML += `
                    <div class="card">
                        <input type="text" placeholder="Текст вопроса" value="${t.question}" onchange="config.tasks[${idx}].question=this.value; updatePreview()" style="width:calc(100% - 20px);">
                        ${optionsHTML}
                        <button onclick="removeTask(${t.id})" style="background:#ef4444; color:white; margin-top:10px;">Удалить</button>
                    </div>`;
            });
        }

        // --- GAME ENGINE TEMPLATE ---
        function getGameHTML() {
            const lang = document.getElementById('lang').value;
            const bgUrl = document.getElementById('bgUrl').value || 'https://images.unsplash.com/photo-1532094349884-543bc11b234d?auto=format&fit=crop&q=80&w=1000';
            const liquidColor = document.getElementById('liquidColor').value;
            const maxScore = document.getElementById('maxScore').value;
            const fontFamily = document.getElementById('fontFamily').value;
            const avatarSize = document.getElementById('avatarSize').value;
            
            const txt = lang === 'ru' ? { ready: 'ИГРАТЬ', check: 'ПРОВЕРИТЬ', win: 'ПОБЕДА!', next: 'Следующий ход' } 
                                      : { ready: 'READY', check: 'CHECK', win: 'WINNER!', next: 'Next Turn' };

            // Inject state into the game
            const gameState = {
                players: config.players,
                tasks: config.tasks,
                maxScore: parseInt(maxScore),
                txt: txt
            };

            return `
<!DOCTYPE html>
<html lang="${lang}">
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=${fontFamily.replace(' ', '+')}&display=swap');
        
        * { box-sizing: border-box; font-family: '${fontFamily}', sans-serif; }
        body { 
            margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden;
            background: url('${bgUrl}') no-repeat center center/cover;
            display: flex; flex-direction: column; justify-content: flex-end; align-items: center;
        }
        .overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); pointer-events: none; z-index: 1;}
        
        .players-container {
            display: flex; gap: 40px; margin-bottom: 50px; z-index: 2; position: relative;
        }
        
        .player-wrap {
            display: flex; flex-direction: column; align-items: center; position: relative;
            transition: 0.3s; opacity: 0.5;
        }
        
        .player-wrap.active {
            opacity: 1;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); filter: drop-shadow(0 0 10px rgba(139, 92, 246, 0.5)); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 20px rgba(139, 92, 246, 1)); }
            100% { transform: scale(1); filter: drop-shadow(0 0 10px rgba(139, 92, 246, 0.5)); }
        }

        .ready-btn {
            position: absolute; top: -180px;
            background: #8b5cf6; color: white; border: none; padding: 10px 20px;
            border-radius: 8px; font-weight: bold; cursor: pointer;
            box-shadow: 0 0 15px #8b5cf6; display: none; z-index: 5;
        }
        
        .player-wrap.active .ready-btn { display: block; }
        .ready-btn:hover { background: #7c3aed; }

        .flask {
            width: 40px; height: 120px; border: 3px solid rgba(255,255,255,0.7);
            border-radius: 0 0 20px 20px; position: absolute; top: -140px;
            overflow: hidden; background: rgba(0,0,0,0.5);
            display: flex; align-items: flex-end;
        }
        
        .liquid {
            width: 100%; background: ${liquidColor}; transition: height 0.5s ease;
            box-shadow: 0 0 10px ${liquidColor};
        }

        .avatar {
            width: calc(100px * ${avatarSize/100}); 
            height: calc(100px * ${avatarSize/100}); 
            border-radius: 16px; object-fit: cover;
            border: 2px solid white; background: #2a2a35;
        }

        .name { color: white; margin-top: 10px; font-weight: bold; background: rgba(0,0,0,0.7); padding: 5px 10px; border-radius: 5px;}

        /* Modal Task */
        .modal-bg {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.8); z-index: 10; justify-content: center; align-items: center;
        }
        
        .modal {
            background: #121212; border: 2px solid #8b5cf6; border-radius: 20px;
            padding: 40px; width: 80%; max-width: 600px; text-align: center;
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.5); color: white;
        }

        .question { font-size: 1.5rem; margin-bottom: 30px; }
        
        .options { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; }
        
        .option-btn {
            background: transparent; color: white; border: 2px solid #374151;
            padding: 15px 30px; border-radius: 10px; cursor: pointer;
            transition: 0.2s; font-size: 1.1rem; width: 45%;
        }
        
        .option-btn:hover { border-color: #8b5cf6; }
        .option-btn.selected { background: rgba(139, 92, 246, 0.3); border-color: #8b5cf6; }
        
        .check-btn {
            margin-top: 30px; background: #8b5cf6; color: white; border: none;
            padding: 15px 40px; font-size: 1.2rem; border-radius: 10px; cursor: pointer;
        }

        /* Winner Screen */
        .winner-screen {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.9); z-index: 20; flex-direction: column;
            justify-content: center; align-items: center; color: white;
        }
        .winner-screen h1 { font-size: 4rem; color: ${liquidColor}; text-shadow: 0 0 20px ${liquidColor}; }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="players-container" id="pc"></div>

    <!-- Modal -->
    <div class="modal-bg" id="modalBg">
        <div class="modal">
            <div class="question" id="qText"></div>
            <div class="options" id="optsDiv"></div>
            <button class="check-btn" id="checkBtn" onclick="checkAnswer()">${txt.check}</button>
        </div>
    </div>

    <!-- Winner -->
    <div class="winner-screen" id="winnerScreen">
        <h1>${txt.win}</h1>
        <img id="winnerAvatar" style="width:200px; border-radius:20px; border: 4px solid ${liquidColor};">
        <h2 id="winnerName"></h2>
    </div>

    <script>
        const state = ${JSON.stringify(gameState)};
        let currentPlayer = 0;
        let scores = Array(state.players.length).fill(0);
        let currentTaskIdx = 0;
        let selectedOption = null;

        function init() {
            if(state.players.length === 0) return;
            const pc = document.getElementById('pc');
            pc.innerHTML = state.players.map((p, i) => \`
                <div class="player-wrap \${i === 0 ? 'active' : ''}" id="p\${i}">
                    <button class="ready-btn" onclick="openTask()">\${state.txt.ready}</button>
                    <div class="flask">
                        <div class="liquid" id="liq\${i}" style="height: 0%;"></div>
                    </div>
                    <img src="\${p.url}" class="avatar">
                    <div class="name">\${p.name}</div>
                </div>
            \`).join('');
        }

        function openTask() {
            if(state.tasks.length === 0) return alert("Нет заданий!");
            
            // Randomize or sequence task
            currentTaskIdx = Math.floor(Math.random() * state.tasks.length);
            const task = state.tasks[currentTaskIdx];
            
            document.getElementById('qText').innerText = task.question;
            const optsDiv = document.getElementById('optsDiv');
            optsDiv.innerHTML = task.options.map((opt, i) => 
                \`<button class="option-btn" onclick="selectOpt(\${i}, this)">\${opt}</button>\`
            ).join('');
            
            selectedOption = null;
            document.getElementById('modalBg').style.display = 'flex';
        }

        function selectOpt(idx, el) {
            selectedOption = idx;
            document.querySelectorAll('.option-btn').forEach(btn => btn.classList.remove('selected'));
            el.classList.add('selected');
        }

        function checkAnswer() {
            if(selectedOption === null) return;
            const task = state.tasks[currentTaskIdx];
            
            if(selectedOption === task.correctIdx) {
                scores[currentPlayer]++;
                const pcn = (scores[currentPlayer] / state.maxScore) * 100;
                document.getElementById('liq'+currentPlayer).style.height = pcn + '%';
                
                if(scores[currentPlayer] >= state.maxScore) {
                    showWinner();
                    return;
                }
            }
            
            document.getElementById('modalBg').style.display = 'none';
            nextTurn();
        }

        function nextTurn() {
            document.getElementById('p'+currentPlayer).classList.remove('active');
            currentPlayer = (currentPlayer + 1) % state.players.length;
            document.getElementById('p'+currentPlayer).classList.add('active');
        }

        function showWinner() {
            document.getElementById('modalBg').style.display = 'none';
            document.getElementById('winnerScreen').style.display = 'flex';
            document.getElementById('winnerAvatar').src = state.players[currentPlayer].url;
            document.getElementById('winnerName').innerText = state.players[currentPlayer].name;
        }

        window.onload = init;
    <\/script>
</body>
</html>`;
        }

        function updatePreview() {
            const html = getGameHTML();
            const iframe = document.getElementById('previewFrame');
            iframe.srcdoc = html;
        }

        function generateCode() {
            const html = getGameHTML();
            const btn = document.getElementById('generateBtn');
            
            navigator.clipboard.writeText(html).then(() => {
                btn.textContent = "Скопировано!";
                btn.classList.add('success');
                
                setTimeout(() => {
                    btn.textContent = "Сгенерировать код";
                    btn.classList.remove('success');
                }, 2000);
            }).catch(err => {
                alert("Ошибка копирования. Скопируйте код вручную из консоли.");
                console.log(html);
            });
        }
    </script>
</body>
</html>
