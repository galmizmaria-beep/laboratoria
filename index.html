<!DOCTYPE html>
<html lang="${lang}">
<head>
    <meta charset="UTF-8">
    <title>Game Genially</title> <!-- Добавлен заголовок для ясности -->
    <style>
        /*
         * ИСПРАВЛЕНИЯ ДЛЯ GENIALLY:
         * 1. Убедитесь, что html и body полностью занимают доступное пространство iframe.
         * 2. Все содержимое игры обернуто в div#game-container для лучшей инкапсуляции и контроля размеров.
         * 3. #game-container занимает 100% ширины и высоты, используя absolute positioning для надежности.
         * 4. Фон и основные стили (шрифт, flexbox) применены к #game-container.
         * 5. Более надежный стек системных шрифтов на случай блокировки внешних шрифтов Genially.
         * 6. Убедитесь, что все URL (bgUrl, аватары) доступны публично и не блокируются CSP Genially.
         * 7. Избегайте слишком длинных Base64 строк для изображений, так как Genially может обрезать код.
         */
        
        /* Сброс стандартных отступов и установка 100% размера для html и body */
        html, body { 
            margin: 0; padding: 0; 
            width: 100%; height: 100%; 
            overflow: hidden; /* Важно, чтобы избежать прокрутки внутри iframe Genially */
            box-sizing: border-box; /* Важно для корректного расчета размеров */
        }
        
        /* Главный контейнер игры - ВСЁ содержимое игры находится внутри него */
        #game-container {
            position: absolute; /* Абсолютное позиционирование для перекрытия любых внешних стилей */
            top: 0; left: 0;
            width: 100%; 
            height: 100%;
            
            /* Фон теперь применяется к этому контейнеру */
            background: url('${bgUrl}') no-repeat center center/cover;
            
            /* Flexbox-свойства для выравнивания содержимого */
            display: flex; 
            flex-direction: column; 
            justify-content: flex-end; /* Выравнивает элементы внизу */
            align-items: center;
            
            /* Шрифт и базовый размер для масштабирования внутри контейнера */
            font-family: '${fontFamily}', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen-Sans, Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
            font-size: 1.6vmin; /* Базовый размер шрифта, масштабируется по наименьшей стороне области просмотра iframe */
            color: white; /* Базовый цвет текста */
            box-sizing: border-box; /* Все элементы внутри наследуют этот box-sizing */
            z-index: 0; /* Убедимся, что контейнер находится под overlay */
        }

        /* Наследуем box-sizing для всех элементов внутри контейнера */
        #game-container *, #game-container *::before, #game-container *::after {
            box-sizing: inherit; 
        }

        /* Overlay теперь позиционируется относительно #game-container */
        .overlay { 
            position: absolute; top:0; left:0; width:100%; height:100%; 
            background: rgba(0,0,0,0.6); pointer-events: none; z-index: 1;
        }
        
        .players-container {
            display: flex; gap: 4vmin;
            margin-bottom: 6vmin;
            z-index: 2; position: relative;
        }
        
        .player-wrap {
            display: flex; flex-direction: column; align-items: center; position: relative;
            transition: 0.3s; opacity: 0.5;
        }
        
        .player-wrap.active {
            opacity: 1;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); filter: drop-shadow(0 0 1vmin rgba(139, 92, 246, 0.5)); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 2vmin rgba(139, 92, 246, 1)); }
            100% { transform: scale(1); filter: drop-shadow(0 0 1vmin rgba(139, 92, 246, 0.5)); }
        }

        .ready-btn {
            position: absolute; top: -20vmin;
            background: #8b5cf6; color: white; border: none;
            padding: 1.5vmin 3vmin;
            border-radius: 1vmin;
            font-weight: bold; cursor: pointer;
            box-shadow: 0 0 1.5vmin #8b5cf6; display: none; z-index: 5;
            font-size: 1em; /* Размер шрифта относительно родителя (game-container) */
        }
        
        .player-wrap.active .ready-btn { display: block; }
        .ready-btn:hover { background: #7c3aed; }

        .flask {
            width: 5vmin;
            height: 15vmin;
            border: 0.4vmin solid rgba(255,255,255,0.7);
            border-radius: 0 0 2.5vmin 2.5vmin; position: absolute; top: -17vmin;
            overflow: hidden; background: rgba(0,0,0,0.5);
            display: flex; align-items: flex-end;
        }
        
        .liquid {
            width: 100%; background: ${liquidColor}; transition: height 0.5s ease;
            box-shadow: 0 0 1vmin ${liquidColor};
        }

        .avatar {
            width: calc(10vmin * ${avatarSize/100}); 
            height: calc(10vmin * ${avatarSize/100}); 
            border-radius: 2vmin;
            object-fit: cover;
            border: 0.3vmin solid white;
            background: #2a2a35;
        }

        .name { color: white; margin-top: 1vmin; font-weight: bold; background: rgba(0,0,0,0.7); padding: 0.5vmin 1vmin; border-radius: 0.5vmin; font-size: 1em;}

        /* Modal Task */
        .modal-bg {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.8); z-index: 10; justify-content: center; align-items: center;
        }
        
        .modal {
            background: #121212; border: 0.4vmin solid #8b5cf6;
            border-radius: 2vmin;
            padding: 4vmin;
            width: 80%; max-width: 600px; text-align: center;
            box-shadow: 0 0 3vmin rgba(139, 92, 246, 0.5); color: white;
        }

        .question { font-size: 1.5em; margin-bottom: 3vmin; }
        
        .options { display: flex; flex-wrap: wrap; gap: 1.5vmin; justify-content: center; }
        
        .option-btn {
            background: transparent; color: white; border: 0.2vmin solid #374151;
            padding: 1.5vmin 3vmin;
            border-radius: 1vmin;
            cursor: pointer;
            transition: 0.2s; font-size: 1.1em;
            width: 45%;
        }
        
        .option-btn:hover { border-color: #8b5cf6; }
        .option-btn.selected { background: rgba(139, 92, 246, 0.3); border-color: #8b5cf6; }
        
        .check-btn {
            margin-top: 3vmin; background: #8b5cf6; color: white; border: none;
            padding: 1.5vmin 4vmin; font-size: 1.2em; border-radius: 1vmin; cursor: pointer;
        }

        /* Winner Screen */
        .winner-screen {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.9); z-index: 20; flex-direction: column;
            justify-content: center; align-items: center; color: white;
            font-size: 1em;
        }
        .winner-screen h1 { font-size: 4em; color: ${liquidColor}; text-shadow: 0 0 2vmin ${liquidColor}; margin-bottom: 2vmin;}
        .winner-screen img {
            width:25vmin;
            height:25vmin;
            border-radius:2vmin;
            border: 0.5vmin solid ${liquidColor};
            object-fit: cover;
        }
        .winner-screen h2 { font-size: 2em; margin-top: 2vmin; }
    </style>
</head>
<body>
    <div id="game-container"> <!-- ВЕСЬ КОНТЕНТ ИГРЫ ТЕПЕРЬ ВНУТРИ ЭТОГО ДИВА -->
        <div class="overlay"></div>
        <div class="players-container" id="pc"></div>

        <!-- Modal -->
        <div class="modal-bg" id="modalBg">
            <div class="modal">
                <div class="question" id="qText"></div>
                <div class="options" id="optsDiv"></div>
                <button class="check-btn" id="checkBtn" onclick="checkAnswer()">${txt.check}</button>
            </div>
        </div>

        <!-- Winner -->
        <div class="winner-screen" id="winnerScreen">
            <h1>${txt.win}</h1>
            <img id="winnerAvatar">
            <h2 id="winnerName"></h2>
        </div>
    </div> <!-- КОНЕЦ #game-container -->

    <script>
        // ИНЖЕКТИРОВАННЫЙ ОБЪЕКТ СОСТОЯНИЯ. Убедитесь, что он не слишком большой!
        const state = ${JSON.stringify(gameState)};
        let currentPlayer = 0;
        let scores = Array(state.players.length).fill(0);
        let currentTaskIdx = 0;
        let selectedOption = null;

        // Добавлена проверка на корректность состояния игры при загрузке
        if (!state || !Array.isArray(state.players) || state.players.length === 0 || !Array.isArray(state.tasks) || state.tasks.length === 0) {
            console.error("Game State is invalid or empty. Please check the injected 'gameState' object.");
            // Отобразить сообщение об ошибке пользователю, если данные критически неверны
            const gameContainer = document.getElementById('game-container');
            if (gameContainer) {
                gameContainer.innerHTML = '<div style="text-align: center; margin-top: 20%; font-size: 2em; color: #f00;">Ошибка загрузки игры: Некорректные данные.</div>';
                gameContainer.style.background = '#333'; // Темный фон для сообщения
            }
        } else {
            console.log("Game State loaded successfully:", state);
            window.onload = init; // Вызываем init только если состояние валидно
        }

        function init() {
            if (!state || !Array.isArray(state.players) || state.players.length === 0) {
                console.error("Initialization failed: No players found in state. Skipping player rendering.");
                return;
            }
            const pc = document.getElementById('pc');
            if (pc) {
                pc.innerHTML = state.players.map((p, i) => \`
                    <div class="player-wrap \${i === 0 ? 'active' : ''}" id="p\${i}">
                        <button class="ready-btn" onclick="openTask()">\${state.txt.ready || 'Готов!'}</button>
                        <div class="flask">
                            <div class="liquid" id="liq\${i}" style="height: 0%;"></div>
                        </div>
                        <img src="\${p.url}" class="avatar">
                        <div class="name">\${p.name}</div>
                    </div>
                \`).join('');
            } else {
                console.error("Player container element 'pc' not found.");
            }
        }

        function openTask() {
            if(state.tasks.length === 0) {
                alert("${txt.no_tasks || 'Нет заданий!'}" ); 
                console.error("No tasks available in gameState.");
                return;
            }
            
            currentTaskIdx = Math.floor(Math.random() * state.tasks.length);
            const task = state.tasks[currentTaskIdx];
            
            document.getElementById('qText').innerText = task.question;
            const optsDiv = document.getElementById('optsDiv');
            optsDiv.innerHTML = task.options.map((opt, i) => 
                \`<button class="option-btn" onclick="selectOpt(\${i}, this)">\${opt}</button>\`
            ).join('');
            
            selectedOption = null;
            document.querySelectorAll('.option-btn').forEach(btn => btn.classList.remove('selected'));
            document.getElementById('modalBg').style.display = 'flex';
        }

        function selectOpt(idx, el) {
            selectedOption = idx;
            document.querySelectorAll('.option-btn').forEach(btn => btn.classList.remove('selected'));
            el.classList.add('selected');
        }

        function checkAnswer() {
            if(selectedOption === null) return;
            const task = state.tasks[currentTaskIdx];
            
            if(selectedOption === task.correctIdx) {
                scores[currentPlayer]++;
                const pcn = (scores[currentPlayer] / state.maxScore) * 100;
                document.getElementById('liq'+currentPlayer).style.height = pcn + '%';
                
                if(scores[currentPlayer] >= state.maxScore) {
                    showWinner();
                    return;
                }
            }
            
            document.getElementById('modalBg').style.display = 'none';
            nextTurn();
        }

        function nextTurn() {
            document.getElementById('p'+currentPlayer).classList.remove('active');
            currentPlayer = (currentPlayer + 1) % state.players.length;
            document.getElementById('p'+currentPlayer).classList.add('active');
        }

        function showWinner() {
            document.getElementById('modalBg').style.display = 'none';
            document.getElementById('winnerScreen').style.display = 'flex';
            document.getElementById('winnerAvatar').src = state.players[currentPlayer].url;
            document.getElementById('winnerName').innerText = state.players[currentPlayer].name;
        }
    <\/script>
</body>
</html>
