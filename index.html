<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Редактор игры: Лаборатория (Genially)</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&family=Montserrat:wght@400;700;800&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep-space: #0b0616;
            --bg-panel: rgba(26, 15, 46, 0.9);
            --bg-card: #1d1033;
            --neon-purple: #9d4edd;
            --neon-purple-hover: #b975f8;
            --neon-blue: #00f5ff;
            --text-light: #eaddf8;
            --text-muted: #9f8bb3;
            --border-color: #3b2266;
            --success: #10b981;
            --danger: #ef4444;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'DM Sans', sans-serif;
            background: radial-gradient(circle at 50% 0%, #29124f 0%, #0b0616 80%);
            color: #eaddf8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #app-container {
            width: 100vw;
            max-width: calc(100vh * (16 / 9));
            height: 100vh;
            max-height: calc(100vw * (9 / 16));
            display: flex;
            background: var(--bg-panel);
            backdrop-filter: blur(15px);
            box-shadow: 0 0 50px rgba(157, 78, 221, 0.15);
            overflow: hidden;
            border: 1px solid rgba(157, 78, 221, 0.2);
        }

        .sidebar {
            width: 35%;
            max-width: 450px;
            background-color: transparent;
            border-right: 1px solid var(--border-color);
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .sidebar::-webkit-scrollbar { width: 6px; }
        .sidebar::-webkit-scrollbar-track { background: #0b0616; }
        .sidebar::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }
        .sidebar::-webkit-scrollbar-thumb:hover { background: var(--neon-purple); }

        .sidebar h2 {
            margin: 0 0 10px 0;
            font-size: 1.3rem;
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid var(--neon-purple);
            padding-bottom: 8px;
            box-shadow: 0 5px 15px -10px var(--neon-purple);
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 15px;
        }

        .form-group label {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, select, button {
            background-color: var(--bg-card);
            color: var(--text-light);
            border: 1px solid var(--border-color);
            padding: 12px 15px;
            border-radius: 12px;
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--neon-purple);
            box-shadow: 0 0 10px rgba(157, 78, 221, 0.3);
            background-color: rgba(29, 16, 51, 0.8);
        }

        input[type="color"] { padding: 2px 5px; height: 45px; width: 100%; cursor: pointer; }
        input[type="range"] { padding: 0; accent-color: var(--neon-purple); }

        button {
            background-color: rgba(157, 78, 221, 0.1);
            color: var(--neon-purple);
            border: 1px solid var(--neon-purple);
            cursor: pointer;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 30px;
        }

        button:hover {
            background-color: var(--neon-purple);
            color: #fff;
            box-shadow: 0 0 15px rgba(157, 78, 221, 0.5);
        }

        .card {
            background-color: var(--bg-card);
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 15px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .card button {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border-color: var(--danger);
            font-size: 0.8rem;
            padding: 8px 12px;
            margin-top: 10px;
        }
        
        .card button:hover { background: var(--danger); color: white; box-shadow: 0 0 10px rgba(239, 68, 68, 0.4); }
        .card input[type="radio"] { accent-color: var(--neon-blue); width: 20px; height: 20px; margin-top: 10px; }
        
        .info-message { font-size: 0.75rem; color: var(--text-muted); margin-top: -10px; margin-bottom: 10px; text-align: center; }

        .main-content { flex: 1; display: flex; flex-direction: column; padding: 25px; background: transparent; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header h2 { margin: 0; font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 1.8rem; color: #fff; }

        .preview-container {
            flex: 1; background-color: #000;
            border: 2px solid var(--border-color);
            border-radius: 20px; overflow: hidden; position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        iframe { width: 100%; height: 100%; border: none; }

        .generate-btn {
            padding: 12px 30px; font-size: 1rem; background-color: var(--neon-purple);
            color: white; border-color: var(--neon-purple); box-shadow: 0 0 15px rgba(157, 78, 221, 0.4);
        }
        .generate-btn:hover { background-color: var(--neon-purple-hover); box-shadow: 0 0 25px rgba(157, 78, 221, 0.6); transform: translateY(-2px); }
        .generate-btn.success { background-color: var(--success); border-color: var(--success); box-shadow: 0 0 15px rgba(16, 185, 129, 0.5); color: white; }
    </style>
</head>
<body>

    <div id="app-container">
        <!-- SIDEBAR WITH SETTINGS -->
        <div class="sidebar">
            <h2>Общие настройки</h2>
            
            <div class="form-group">
                <label>Язык игры</label>
                <select id="lang" onchange="updatePreview()">
                    <option value="ru">Русский</option>
                    <option value="en">English</option>
                </select>
            </div>

            <div class="form-group">
                <label>Шрифт</label>
                <select id="fontFamily" onchange="updatePreview()">
                    <option value="DM Sans">DM Sans</option>
                    <option value="Montserrat">Montserrat</option>
                    <option value="Roboto">Roboto</option>
                </select>
            </div>

            <div class="form-group">
                <label>Очки для победы</label>
                <input type="number" id="maxScore" value="5" min="1" onchange="updatePreview()">
            </div>

            <div class="form-group">
                <label>Цвет жидкости</label>
                <input type="color" id="liquidColor" value="#00f5ff" onchange="updatePreview()">
            </div>

            <div class="form-group">
                <label>Фон игры (URL)</label>
                <input type="text" id="bgUrl" placeholder="Ссылка на картинку" onchange="updatePreview()">
                <div class="info-message">Вставьте ссылку на фоновую картинку.</div>
            </div>

            <div class="form-group">
                <label>Размер аватаров (%)</label>
                <input type="range" id="avatarSize" min="50" max="150" value="100" onchange="updatePreview()">
            </div>

            <h2>Игроки</h2>
            <div id="playersList"></div>
            <button onclick="addPlayer()">+ Добавить игрока (до 4)</button>

            <h2 style="margin-top: 10px;">Вопросы</h2>
            <div id="tasksList"></div>
            <button onclick="addTask()">+ Добавить вопрос</button>
        </div>

        <!-- MAIN AREA -->
        <div class="main-content">
            <div class="header">
                <h2>Предпросмотр</h2>
                <button id="generateBtn" class="generate-btn" onclick="generateCode()">Сгенерировать код</button>
            </div>
            <div class="preview-container">
                <iframe id="previewFrame"></iframe>
            </div>
        </div>
    </div>

    <script>
        let config = { players: [], tasks: [] };

        window.onload = () => {
            document.getElementById('bgUrl').value = ''; 
            config.players = [];
            config.tasks = [];
            addPlayer('Игрок 1', 'https://i.imgur.com/8DbkK2i.png'); // Example player
            addTask('Какой тег используется для создания гиперссылки?', ['<a>', '<img>', '<p>'], 0); // Example task
            updatePreview();
        };

        function addPlayer(name = '', url = '') {
            if (config.players.length >= 4) return alert("Максимум 4 игрока!");
            let id = Date.now();
            config.players.push({ id, name, url });
            renderPlayers();
            updatePreview();
        }

        function removePlayer(id) {
            config.players = config.players.filter(p => p.id !== id);
            renderPlayers();
            updatePreview();
        }

        function addTask(q = '', options = ['', '', ''], correctIdx = 0) {
            let id = Date.now();
            config.tasks.push({ id, question: q, options, correctIdx });
            renderTasks();
            updatePreview();
        }

        function removeTask(id) {
            config.tasks = config.tasks.filter(t => t.id !== id);
            renderTasks();
            updatePreview();
        }

        function renderPlayers() {
            const container = document.getElementById('playersList');
            container.innerHTML = '';
            config.players.forEach((p, idx) => {
                container.innerHTML += `
                    <div class="card">
                        <div class="form-group">
                            <input type="text" placeholder="Имя" value="${p.name}" onchange="config.players[${idx}].name=this.value; updatePreview()">
                            <input type="text" placeholder="URL Аватара" value="${p.url}" onchange="config.players[${idx}].url=this.value; updatePreview()">
                            <button onclick="removePlayer(${p.id})">Удалить</button>
                        </div>
                    </div>`;
            });
        }

        function renderTasks() {
            const container = document.getElementById('tasksList');
            container.innerHTML = '';
            config.tasks.forEach((t, idx) => {
                let optionsHTML = t.options.map((opt, oIdx) => `
                    <div style="display:flex; gap:10px; margin-top:10px; align-items:center;">
                        <input type="radio" name="correct_${t.id}" ${t.correctIdx === oIdx ? 'checked' : ''} onchange="config.tasks[${idx}].correctIdx=${oIdx}; updatePreview()">
                        <input type="text" placeholder="Вариант ${oIdx+1}" value="${opt}" onchange="config.tasks[${idx}].options[${oIdx}]=this.value; updatePreview()" style="flex:1;">
                    </div>
                `).join('');

                container.innerHTML += `
                    <div class="card">
                        <input type="text" placeholder="Текст вопроса" value="${t.question}" onchange="config.tasks[${idx}].question=this.value; updatePreview()" style="width:calc(100% - 30px);">
                        ${optionsHTML}
                        <button onclick="removeTask(${t.id})">Удалить</button>
                    </div>`;
            });
        }

        // --- ИСПРАВЛЕННАЯ ФУНКЦИЯ ---
        function getGameHTML() {
            const lang = document.getElementById('lang').value;
            const bgUrl = document.getElementById('bgUrl').value; 
            const liquidColor = document.getElementById('liquidColor').value;
            const maxScore = document.getElementById('maxScore').value;
            const fontFamily = document.getElementById('fontFamily').value;
            
            const avatarSize = document.getElementById('avatarSize').value;
            const finalAvatarSize = Math.round(280 * (avatarSize / 100));

            const txt = lang === 'ru' ? { ready: 'ИГРАТЬ', check: 'ПРОВЕРИТЬ', win: 'ПОБЕДА!' } 
                                      : { ready: 'PLAY', check: 'CHECK', win: 'WINNER!' };

            const gameState = { players: config.players, tasks: config.tasks, maxScore: parseInt(maxScore), txt: txt };
            const gameBackgroundStyle = bgUrl ? `background-image: url('${bgUrl}');` : `background-color: #0b0616;`;

            return `<!DOCTYPE html>
<html lang="${lang}">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=${fontFamily.replace(' ', '+')}&display=swap');
        
        html, body { 
            margin: 0 !important; padding: 0 !important; width: 100% !important; height: 100% !important;
            overflow: hidden !important; background: transparent !important; 
        }
        body {
            font-family: '${fontFamily}', sans-serif !important;
            position: relative !important;
        }

        *, *::before, *::after { box-sizing: border-box !important; }

        #gameRoot {
            width: 1920px; height: 1080px;
            position: absolute; left: 50%; top: 50%;
            transform-origin: center;
            transform: translate(-50%, -50%) scale(1);
            ${gameBackgroundStyle}
            background-size: cover; background-position: center;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        #gameRoot .overlay { 
            position: absolute; top:0; left:0; width:100%; height:100%;

            position: absolute; bottom: 80px; left: 0; width: 100%;
            display: flex; justify-content: space-evenly; align-items: flex-end; z-index: 5;

        #gameRoot .player-wrap {
            display: flex; flex-direction: column; align-items: center;
            position: relative; transition: opacity 0.3s; opacity: 0.4;
            width: 350px;
        }
        #gameRoot .player-wrap.active { opacity: 1; z-index: 10; }

        #gameRoot .ready-btn {
            position: absolute !important; top: -110px !important;
            background: #9d4edd !important; color: white !important; border: none !important;
            padding: 20px 50px !important; border-radius: 40px !important; 
            font-family: inherit !important; font-weight: 800 !important; 
            cursor: pointer !important; box-shadow: 0 0 30px rgba(157, 78, 221, 0.8) !important;

        }

        #gameRoot .flask {
            width: 80px; height: 380px; border: 8px solid rgba(255,255,255,0.3) !important;
            border-radius: 40px; overflow: hidden; background: rgba(0,0,0,0.4) !important;
            display: flex; align-items: flex-end; margin-bottom: -50px; z-index: 2;
        }

        }

        #gameRoot .avatar-container {
            width: ${finalAvatarSize}px; height: ${finalAvatarSize}px; border-radius: 40px;
            border: 8px solid rgba(255,255,255,0.2) !important; background: #1d1033 !important;
            overflow: hidden; z-index: 3; position: relative; transition: all 0.3s;
        }
        #gameRoot .player-wrap.active .avatar-container {
            border-color: #9d4edd !important; box-shadow: 0 0 50px rgba(157, 78, 221, 0.9), inset 0 0 30px rgba(157, 78, 221, 0.5) !important;
        }
        #gameRoot .avatar { width: 100%; height: 100%; object-fit: cover; }

        #gameRoot .name { 
            margin-top: 30px; background: rgba(20, 15, 35, 0.9) !important; 
            border: 4px solid rgba(255,255,255,0.15) !important;
            color: white !important; padding: 15px 40px; border-radius: 40px; font-size: 26px !important; 
            font-weight: 700; text-transform: uppercase; white-space: nowrap; text-align: center; max-width: 90%;
            overflow: hidden; text-overflow: ellipsis; z-index: 4; box-shadow: 0 15px 25px rgba(0,0,0,0.6);
        }

        #gameRoot .modal-bg {
            display: none; position: absolute; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.8) !important; backdrop-filter: blur(10px);
            z-index: 200; justify-content: center; align-items: center;
        }
        
        #gameRoot .modal {
            background: rgba(25, 15, 45, 0.95) !important; border: 8px solid #9d4edd !important;
            border-radius: 50px; padding: 70px; width: 1100px;
            text-align: center; box-shadow: 0 0 80px rgba(157, 78, 221, 0.5) !important; color: white !important;
        }

        #gameRoot .question { font-size: 48px !important; font-weight: 800; margin-bottom: 60px; line-height: 1.3;}
        #gameRoot .options { display: flex; flex-direction: column; gap: 20px; }
        
        #gameRoot .option-btn {
            background: rgba(255, 255, 255, 0.05) !important; color: white !important; 
            border: 4px solid rgba(255,255,255,0.1) !important;
            padding: 30px; border-radius: 25px; cursor: pointer !important; transition: all 0.2s; 
            font-size: 32px !important; text-align: left; font-family: inherit !important; font-weight: 700;
            pointer-events: auto !important;
        }
        #gameRoot .option-btn:hover { background: rgba(157, 78, 221, 0.2) !important; border-color: #9d4edd !important; transform: translateX(15px); }
        #gameRoot .option-btn.selected { 
            background: rgba(157, 78, 221, 0.6) !important; border-color: #00f5ff !important; 
            box-shadow: 0 0 40px rgba(0, 245, 255, 0.4) !important; transform: translateX(15px);
        }
        
        #gameRoot .check-btn {
            margin-top: 60px; background: #00f5ff !important; color: #000 !important; border: none !important;
            font-family: inherit !important; padding: 25px 80px; font-size: 36px !important; 
            font-weight: 800; border-radius: 50px; cursor: pointer !important;

            pointer-events: auto !important;

        #gameRoot .winner-screen {
            display: none; position: absolute; top:0; left:0; width:100%; height:100%;

            width: 450px; height: 450px; border-radius: 60px;
            border: 15px solid ${liquidColor} !important; object-fit: cover; box-shadow: 0 0 100px ${liquidColor} !important;

</head>
<body class="genially-interactive">
    <div id="genially-wrapper" style="width:100%; height:100%;">
        <div id="gameRoot"> 
            <div class="overlay"></div>
            <div class="players-container" id="pc"></div>

            <div class="modal-bg" id="modalBg">
                <div class="modal">
                    <div class="question" id="qText"></div>
                    <div class="options" id="optsDiv"></div>
                    <button class="check-btn" id="checkBtn">${txt.check}</button>
                </div>
            </div>

            <div class="winner-screen" id="winnerScreen">
                <h1>${txt.win}</h1>
                <img id="winnerAvatar">
                <h2 id="winnerName"></h2>
            </div>
        </div>
    </div>

    <script>
        const state = ${JSON.stringify(gameState)};
        let currentPlayer = 0;
        let scores = Array(state.players.length).fill(0);
        let availableTaskIndices = [];
        let usedTaskIndices = [];
        let selectedOption = null;

        function resizeGame() {
            const wrapper = document.getElementById('genially-wrapper');
            if (!wrapper) return;
            const w = wrapper.clientWidth;
            const h = wrapper.clientHeight;
            const gameWidth = 1920;
            const gameHeight = 1080;
            const aspect = gameWidth / gameHeight;
            
            let scale;
            if (w / h > aspect) {
                scale = h / gameHeight;
            } else {
                scale = w / gameWidth;
            }
            
            const gameRoot = document.getElementById('gameRoot');
            if (gameRoot) {
                gameRoot.style.transform = \`translate(-50%, -50%) scale(\${scale})\`;
            }
        }
        window.addEventListener('resize', resizeGame);

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function init() {
            const gameRoot = document.getElementById('gameRoot');
            if(!gameRoot || state.players.length === 0 || state.tasks.length === 0) {
                if(gameRoot) gameRoot.innerHTML = '<div class="empty-state">Добавьте игроков и задания в редакторе</div>'; 
                return;
            }
            resetTasks();
            const pc = document.getElementById('pc');
            pc.innerHTML = state.players.map((p, i) => \`
                <div class="player-wrap \${i === 0 ? 'active' : ''}" id="p\${i}">
                    <button class="ready-btn">\${state.txt.ready}</button>
                    <div class="flask"><div class="liquid" id="liq\${i}" style="height: 0%;"></div></div>
                    <div class="avatar-container"><img src="\${p.url}" class="avatar"></div>
                    <div class="name">\${p.name || 'Игрок ' + (i+1)}</div>
                </div>
            \`).join('');
            
            // Attach event listeners
            document.querySelectorAll('.ready-btn').forEach(btn => btn.addEventListener('click', openTask));
            document.getElementById('checkBtn').addEventListener('click', checkAnswer);
            
            resizeGame();
        }

        function resetTasks() {
            availableTaskIndices = Array.from({length: state.tasks.length}, (_, i) => i);
            shuffleArray(availableTaskIndices);
            usedTaskIndices = [];
        }

        function openTask() {
            if(availableTaskIndices.length === 0) resetTasks();
            const taskIndex = availableTaskIndices.shift();
            usedTaskIndices.push(taskIndex);
            const task = state.tasks[taskIndex];
            
            document.getElementById('qText').innerText = task.question;
            const optsDiv = document.getElementById('optsDiv');
            optsDiv.innerHTML = task.options.map((opt, i) => 
                \`<button class="option-btn" data-index="\${i}">\${opt}</button>\`
            ).join('');
            
            optsDiv.querySelectorAll('.option-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    selectOpt(parseInt(btn.dataset.index), btn);
                });
            });

            selectedOption = null;
            document.getElementById('modalBg').style.display = 'flex';
        }

        function selectOpt(idx, el) {
            selectedOption = idx;
            document.querySelectorAll('.option-btn').forEach(btn => btn.classList.remove('selected'));
            el.classList.add('selected');
        }

        function checkAnswer() {
            if(selectedOption === null) return;
            const lastTaskIndex = usedTaskIndices[usedTaskIndices.length - 1]; 
            const task = state.tasks[lastTaskIndex];
            
            if(selectedOption === task.correctIdx) {
                scores[currentPlayer]++;
                const pcn = (scores[currentPlayer] / state.maxScore) * 100;
                document.getElementById('liq'+currentPlayer).style.height = Math.min(pcn, 100) + '%';
                
                if(scores[currentPlayer] >= state.maxScore) {
                    showWinner();
                    return;
                }
            }
            document.getElementById('modalBg').style.display = 'none';
            nextTurn();
        }

        function nextTurn() {
            document.getElementById('p'+currentPlayer).classList.remove('active');
            currentPlayer = (currentPlayer + 1) % state.players.length;
            document.getElementById('p'+currentPlayer).classList.add('active');
        }

        function showWinner() {
            document.getElementById('modalBg').style.display = 'none';
            document.getElementById('winnerScreen').style.display = 'flex';
            document.getElementById('winnerAvatar').src = state.players[currentPlayer].url;
            document.getElementById('winnerName').innerText = state.players[currentPlayer].name;
        }

        init();
    <\/script>
</body>
</html>`;
        }
        
        function updatePreview() {
            const html = getGameHTML();
            const iframe = document.getElementById('previewFrame');
            iframe.srcdoc = html;
        }

        function generateCode() {
            const html = getGameHTML();
            const btn = document.getElementById('generateBtn');
            
            navigator.clipboard.writeText(html).then(() => {
                btn.textContent = "Скопировано!";
                btn.classList.add('success');
                setTimeout(() => { btn.textContent = "Сгенерировать код"; btn.classList.remove('success'); }, 2000);
            }).catch(err => {
                console.log("Ошибка копирования.");
            });
        }
    </script>
</body>
</html>
