<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактор игры: Лаборатория (Genially)</title>
    <!-- Подключаем шрифты в стиле картинки-референса -->
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Цветовая палитра из картинки */
            --bg-page: #0a0510;
            --bg-panel: rgba(26, 15, 46, 0.85);
            --bg-card: #1f1235;
            --neon-purple: #a855f7;
            --neon-purple-hover: #c084fc;
            --text-light: #e2d8f0;
            --text-muted: #9ca3af;
            --border-color: #4c2882;
            --success: #10b981;
            --glow: 0 0 15px rgba(168, 85, 247, 0.4);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-page);
            /* Фон как на картинке */
            background: radial-gradient(circle at 50% 0%, #301758 0%, #0a0510 80%);
            color: var(--text-light);
            font-family: 'DM Sans', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* КОНТЕЙНЕР 16:9 */
        .app-container {
            display: flex;
            width: 100vw;
            max-width: 177.78vh; /* 16:9 ratio */
            aspect-ratio: 16 / 9;
            background: rgba(10, 5, 16, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(168, 85, 247, 0.2);
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            border-radius: 16px;
            overflow: hidden;
        }

        /* Стилизация скроллбара */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-card); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--neon-purple); }

        /* Sidebar Settings */
        .sidebar {
            width: 30%;
            min-width: 350px;
            background-color: var(--bg-panel);
            border-right: 1px solid var(--border-color);
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Заголовки в стиле Cthulhu */
        h2 {
            margin: 0 0 10px 0;
            font-size: 1.5rem;
            font-family: 'Playfair Display', serif;
            letter-spacing: 1px;
            color: #fff;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 15px;
        }

        .form-group label {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, select, button {
            background-color: rgba(0, 0, 0, 0.5);
            color: var(--text-light);
            border: 1px solid var(--border-color);
            padding: 10px 15px;
            border-radius: 8px;
            font-family: inherit;
            outline: none;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            border-color: var(--neon-purple);
            box-shadow: var(--glow);
        }

        input[type="color"] {
            padding: 2px;
            height: 45px;
            width: 100%;
            cursor: pointer;
        }

        input[type="range"] {
            padding: 0;
            background: transparent;
            border: none;
        }

        button {
            background-color: var(--bg-card);
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
            border: 1px solid var(--border-color);
        }

        button:hover {
            background-color: var(--border-color);
            box-shadow: var(--glow);
        }

        .btn-add {
            background: transparent;
            border: 1px dashed var(--neon-purple);
            color: var(--neon-purple);
            padding: 12px;
        }
        .btn-add:hover {
            background: rgba(168, 85, 247, 0.1);
            color: #fff;
        }

        .btn-delete {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border-color: rgba(239, 68, 68, 0.3);
            margin-top: 10px;
        }
        .btn-delete:hover {
            background: #ef4444;
            color: #fff;
        }

        /* Player & Task Cards (Стиль карточек с монстрами) */
        .card {
            background: linear-gradient(145deg, var(--bg-card), #140b24);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* Main Preview Area */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 25px;
            background: transparent;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .header h2 { border: none; margin: 0; padding: 0; }

        .preview-container {
            flex: 1;
            background-color: #000;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            box-shadow: var(--glow);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .generate-btn {
            padding: 12px 25px;
            font-size: 0.9rem;
            border-radius: 8px;
            border: none;
            background: linear-gradient(90deg, var(--neon-purple), #6b21a8);
            color: white;
            box-shadow: var(--glow);
        }
        .generate-btn:hover {
            background: linear-gradient(90deg, var(--neon-purple-hover), var(--neon-purple));
            transform: translateY(-2px);
        }
        .generate-btn.success {
            background: var(--success);
            box-shadow: 0 0 15px var(--success);
        }
    </style>
</head>
<body>

<div class="app-container">
    <!-- SIDEBAR WITH SETTINGS -->
    <div class="sidebar">
        <h2>Общие настройки</h2>
        
        <div class="form-group">
            <label>Язык игры</label>
            <select id="lang" onchange="updatePreview()">
                <option value="ru">Русский</option>
                <option value="en">English</option>
            </select>
        </div>

        <div class="form-group">
            <label>Шрифт заголовков игры</label>
            <select id="fontFamily" onchange="updatePreview()">
                <option value="Playfair Display">Playfair Display (Мистика)</option>
                <option value="DM Sans">DM Sans (Современный)</option>
                <option value="Montserrat">Montserrat</option>
            </select>
        </div>

        <div class="form-group">
            <label>Очки для победы (полная колба)</label>
            <input type="number" id="maxScore" value="5" min="1" onchange="updatePreview()">
        </div>

        <div class="form-group">
            <label>Цвет жидкости</label>
            <input type="color" id="liquidColor" value="#00ffcc" onchange="updatePreview()">
        </div>

        <div class="form-group">
            <label>Фон игры (URL или Файл)</label>
            <input type="text" id="bgUrl" placeholder="Ссылка на картинку" onchange="updatePreview()">
            <input type="file" accept="image/*" onchange="handleFileUpload(event, 'bgUrl')" style="padding: 5px;">
        </div>

        <div class="form-group">
            <label>Размер аватаров (%)</label>
            <input type="range" id="avatarSize" min="50" max="150" value="100" onchange="updatePreview()">
        </div>

        <h2>Игроки (Аватары)</h2>
        <div id="playersList"></div>
        <button class="btn-add" onclick="addPlayer()">+ Добавить игрока (до 4)</button>

        <h2 style="margin-top:20px;">Задания (Вопросы)</h2>
        <div id="tasksList"></div>
        <button class="btn-add" onclick="addTask()">+ Добавить вопрос</button>
    </div>

    <!-- MAIN AREA -->
    <div class="main-content">
        <div class="header">
            <h2>Предпросмотр игры</h2>
            <button id="generateBtn" class="generate-btn" onclick="generateCode()">Сгенерировать код</button>
        </div>
        <div class="preview-container">
            <iframe id="previewFrame"></iframe>
        </div>
    </div>
</div>

    <script>
        // State
        let config = {
            players: [],
            tasks: []
        };

        // Initialize default
        window.onload = () => {
            // Дефолтные мистические аватарки для примера
            addPlayer('Calaor', 'https://cdn-icons-png.flaticon.com/512/8154/8154699.png');
            addPlayer('Toectio', 'https://cdn-icons-png.flaticon.com/512/8154/8154687.png');
            addTask('В каком созвездии спит Ктулху?', ['Орион', 'Октант', 'Р'льех (не созвездие)'], 2);
            updatePreview();
        };

        function addPlayer(name = '', url = '') {
            if (config.players.length >= 4) return alert("Максимум 4 игрока!");
            let id = Date.now();
            config.players.push({ id, name, url });
            renderPlayers();
            updatePreview();
        }

        function removePlayer(id) {
            config.players = config.players.filter(p => p.id !== id);
            renderPlayers();
            updatePreview();
        }

        function addTask(q = '', options = ['', '', ''], correctIdx = 0) {
            let id = Date.now();
            config.tasks.push({ id, question: q, options, correctIdx });
            renderTasks();
            updatePreview();
        }

        function removeTask(id) {
            config.tasks = config.tasks.filter(t => t.id !== id);
            renderTasks();
            updatePreview();
        }

        function handleFileUpload(event, targetId) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById(targetId).value = e.target.result;
                    if(targetId.startsWith('p_url_')) {
                        let pid = parseInt(targetId.split('_')[2]);
                        let player = config.players.find(p => p.id === pid);
                        if(player) player.url = e.target.result;
                    }
                    updatePreview();
                };
                reader.readAsDataURL(file);
            }
        }

        function renderPlayers() {
            const container = document.getElementById('playersList');
            container.innerHTML = '';
            config.players.forEach((p, idx) => {
                container.innerHTML += `
                    <div class="card">
                        <div class="form-group">
                            <input type="text" placeholder="Имя игрока" value="${p.name}" onchange="config.players[${idx}].name=this.value; updatePreview()">
                            <input type="text" id="p_url_${p.id}" placeholder="URL Аватара" value="${p.url}" onchange="config.players[${idx}].url=this.value; updatePreview()">
                            <input type="file" accept="image/*" onchange="handleFileUpload(event, 'p_url_${p.id}')" style="padding: 5px;">
                            <button class="btn-delete" onclick="removePlayer(${p.id})">Удалить</button>
                        </div>
                    </div>`;
            });
        }

        function renderTasks() {
            const container = document.getElementById('tasksList');
            container.innerHTML = '';
            config.tasks.forEach((t, idx) => {
                let optionsHTML = t.options.map((opt, oIdx) => `
                    <div style="display:flex; gap:10px; margin-top:8px; align-items:center;">
                        <input type="radio" name="correct_${t.id}" ${t.correctIdx === oIdx ? 'checked' : ''} onchange="config.tasks[${idx}].correctIdx=${oIdx}; updatePreview()" style="width:20px; height:20px;">
                        <input type="text" placeholder="Вариант ${oIdx+1}" value="${opt}" onchange="config.tasks[${idx}].options[${oIdx}]=this.value; updatePreview()" style="flex:1;">
                    </div>
                `).join('');

                container.innerHTML += `
                    <div class="card">
                        <input type="text" placeholder="Текст вопроса" value="${t.question}" onchange="config.tasks[${idx}].question=this.value; updatePreview()" style="width:calc(100% - 30px); margin-bottom: 10px;">
                        ${optionsHTML}
                        <button class="btn-delete" onclick="removeTask(${t.id})" style="width:100%;">Удалить вопрос</button>
                    </div>`;
            });
        }

        // --- GAME ENGINE TEMPLATE (Исправлено для Genially) ---
        function getGameHTML() {
            const lang = document.getElementById('lang').value;
            // Дефолтный фон в стиле космоса/мистики
            const bgUrl = document.getElementById('bgUrl').value || 'https://images.unsplash.com/photo-1534447677768-be436bb09401?auto=format&fit=crop&q=80&w=1920';
            const liquidColor = document.getElementById('liquidColor').value;
            const maxScore = document.getElementById('maxScore').value;
            const fontFamily = document.getElementById('fontFamily').value;
            const avatarSize = document.getElementById('avatarSize').value;
            
            const txt = lang === 'ru' ? { ready: 'ХОДИТЬ', check: 'ПРОВЕРИТЬ', win: 'ПОБЕДА!', next: 'Следующий ход' } 
                                      : { ready: 'PLAY', check: 'CHECK', win: 'WINNER!', next: 'Next Turn' };

            const gameState = {
                players: config.players,
                tasks: config.tasks,
                maxScore: parseInt(maxScore),
                txt: txt
            };

            return `
<!DOCTYPE html>
<html lang="${lang}">
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&family=Playfair+Display:wght@700&display=swap');
        
        * { box-sizing: border-box; }
        
        /* ИСПРАВЛЕНИЕ ДЛЯ GENIALLY: 100% вместо vw/vh, absolute позиционирование */
        html, body {
            margin: 0; padding: 0; 
            width: 100%; height: 100%; 
            position: absolute; top: 0; left: 0;
            overflow: hidden;
            font-family: 'DM Sans', sans-serif;
            background: url('${bgUrl}') no-repeat center center/cover;
            display: flex; flex-direction: column; justify-content: flex-end; align-items: center;
        }

        h1, h2, .question { font-family: '${fontFamily}', serif; }

        .overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: linear-gradient(to top, rgba(0,0,0,0.9), rgba(10,5,20,0.3)); pointer-events: none; z-index: 1;}
        
        .players-container {
            display: flex; gap: 5vw; margin-bottom: 5vh; z-index: 2; position: relative;
        }
        
        .player-wrap {
            display: flex; flex-direction: column; align-items: center; position: relative;
            transition: 0.5s; opacity: 0.4; filter: grayscale(50%);
        }
        
        .player-wrap.active {
            opacity: 1; filter: grayscale(0%);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { transform: translateY(0); filter: drop-shadow(0 0 10px rgba(168, 85, 247, 0.5)); }
            50% { transform: translateY(-10px); filter: drop-shadow(0 0 25px rgba(168, 85, 247, 1)); }
            100% { transform: translateY(0); filter: drop-shadow(0 0 10px rgba(168, 85, 247, 0.5)); }
        }

        .ready-btn {
            position: absolute; top: -160px;
            background: linear-gradient(45deg, #8b5cf6, #a855f7); color: white; border: none; padding: 12px 25px;
            border-radius: 8px; font-weight: bold; cursor: pointer;
            box-shadow: 0 0 15px #8b5cf6; display: none; z-index: 5;
            font-family: 'DM Sans', sans-serif; letter-spacing: 1px;
        }
        
        .player-wrap.active .ready-btn { display: block; animation: floatBtn 2s infinite ease-in-out; }
        .ready-btn:hover { filter: brightness(1.2); }

        @keyframes floatBtn { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

        .flask {
            width: 40px; height: 120px; border: 3px solid rgba(168, 85, 247, 0.5);
            border-radius: 0 0 20px 20px; position: absolute; top: -140px;
            overflow: hidden; background: rgba(0,0,0,0.6);
            display: flex; align-items: flex-end;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
        }
        
        .liquid {
            width: 100%; background: ${liquidColor}; transition: height 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 -5px 15px ${liquidColor};
        }

        .avatar {
            width: calc(100px * ${avatarSize/100}); 
            height: calc(100px * ${avatarSize/100}); 
            border-radius: 20%; object-fit: cover;
            border: 2px solid var(--border-color); background: #140b24;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .name { color: white; margin-top: 15px; font-weight: bold; background: rgba(20, 11, 36, 0.8); padding: 5px 15px; border-radius: 5px; border: 1px solid rgba(168,85,247,0.3);}

        /* Modal Task */
        .modal-bg {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(10, 5, 20, 0.85); backdrop-filter: blur(5px);
            z-index: 10; justify-content: center; align-items: center;
        }
        
        .modal {
            background: linear-gradient(145deg, #1f1235, #0a0510);
            border: 1px solid #a855f7; border-radius: 20px;
            padding: 50px; width: 85%; max-width: 700px; text-align: center;
            box-shadow: 0 0 40px rgba(168, 85, 247, 0.4); color: white;
            position: relative;
        }

        .question { font-size: 2rem; margin-bottom: 40px; letter-spacing: 1px; text-shadow: 0 2px 4px rgba(0,0,0,0.8);}
        
        .options { display: flex; flex-direction: column; gap: 15px; align-items: center; }
        
        .option-btn {
            background: rgba(0,0,0,0.4); color: white; border: 1px solid #4c2882;
            padding: 15px 20px; border-radius: 10px; cursor: pointer;
            transition: 0.3s; font-size: 1.1rem; width: 80%; text-align: center;
        }
        
        .option-btn:hover { border-color: #a855f7; background: rgba(168, 85, 247, 0.1); }
        .option-btn.selected { background: rgba(168, 85, 247, 0.3); border-color: #a855f7; box-shadow: 0 0 15px rgba(168, 85, 247, 0.5); }
        
        .check-btn {
            margin-top: 40px; background: linear-gradient(90deg, #8b5cf6, #a855f7); color: white; border: none;
            padding: 15px 50px; font-size: 1.2rem; border-radius: 10px; cursor: pointer; letter-spacing: 2px;
            text-transform: uppercase; font-weight: bold;
        }

        /* Winner Screen */
        .winner-screen {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background: radial-gradient(circle, rgba(20,10,40,0.95) 0%, rgba(0,0,0,1) 100%);
            z-index: 20; flex-direction: column;
            justify-content: center; align-items: center; color: white;
        }
        .winner-screen h1 { font-size: 5rem; margin-bottom: 20px; color: ${liquidColor}; text-shadow: 0 0 30px ${liquidColor}; }
        .winner-screen img { box-shadow: 0 0 40px ${liquidColor}; }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="players-container" id="pc"></div>

    <!-- Modal -->
    <div class="modal-bg" id="modalBg">
        <div class="modal">
            <div class="question" id="qText"></div>
            <div class="options" id="optsDiv"></div>
            <button class="check-btn" id="checkBtn" onclick="checkAnswer()">${txt.check}</button>
        </div>
    </div>

    <!-- Winner -->
    <div class="winner-screen" id="winnerScreen">
        <h1>${txt.win}</h1>
        <img id="winnerAvatar" style="width:250px; border-radius:20px; border: 4px solid ${liquidColor};">
        <h2 id="winnerName" style="font-size: 2.5rem; margin-top: 20px;"></h2>
    </div>

    <script>
        const state = ${JSON.stringify(gameState)};
        let currentPlayer = 0;
        let scores = Array(state.players.length).fill(0);
        let currentTaskIdx = 0;
        let selectedOption = null;

        function init() {
            if(state.players.length === 0) return;
            const pc = document.getElementById('pc');
            pc.innerHTML = state.players.map((p, i) => \`
                <div class="player-wrap \${i === 0 ? 'active' : ''}" id="p\${i}">
                    <button class="ready-btn" onclick="openTask()">\${state.txt.ready}</button>
                    <div class="flask">
                        <div class="liquid" id="liq\${i}" style="height: 0%;"></div>
                    </div>
                    <img src="\${p.url}" class="avatar">
                    <div class="name">\${p.name}</div>
                </div>
            \`).join('');
        }

        function openTask() {
            if(state.tasks.length === 0) return alert("Нет заданий!");
            
            currentTaskIdx = Math.floor(Math.random() * state.tasks.length);
            const task = state.tasks[currentTaskIdx];
            
            document.getElementById('qText').innerText = task.question;
            const optsDiv = document.getElementById('optsDiv');
            optsDiv.innerHTML = task.options.map((opt, i) => 
                \`<button class="option-btn" onclick="selectOpt(\${i}, this)">\${opt}</button>\`
            ).join('');
            
            selectedOption = null;
            document.getElementById('modalBg').style.display = 'flex';
        }

        function selectOpt(idx, el) {
            selectedOption = idx;
            document.querySelectorAll('.option-btn').forEach(btn => btn.classList.remove('selected'));
            el.classList.add('selected');
        }

        function checkAnswer() {
            if(selectedOption === null) return;
            const task = state.tasks[currentTaskIdx];
            
            if(selectedOption === task.correctIdx) {
                scores[currentPlayer]++;
                const pcn = (scores[currentPlayer] / state.maxScore) * 100;
                document.getElementById('liq'+currentPlayer).style.height = pcn + '%';
                
                if(scores[currentPlayer] >= state.maxScore) {
                    setTimeout(showWinner, 800); // Небольшая задержка, чтобы увидеть как заполняется колба
                    document.getElementById('modalBg').style.display = 'none';
                    return;
                }
            }
            
            document.getElementById('modalBg').style.display = 'none';
            nextTurn();
        }

        function nextTurn() {
            document.getElementById('p'+currentPlayer).classList.remove('active');
            currentPlayer = (currentPlayer + 1) % state.players.length;
            document.getElementById('p'+currentPlayer).classList.add('active');
        }

        function showWinner() {
            document.getElementById('winnerScreen').style.display = 'flex';
            document.getElementById('winnerAvatar').src = state.players[currentPlayer].url;
            document.getElementById('winnerName').innerText = state.players[currentPlayer].name;
        }

        window.onload = init;
    <\/script>
</body>
</html>`;
        }

        function updatePreview() {
            const html = getGameHTML();
            const iframe = document.getElementById('previewFrame');
            iframe.srcdoc = html;
        }

        function generateCode() {
            const html = getGameHTML();
            const btn = document.getElementById('generateBtn');
            
            navigator.clipboard.writeText(html).then(() => {
                btn.textContent = "Скопировано для Genially!";
                btn.classList.add('success');
                
                setTimeout(() => {
                    btn.textContent = "Сгенерировать код";
                    btn.classList.remove('success');
                }, 2500);
            }).catch(err => {
                alert("Ошибка копирования. Скопируйте код вручную из консоли.");
                console.log(html);
            });
        }
    </script>
</body>
</html>
