<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактор игры "Безумные Ученые" для Genially</title>
    <!-- Google Fonts: DM Sans и Montserrat (для "Безграничный") -->
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #1a1a2e;
            --panel-bg-color: #2b2b3f;
            --accent-color: #8a2be2; /* Purple */
            --text-color: #e0e0e0;
            --input-bg-color: #3f3f5a;
            --border-color: #5a5a70;
            --ready-button-color: #8a2be2; /* Same as accent for the button */
            --ready-button-text: #ffffff;
            --correct-answer-color: #4CAF50;
            --incorrect-answer-color: #F44336;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            min-height: 100vh;
            overflow: hidden; /* Prevent scrolling on body */
        }

        #app {
            display: flex;
            width: 100%;
            height: 100vh;
        }

        #settings-panel {
            width: 350px;
            background-color: var(--panel-bg-color);
            padding: 20px;
            overflow-y: auto;
            border-right: 1px solid var(--border-color);
            box-sizing: border-box;
            flex-shrink: 0;
        }

        #preview-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
            background-color: var(--bg-color);
            position: relative;
        }

        h2, h3 {
            color: var(--text-color);
            margin-top: 20px;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 5px;
        }

        .setting-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        input[type="text"],
        input[type="number"],
        input[type="url"],
        textarea,
        select {
            width: calc(100% - 20px);
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background-color: var(--input-bg-color);
            color: var(--text-color);
            font-size: 1rem;
            box-sizing: border-box;
        }
        input[type="color"] {
            width: 60px;
            height: 40px;
            padding: 0;
            border: none;
            border-radius: 5px;
            vertical-align: middle;
            margin-bottom: 15px;
        }

        button {
            padding: 10px 15px;
            background-color: var(--accent-color);
            color: var(--ready-button-text);
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            transition: background-color 0.2s ease;
            margin-right: 10px;
            margin-bottom: 10px;
        }

        button:hover {
            background-color: #a049ff;
        }

        button.remove-button {
            background-color: #f44336;
        }
        button.remove-button:hover {
            background-color: #ff6c60;
        }

        .player-card-editor, .question-editor {
            background-color: var(--input-bg-color);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px solid var(--border-color);
        }

        .player-avatar-preview, .background-preview, .question-preview {
            width: 100px;
            height: 100px;
            object-fit: contain;
            border: 1px dashed var(--border-color);
            border-radius: 5px;
            margin-top: 10px;
            margin-bottom: 15px;
            display: block;
        }
        .background-preview {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            margin-right: 10px;
            vertical-align: middle;
            margin-bottom: 15px;
        }
        .file-input-wrapper input[type="file"] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }
        .file-input-wrapper button {
            padding: 8px 12px;
            margin-bottom: 0;
        }

        .flex-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        .flex-row input[type="text"] {
            flex-grow: 1;
            margin-bottom: 0;
        }

        .radio-group {
            margin-bottom: 10px;
        }
        .radio-group label {
            display: flex;
            align-items: center;
            cursor: pointer;
        }
        .radio-group input[type="radio"] {
            margin-right: 8px;
            width: auto;
            margin-bottom: 0;
        }

        #genially-game-preview {
            width: 900px; /* Standard Genially width */
            height: 506px; /* Standard Genially 16:9 height for 900px width */
            background-color: #333; /* Placeholder background */
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
        }

        #preview-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        #preview-content {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* Align elements to the bottom */
            padding: 20px;
            box-sizing: border-box;
            gap: 15px;
        }

        #preview-flasks {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            position: absolute;
            top: 0; /* Adjust as needed */
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Allow clicks through flasks */
        }

        .preview-flask-wrapper {
            position: relative;
            width: 100px; /* Example size */
            height: 250px; /* Example size */
            margin: 0 10px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .preview-flask-body {
            width: 80px;
            height: 200px;
            background: linear-gradient(to top, #ccc 5%, transparent 5%); /* Placeholder flask outline */
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 0 0 40px 40px;
            margin: auto;
            position: relative;
            overflow: hidden;
        }
        .preview-flask-neck {
            width: 50px;
            height: 50px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 25px 25px 0 0;
            margin: 0 auto;
            position: relative;
            top: 2px;
            background: rgba(255,255,255,0.1);
        }

        .preview-fluid {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 0%; /* Initial fill level */
            background-color: var(--accent-color); /* Default fluid color */
            transition: height 0.5s ease-out;
        }

        #preview-players {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: auto; /* Push to bottom */
            padding-bottom: 20px;
            position: relative; /* Ensure z-index works */
            z-index: 10;
        }

        .preview-player-card {
            background-color: rgba(0, 0, 0, 0.6);
            border: 2px solid transparent;
            border-radius: 15px;
            padding: 10px;
            text-align: center;
            width: 150px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .preview-player-card.active {
            border-color: var(--accent-color);
            animation: pulse-border 1s infinite alternate;
        }

        @keyframes pulse-border {
            from { border-color: var(--accent-color); }
            to { border-color: #ffeb3b; } /* A different color to make it noticeable */
        }

        .preview-player-avatar {
            width: 100px;
            height: 100px;
            object-fit: contain;
            border-radius: 10px;
            margin: 0 auto 10px auto;
            background-color: var(--input-bg-color); /* Placeholder background for avatars */
        }

        .preview-player-name {
            font-weight: bold;
            font-size: 0.9em;
            color: var(--text-color);
        }

        #preview-ready-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 15px 30px;
            background-color: var(--ready-button-color);
            color: var(--ready-button-text);
            font-size: 1.5em;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            z-index: 15;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
            transition: background-color 0.3s ease, transform 0.3s ease;
        }
        #preview-ready-button:hover {
            background-color: #a049ff;
            transform: translate(-50%, -50%) scale(1.05);
        }

        #generated-code-section {
            width: 100%;
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #generated-code {
            width: calc(100% - 40px); /* Adjust width to fit preview-area padding */
            height: 150px;
            background-color: #23233b;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            padding: 15px;
            color: #4CAF50; /* Green text for code */
            font-family: 'Consolas', 'Monaco', monospace;
            white-space: pre;
            overflow: auto;
            resize: vertical;
            margin-bottom: 10px;
        }

        #copy-code-button {
            padding: 12px 25px;
            background-color: #4CAF50;
        }
        #copy-code-button:hover {
            background-color: #66BB6A;
        }

        /* Question modal styling for preview */
        .preview-modal {
            display: none; /* Hidden by default */
            position: fixed; /* Stay in place */
            z-index: 100; /* Sit on top */
            left: 0;
            top: 0;
            width: 100%; /* Full width */
            height: 100%; /* Full height */
            overflow: auto; /* Enable scroll if needed */
            background-color: rgba(0,0,0,0.7); /* Black w/ opacity */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .preview-modal-content {
            background-color: var(--panel-bg-color);
            margin: auto;
            padding: 30px;
            border: 1px solid var(--border-color);
            width: 80%; /* Could be responsive */
            max-width: 600px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.6);
            position: relative;
        }

        .preview-modal-close {
            color: #aaa;
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }

        .preview-modal-close:hover,
        .preview-modal-close:focus {
            color: var(--text-color);
            text-decoration: none;
        }

        .preview-question-text {
            font-size: 1.3em;
            margin-bottom: 20px;
            text-align: center;
        }

        .preview-answer-options button {
            display: block;
            width: 100%;
            margin-bottom: 10px;
            background-color: var(--input-bg-color);
            color: var(--text-color);
            padding: 12px;
            border-radius: 8px;
            font-size: 1.1em;
            border: 1px solid var(--border-color);
        }
        .preview-answer-options button:hover {
            background-color: #4a4a6b;
        }
        .preview-answer-options button.correct {
            background-color: var(--correct-answer-color);
        }
        .preview-answer-options button.incorrect {
            background-color: var(--incorrect-answer-color);
        }

        .preview-free-answer-input {
            width: calc(100% - 20px);
            margin-top: 15px;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid var(--border-color);
            background-color: var(--input-bg-color);
            color: var(--text-color);
            font-size: 1em;
        }

        .preview-submit-answer-button {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            font-size: 1.2em;
        }

        .preview-win-modal {
            display: none;
            position: fixed;
            z-index: 100;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .preview-win-modal-content {
            background-color: var(--panel-bg-color);
            padding: 40px;
            border-radius: 10px;
            max-width: 500px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.6);
        }
        .preview-win-modal h3 {
            font-size: 2em;
            color: #FFD700; /* Gold */
            margin-bottom: 20px;
        }
        .preview-win-modal p {
            font-size: 1.2em;
            margin-bottom: 30px;
        }

    </style>
</head>
<body>
    <div id="app">
        <aside id="settings-panel">
            <h2>Настройки игры</h2>

            <div class="setting-group">
                <h3>Визуальные эффекты и окружение</h3>
                <label for="background-url">URL фона:</label>
                <input type="url" id="background-url" value="https://i.ibb.co/3sS7Lqg/bg-lab.png">
                <div class="file-input-wrapper">
                    <button>Загрузить фон с устройства</button>
                    <input type="file" id="background-file" accept="image/*">
                </div>
                <img id="background-preview" class="background-preview" src="https://i.ibb.co/3sS7Lqg/bg-lab.png" alt="Предпросмотр фона">

                <label for="fluid-color">Цвет жидкости в колбах:</label>
                <input type="color" id="fluid-color" value="#8a2be2">
            </div>

            <div class="setting-group">
                <h3>Игровая механика</h3>
                <label for="points-to-win">Очки для победы (полный бак):</label>
                <input type="number" id="points-to-win" value="20" min="1">

                <label for="language">Язык игры:</label>
                <select id="language">
                    <option value="ru">Русский</option>
                    <option value="en">English</option>
                </select>

                <label for="title-font">Шрифт заголовка:</label>
                <select id="title-font">
                    <option value="Montserrat">Montserrat (Безграничный)</option>
                    <option value="DM Sans">DM Sans</option>
                    <option value="Arial">Arial</option>
                    <option value="Verdana">Verdana</option>
                </select>

                <label for="ui-font">Шрифт пользовательского интерфейса:</label>
                <select id="ui-font">
                    <option value="DM Sans">DM Sans</option>
                    <option value="Montserrat">Montserrat</option>
                    <option value="Arial">Arial</option>
                    <option value="Verdana">Verdana</option>
                </select>
            </div>

            <div class="setting-group">
                <h3>Сумасшедшие учёные (игроки)</h3>
                <div id="players-container">
                    <!-- Player cards will be added here -->
                    <div class="player-card-editor" data-player-id="0">
                        <label for="player-name-0">Имя учёного:</label>
                        <input type="text" id="player-name-0" value="Genius Marie">
                        <label for="player-avatar-url-0">URL аватара:</label>
                        <input type="url" id="player-avatar-url-0" value="https://i.ibb.co/N2XQ3jT/scientist-girl.png">
                        <div class="file-input-wrapper">
                            <button>Загрузить аватар</button>
                            <input type="file" id="player-avatar-file-0" accept="image/*">
                        </div>
                        <img id="player-avatar-preview-0" class="player-avatar-preview" src="https://i.ibb.co/N2XQ3jT/scientist-girl.png" alt="Аватар">
                        <label for="player-avatar-size-0">Размер аватара (px):</label>
                        <input type="number" id="player-avatar-size-0" value="100" min="50" max="200">
                        <button class="remove-button" onclick="removePlayer(0)">Удалить игрока</button>
                    </div>
                </div>
                <button id="add-player-button">Добавить игрока</button>
            </div>

            <div class="setting-group">
                <h3>Задания (вопросы и ответы)</h3>
                <div id="questions-container">
                    <!-- Questions will be added here -->
                    <div class="question-editor" data-question-id="0">
                        <label for="question-text-0">Текст задания:</label>
                        <textarea id="question-text-0">Какова формула воды?</textarea>
                        <label>Тип ответа:</label>
                        <div class="radio-group">
                            <label><input type="radio" name="answer-type-0" value="multiple-choice" checked onchange="toggleAnswerType(0)"> Выбор из нескольких вариантов</label>
                            <label><input type="radio" name="answer-type-0" value="free-text" onchange="toggleAnswerType(0)"> Свободный ответ</label>
                        </div>
                        <div class="multiple-choice-options-0">
                            <label>Варианты ответов:</label>
                            <div class="flex-row">
                                <input type="text" id="option-0-0" value="H2O" class="question-option" data-option-id="0">
                                <input type="radio" name="correct-answer-0" value="0" checked> Правильный
                                <button class="remove-button" onclick="removeOption(0, 0)">X</button>
                            </div>
                            <div class="flex-row">
                                <input type="text" id="option-0-1" value="CO2" class="question-option" data-option-id="1">
                                <input type="radio" name="correct-answer-0" value="1"> Правильный
                                <button class="remove-button" onclick="removeOption(0, 1)">X</button>
                            </div>
                            <button onclick="addOption(0)">+ Добавить вариант</button>
                        </div>
                        <div class="free-text-answer-0" style="display: none;">
                            <label for="free-answer-0">Правильный ответ:</label>
                            <input type="text" id="free-answer-0" value="">
                        </div>
                        <button class="remove-button" onclick="removeQuestion(0)">Удалить задание</button>
                    </div>
                </div>
                <button id="add-question-button">+ Добавить задание</button>
            </div>

        </aside>

        <main id="preview-area">
            <div id="genially-game-preview">
                <img id="preview-background" src="" alt="Game Background">
                <div id="preview-content">
                    <div id="preview-flasks">
                        <!-- Flasks will be rendered here -->
                    </div>
                    <div id="preview-players">
                        <!-- Player cards will be rendered here -->
                    </div>
                    <button id="preview-ready-button">READY</button>
                </div>
            </div>

            <div id="generated-code-section">
                <textarea id="generated-code" placeholder="Сгенерированный код Genially появится здесь..." readonly></textarea>
                <button id="copy-code-button">Сгенерировать и скопировать код</button>
            </div>

            <!-- Question Modal (for preview) -->
            <div id="preview-question-modal" class="preview-modal">
                <div class="preview-modal-content">
                    <span class="preview-modal-close">&times;</span>
                    <p id="preview-question-text" class="preview-question-text"></p>
                    <div id="preview-answer-options" class="preview-answer-options"></div>
                    <input type="text" id="preview-free-answer-input" class="preview-free-answer-input" style="display: none;">
                    <button id="preview-submit-answer" class="preview-submit-answer-button">Ответить</button>
                </div>
            </div>

            <!-- Win Modal (for preview) -->
            <div id="preview-win-modal" class="preview-win-modal">
                <div class="preview-win-modal-content">
                    <h3>Победа!</h3>
                    <p id="preview-win-text"></p>
                    <button id="preview-reset-game">Играть снова</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        // --- Core Data Structure ---
        let gameSettings = {
            backgroundUrl: "https://i.ibb.co/3sS7Lqg/bg-lab.png",
            fluidColor: "#8a2be2",
            pointsToWin: 20,
            language: "ru",
            titleFont: "Montserrat",
            uiFont: "DM Sans",
            players: [
                {
                    id: 0,
                    name: "Genius Marie",
                    avatarUrl: "https://i.ibb.co/N2XQ3jT/scientist-girl.png",
                    avatarSize: 100
                }
            ],
            questions: [
                {
                    id: 0,
                    text: "Какова формула воды?",
                    type: "multiple-choice",
                    options: [
                        { text: "H2O", isCorrect: true },
                        { text: "CO2", isCorrect: false }
                    ],
                    freeAnswer: "" // Only for free-text type
                }
            ]
        };

        let nextPlayerId = 1;
        let nextQuestionId = 1;

        // --- DOM Elements ---
        const backgroundUrlInput = document.getElementById('background-url');
        const backgroundFileInput = document.getElementById('background-file');
        const backgroundPreviewImg = document.getElementById('background-preview');
        const fluidColorInput = document.getElementById('fluid-color');
        const pointsToWinInput = document.getElementById('points-to-win');
        const languageSelect = document.getElementById('language');
        const titleFontSelect = document.getElementById('title-font');
        const uiFontSelect = document.getElementById('ui-font');
        const playersContainer = document.getElementById('players-container');
        const addPlayerButton = document.getElementById('add-player-button');
        const questionsContainer = document.getElementById('questions-container');
        const addQuestionButton = document.getElementById('add-question-button');
        const generatedCodeTextarea = document.getElementById('generated-code');
        const copyCodeButton = document.getElementById('copy-code-button');

        // Preview Elements
        const previewBackground = document.getElementById('preview-background');
        const previewPlayersContainer = document.getElementById('preview-players');
        const previewFlasksContainer = document.getElementById('preview-flasks');
        const previewReadyButton = document.getElementById('preview-ready-button');

        // Preview Game State
        let previewScores = {};
        let previewCurrentPlayerIndex = 0;
        let previewCurrentQuestionIndex = 0;
        let previewGameStarted = false;

        // Preview Modals
        const previewQuestionModal = document.getElementById('preview-question-modal');
        const previewQuestionText = document.getElementById('preview-question-text');
        const previewAnswerOptions = document.getElementById('preview-answer-options');
        const previewFreeAnswerInput = document.getElementById('preview-free-answer-input');
        const previewSubmitAnswerButton = document.getElementById('preview-submit-answer');
        const previewQuestionModalClose = previewQuestionModal.querySelector('.preview-modal-close');

        const previewWinModal = document.getElementById('preview-win-modal');
        const previewWinText = document.getElementById('preview-win-text');
        const previewResetGameButton = document.getElementById('preview-reset-game');
        const previewWinModalClose = previewWinModal.querySelector('.preview-modal-close');


        // --- Event Listeners for Settings ---
        backgroundUrlInput.addEventListener('input', (e) => {
            gameSettings.backgroundUrl = e.target.value;
            backgroundPreviewImg.src = e.target.value;
            updatePreview();
        });
        backgroundFileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    gameSettings.backgroundUrl = event.target.result; // Data URL
                    backgroundUrlInput.value = ''; // Clear URL input
                    backgroundPreviewImg.src = event.target.result;
                    updatePreview();
                };
                reader.readAsDataURL(file);
            }
        });

        fluidColorInput.addEventListener('input', (e) => {
            gameSettings.fluidColor = e.target.value;
            updatePreview();
        });
        pointsToWinInput.addEventListener('input', (e) => {
            gameSettings.pointsToWin = parseInt(e.target.value);
            updatePreview();
        });
        languageSelect.addEventListener('change', (e) => {

        // --- Player Management ---
        function addPlayer() {
            if (gameSettings.players.length >= 4) {
                alert('Максимум 4 игрока!');
                return;
            }

            const newPlayer = {
                id: nextPlayerId++,
                name: `Новый Ученый ${nextPlayerId}`,
                avatarUrl: "https://via.placeholder.com/100",
                avatarSize: 100
            };
            gameSettings.players.push(newPlayer);
            renderPlayersSettings();
            updatePreview();
        }

        function removePlayer(idToRemove) {
            gameSettings.players = gameSettings.players.filter(p => p.id !== idToRemove);
            renderPlayersSettings();
            updatePreview();
        }

        function renderPlayersSettings() {
            playersContainer.innerHTML = '';
            gameSettings.players.forEach(player => {
                const playerDiv = document.createElement('div');
                playerDiv.className = 'player-card-editor';
                playerDiv.dataset.playerId = player.id;
                playerDiv.innerHTML = `
                    <label for="player-name-${player.id}">Имя учёного:</label>
                    <input type="text" id="player-name-${player.id}" value="${player.name}">
                    <label for="player-avatar-url-${player.id}">URL аватара:</label>
                    <input type="url" id="player-avatar-url-${player.id}" value="${player.avatarUrl}">
                    <div class="file-input-wrapper">
                        <button>Загрузить аватар</button>
                        <input type="file" id="player-avatar-file-${player.id}" accept="image/*">
                    </div>
                    <img id="player-avatar-preview-${player.id}" class="player-avatar-preview" src="${player.avatarUrl}" alt="Аватар" style="width: ${player.avatarSize}px; height: ${player.avatarSize}px;">
                    <label for="player-avatar-size-${player.id}">Размер аватара (px):</label>
                    <input type="number" id="player-avatar-size-${player.id}" value="${player.avatarSize}" min="50" max="200">
                    <button class="remove-button" onclick="removePlayer(${player.id})">Удалить игрока</button>
                `;
                playersContainer.appendChild(playerDiv);

                document.getElementById(`player-name-${player.id}`).addEventListener('input', (e) => {
                    player.name = e.target.value;
                    updatePreview();
                });
                document.getElementById(`player-avatar-url-${player.id}`).addEventListener('input', (e) => {
                    player.avatarUrl = e.target.value;
                    document.getElementById(`player-avatar-preview-${player.id}`).src = e.target.value;
                    updatePreview();
                });
                document.getElementById(`player-avatar-file-${player.id}`).addEventListener('change', (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = (event) => {
                            player.avatarUrl = event.target.result;
                            document.getElementById(`player-avatar-url-${player.id}`).value = ''; // Clear URL input
                            document.getElementById(`player-avatar-preview-${player.id}`).src = event.target.result;
                            updatePreview();
                        };
                        reader.readAsDataURL(file);
                    }
                });
                document.getElementById(`player-avatar-size-${player.id}`).addEventListener('input', (e) => {
                    player.avatarSize = parseInt(e.target.value);
                    document.getElementById(`player-avatar-preview-${player.id}`).style.width = `${e.target.value}px`;
                    document.getElementById(`player-avatar-preview-${player.id}`).style.height = `${e.target.value}px`;
                    updatePreview();
                });
            });
        }

        // --- Question Management ---
        function addQuestion() {
            const newQuestion = {
                id: nextQuestionId++,
                text: "Новый вопрос?",
                type: "multiple-choice",
                options: [{ text: "Вариант 1", isCorrect: true }],
                freeAnswer: ""
            };
            gameSettings.questions.push(newQuestion);
            renderQuestionsSettings();
        }

        function removeQuestion(idToRemove) {
            gameSettings.questions = gameSettings.questions.filter(q => q.id !== idToRemove);
            renderQuestionsSettings();
        }

        function renderQuestionsSettings() {
            questionsContainer.innerHTML = '';
            gameSettings.questions.forEach(question => {
                const questionDiv = document.createElement('div');
                questionDiv.className = 'question-editor';
                questionDiv.dataset.questionId = question.id;
                questionDiv.innerHTML = `
                    <label for="question-text-${question.id}">Текст задания:</label>
                    <textarea id="question-text-${question.id}">${question.text}</textarea>
                    <label>Тип ответа:</label>
                    <div class="radio-group">
                        <label><input type="radio" name="answer-type-${question.id}" value="multiple-choice" ${question.type === 'multiple-choice' ? 'checked' : ''} onchange="toggleAnswerType(${question.id})"> Выбор из нескольких вариантов</label>
                        <label><input type="radio" name="answer-type-${question.id}" value="free-text" ${question.type === 'free-text' ? 'checked' : ''} onchange="toggleAnswerType(${question.id})"> Свободный ответ</label>
                    </div>
                    <div class="multiple-choice-options-${question.id}" style="display: ${question.type === 'multiple-choice' ? 'block' : 'none'};">
                        <label>Варианты ответов:</label>
                        <div id="options-for-question-${question.id}"></div>
                        <button onclick="addOption(${question.id})">+ Добавить вариант</button>
                    </div>
                    <div class="free-text-answer-${question.id}" style="display: ${question.type === 'free-text' ? 'block' : 'none'};">
                        <label for="free-answer-${question.id}">Правильный ответ:</label>
                        <input type="text" id="free-answer-${question.id}" value="${question.freeAnswer}">
                    </div>
                    <button class="remove-button" onclick="removeQuestion(${question.id})">Удалить задание</button>
                `;
                questionsContainer.appendChild(questionDiv);

                document.getElementById(`question-text-${question.id}`).addEventListener('input', (e) => {
                    question.text = e.target.value;
                });
                document.getElementById(`free-answer-${question.id}`).addEventListener('input', (e) => {
                    question.freeAnswer = e.target.value;
                });

                renderOptionsForQuestion(question.id);
            });
        }

        function toggleAnswerType(questionId) {
            const question = gameSettings.questions.find(q => q.id === questionId);
            if (!question) return;

            const isMultipleChoice = document.querySelector(`input[name="answer-type-${questionId}"]:checked`).value === 'multiple-choice';
            question.type = isMultipleChoice ? 'multiple-choice' : 'free-text';

            document.querySelector(`.multiple-choice-options-${questionId}`).style.display = isMultipleChoice ? 'block' : 'none';
            document.querySelector(`.free-text-answer-${questionId}`).style.display = isMultipleChoice ? 'none' : 'block';
        }

        function renderOptionsForQuestion(questionId) {
            const question = gameSettings.questions.find(q => q.id === questionId);
            if (!question) return;

            const optionsContainer = document.getElementById(`options-for-question-${questionId}`);
            if (!optionsContainer) return;

            optionsContainer.innerHTML = '';
            question.options.forEach((option, index) => {
                const optionDiv = document.createElement('div');
                optionDiv.className = 'flex-row';
                optionDiv.innerHTML = `
                    <input type="text" id="option-${question.id}-${index}" value="${option.text}" class="question-option" data-option-id="${index}">
                    <input type="radio" name="correct-answer-${question.id}" value="${index}" ${option.isCorrect ? 'checked' : ''}> Правильный
                    <button class="remove-button" onclick="removeOption(${question.id}, ${index})">X</button>
                `;
                optionsContainer.appendChild(optionDiv);

                document.getElementById(`option-${question.id}-${index}`).addEventListener('input', (e) => {
                    option.text = e.target.value;
                });
                document.querySelector(`input[name="correct-answer-${question.id}"][value="${index}"]`).addEventListener('change', () => {
                    question.options.forEach(o => o.isCorrect = false);
                    option.isCorrect = true;
                });
            });
        }

        function addOption(questionId) {
            const question = gameSettings.questions.find(q => q.id === questionId);
            if (!question) return;

            const newOption = { text: `Новый вариант`, isCorrect: false };
            question.options.push(newOption);
            renderOptionsForQuestion(questionId);
        }

        function removeOption(questionId, optionIndexToRemove) {
            const question = gameSettings.questions.find(q => q.id === questionId);
            if (!question) return;

            // If the removed option was the correct one, make the first remaining option correct (if any)
            if (question.options[optionIndexToRemove].isCorrect && question.options.length > 1) {
                question.options[0].isCorrect = true;
            }

            question.options.splice(optionIndexToRemove, 1);

            // If no options left, add a default one
            if (question.options.length === 0) {
                question.options.push({ text: "Вариант по умолчанию", isCorrect: true });
            }
            renderOptionsForQuestion(questionId);
        }


        // --- Preview Logic ---
        function updatePreview() {
            previewBackground.src = gameSettings.backgroundUrl;

            // Update fonts
            const root = document.documentElement;
            root.style.setProperty('--genially-title-font', gameSettings.titleFont);
            root.style.setProperty('--genially-ui-font', gameSettings.uiFont);

            renderPreviewPlayers();
            renderPreviewFlasks();
        }

        function renderPreviewPlayers() {
            previewPlayersContainer.innerHTML = '';
            gameSettings.players.forEach((player, index) => {
                const playerCard = document.createElement('div');
                playerCard.className = `preview-player-card ${index === previewCurrentPlayerIndex && previewGameStarted ? 'active' : ''}`;
                playerCard.innerHTML = `
                    <img class="preview-player-avatar" src="${player.avatarUrl}" alt="${player.name}" style="width: ${player.avatarSize}px; height: ${player.avatarSize}px;">
                    <div class="preview-player-name" style="font-family: '${gameSettings.uiFont}', sans-serif;">${player.name}</div>
                `;
                previewPlayersContainer.appendChild(playerCard);
            });
        }

        function renderPreviewFlasks() {
            previewFlasksContainer.innerHTML = '';
            gameSettings.players.forEach((player, index) => {
                const flaskWrapper = document.createElement('div');
                flaskWrapper.className = 'preview-flask-wrapper';
                flaskWrapper.innerHTML = `
                    <div class="preview-flask-neck"></div>
                    <div class="preview-flask-body">
                        <div class="preview-fluid" style="background-color: ${gameSettings.fluidColor}; height: ${previewScores[player.id] / gameSettings.pointsToWin * 100 || 0}%;"></div>
                    </div>
                `;
                previewFlasksContainer.appendChild(flaskWrapper);
            });
        }

        // Preview Game Controls
        previewReadyButton.addEventListener('click', startPreviewGame);
        previewSubmitAnswerButton.addEventListener('click', submitPreviewAnswer);
        previewQuestionModalClose.addEventListener('click', closePreviewQuestionModal);
        previewWinModalClose.addEventListener('click', closePreviewWinModal);
        previewResetGameButton.addEventListener('click', resetPreviewGame);


        function startPreviewGame() {
            if (gameSettings.questions.length === 0) {
                alert('Добавьте хотя бы один вопрос, чтобы начать игру!');
                return;
            }
            if (gameSettings.players.length === 0) {
                alert('Добавьте хотя бы одного игрока, чтобы начать игру!');
                return;
            }

            previewGameStarted = true;
            previewCurrentPlayerIndex = 0;
            previewCurrentQuestionIndex = 0;
            previewScores = {};
            gameSettings.players.forEach(p => previewScores[p.id] = 0);

            previewReadyButton.style.display = 'none';
            displayPreviewQuestion();
            updatePreview(); // To highlight active player
        }

        function displayPreviewQuestion() {
            if (previewCurrentQuestionIndex >= gameSettings.questions.length) {
                // All questions asked, cycle through them if needed or end game
                previewCurrentQuestionIndex = 0; // Loop questions
            }
            const question = gameSettings.questions[previewCurrentQuestionIndex];

            previewQuestionText.textContent = question.text;
            previewAnswerOptions.innerHTML = '';
            previewFreeAnswerInput.style.display = 'none';
            previewFreeAnswerInput.value = '';

            if (question.type === 'multiple-choice') {
                question.options.forEach((option, index) => {
                    const button = document.createElement('button');
                    button.textContent = option.text;
                    button.dataset.optionIndex = index;
                    button.addEventListener('click', () => submitPreviewAnswer(option.isCorrect));
                    previewAnswerOptions.appendChild(button);
                });
                previewAnswerOptions.style.display = 'block';
                previewSubmitAnswerButton.style.display = 'none'; // Options are self-submitting
            } else { // free-text
                previewFreeAnswerInput.style.display = 'block';
                previewAnswerOptions.style.display = 'none';
                previewSubmitAnswerButton.style.display = 'block';
            }

            previewQuestionModal.style.display = 'flex'; // Show modal
        }

        function submitPreviewAnswer(isCorrectOption) {
            let isCorrect;
            const question = gameSettings.questions[previewCurrentQuestionIndex];

            if (question.type === 'multiple-choice') {
                isCorrect = isCorrectOption;
            } else { // free-text
                isCorrect = previewFreeAnswerInput.value.toLowerCase().trim() === question.freeAnswer.toLowerCase().trim();
            }

            const currentPlayer = gameSettings.players[previewCurrentPlayerIndex];
            if (isCorrect) {
                previewScores[currentPlayer.id]++;
            }

            updatePreview(); // Update flask and player highlight

            if (isCorrect) {
                // Temporarily highlight correct answer in modal if multiple choice
                if (question.type === 'multiple-choice' && isCorrectOption !== undefined) {
                    const buttons = previewAnswerOptions.querySelectorAll('button');
                    buttons.forEach((btn, index) => {
                        if (question.options[index].isCorrect) {
                            btn.classList.add('correct');
                        } else {
                            btn.classList.add('incorrect');
                        }
                    });
                    // Short delay before closing modal
                    setTimeout(() => {
                        closePreviewQuestionModal();
                        checkPreviewWinCondition();
                    }, 1000);
                } else {
                    closePreviewQuestionModal();
                    checkPreviewWinCondition();
                }

            } else {
                // If incorrect, just close and move to next turn
                closePreviewQuestionModal();
                checkPreviewWinCondition();
            }
        }

        function closePreviewQuestionModal() {
            previewQuestionModal.style.display = 'none';
            // Reset answer option styles
            previewAnswerOptions.querySelectorAll('button').forEach(btn => {
                btn.classList.remove('correct', 'incorrect');
            });
        }

        function checkPreviewWinCondition() {
            const currentPlayer = gameSettings.players[previewCurrentPlayerIndex];
            if (previewScores[currentPlayer.id] >= gameSettings.pointsToWin) {
                displayPreviewWin(currentPlayer.name);
            } else {
                nextPreviewTurn();
            }
        }

        function nextPreviewTurn() {
            previewCurrentPlayerIndex = (previewCurrentPlayerIndex + 1) % gameSettings.players.length;
            previewCurrentQuestionIndex = (previewCurrentQuestionIndex + 1) % gameSettings.questions.length; // Cycle questions
            updatePreview();
            // Automatically display next question after a short delay or user interaction
            setTimeout(displayPreviewQuestion, 500); // Small delay before next question
        }

        function displayPreviewWin(winnerName) {
            previewGameStarted = false; // Stop game
            previewWinText.textContent = `${winnerName} победил, собрав ${gameSettings.pointsToWin} очков!`;
            previewWinModal.style.display = 'flex';
        }

        function closePreviewWinModal() {
            previewWinModal.style.display = 'none';
        }

        function resetPreviewGame() {
            closePreviewWinModal();
            previewGameStarted = false;
            previewReadyButton.style.display = 'block'; // Show READY button
            updatePreview(); // Clear highlights, reset flasks
        }

            const playerNamesJs = JSON.stringify(gameSettings.players.map(p => p.name));

            const texts = {

        .win-modal-content p {
            font-size: 1.2em;
            margin-bottom: 30px;
        }
        .reset-game-button {
            padding: 12px 25px;
            background-color: ${gameSettings.fluidColor};
            color: #ffffff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1em;
        }

    </style>

    <div class="flasks-container">${flasksHtml}</div>
    <div class="players-container">${playersHtml}</div>
    <button id="startButton">${texts.ready}</button>

    <div id="questionModal" class="game-modal">
        <div class="modal-content">
            <span class="modal-close">&times;</span>
            <p id="questionText" class="question-text"></p>
            <div id="answerOptions" class="answer-options"></div>
            <input type="text" id="freeAnswerInput" class="free-answer-input" placeholder="${gameSettings.language === 'ru' ? 'Введите ваш ответ' : 'Enter your answer'}" style="display: none;">
            <button id="submitAnswer" class="submit-answer-button">${texts.answer}</button>
        </div>
    </div>

    <div id="winModal" class="game-modal">
        <div class="modal-content win-modal-content">
            <h3>${texts.win}</h3>
            <p id="winText"></p>
            <button id="resetGame" class="reset-game-button">${texts.playAgain}</button>
        </div>
    </div>

    <script>
        // Game State
        let gameState = {
            players: ${playerIdsJs}.map(id => ({ id: id, score: 0 })),
            playerNames: ${playerNamesJs},
            questions: ${questionsJs},
            pointsToWin: ${gameSettings.pointsToWin},
            currentPlayerIndex: 0,
            currentQuestionIndex: 0,
            gameStarted: false,
            texts: ${JSON.stringify(texts)}
        };

        // DOM Elements
        const startButton = document.getElementById('startButton');
        const playerElements = Array.from(document.querySelectorAll('.player-card'));
        const flaskFluidElements = Array.from(document.querySelectorAll('.flask-wrapper .fluid'));

        const questionModal = document.getElementById('questionModal');
        const questionText = document.getElementById('questionText');
        const answerOptionsContainer = document.getElementById('answerOptions');
        const freeAnswerInput = document.getElementById('freeAnswerInput');
        const submitAnswerButton = document.getElementById('submitAnswer');
        const questionModalClose = questionModal.querySelector('.modal-close');

        const winModal = document.getElementById('winModal');
        const winText = document.getElementById('winText');
        const resetGameButton = document.getElementById('resetGame');
        const winModalClose = winModal.querySelector('.modal-close');

        // Event Listeners
        startButton.addEventListener('click', startGame);
        submitAnswerButton.addEventListener('click', handleSubmitAnswer);
        questionModalClose.addEventListener('click', closeQuestionModal);
        resetGameButton.addEventListener('click', resetGame);
        winModalClose.addEventListener('click', closeWinModal);

        // Initialization
        updatePlayerHighlight();

        function startGame() {
            if (gameState.questions.length === 0) {
                alert(gameState.texts.addQuestion);
                return;
            }
            if (gameState.players.length === 0) {
                alert('Добавьте игроков в редакторе!');
                return;
            }

            gameState.gameStarted = true;
            gameState.currentPlayerIndex = 0;
            gameState.currentQuestionIndex = 0;
            gameState.players.forEach(p => p.score = 0);
            updateFlasks();

            startButton.style.display = 'none';
            displayQuestion();
            updatePlayerHighlight();
        }

        function displayQuestion() {
            if (gameState.currentQuestionIndex >= gameState.questions.length) {
                gameState.currentQuestionIndex = 0; // Loop questions if all have been asked
            }
            const question = gameState.questions[gameState.currentQuestionIndex];

            questionText.textContent = question.text;
            answerOptionsContainer.innerHTML = '';
            freeAnswerInput.style.display = 'none';
            freeAnswerInput.value = '';

            if (question.type === 'multiple-choice') {
                question.options.forEach((option, index) => {
                    const button = document.createElement('button');
                    button.textContent = option.text;
                    button.dataset.optionIndex = index;
                    button.addEventListener('click', () => handleSubmitAnswer(option.isCorrect, button));
                    answerOptionsContainer.appendChild(button);
                });
                answerOptionsContainer.style.display = 'block';
                submitAnswerButton.style.display = 'none'; // Options are self-submitting
            } else { // free-text
                freeAnswerInput.style.display = 'block';
                answerOptionsContainer.style.display = 'none';
                submitAnswerButton.style.display = 'block';
            }

            questionModal.style.display = 'flex';
        }

        function handleSubmitAnswer(isCorrectOption, clickedButton = null) {
            let isCorrect;
            const question = gameState.questions[gameState.currentQuestionIndex];

            if (question.type === 'multiple-choice') {
                isCorrect = isCorrectOption;
            } else { // free-text
                isCorrect = freeAnswerInput.value.toLowerCase().trim() === question.freeAnswer.toLowerCase().trim();
            }

            const currentPlayer = gameState.players[gameState.currentPlayerIndex];
            if (isCorrect) {
                currentPlayer.score++;
                updateFlasks();
            }

            if (clickedButton) { // For multiple choice, show visual feedback
                if (isCorrect) {
                    clickedButton.classList.add('correct');
                } else {
                    clickedButton.classList.add('incorrect');
                }
                setTimeout(() => {
                    closeQuestionModal();
                    checkWinCondition();
                }, 1000); // Short delay to show correct/incorrect
            } else { // For free text or if no button was clicked
                closeQuestionModal();
                checkWinCondition();
            }
        }

        function closeQuestionModal() {
            questionModal.style.display = 'none';
            answerOptionsContainer.querySelectorAll('button').forEach(btn => {
                btn.classList.remove('correct', 'incorrect');
            });
        }

        function checkWinCondition() {
            const currentPlayer = gameState.players[gameState.currentPlayerIndex];
            if (currentPlayer.score >= gameState.pointsToWin) {
                displayWin(gameState.playerNames[gameState.currentPlayerIndex]);
            } else {
                nextTurn();
            }
        }

        function nextTurn() {
            gameState.currentPlayerIndex = (gameState.currentPlayerIndex + 1) % gameState.players.length;
            gameState.currentQuestionIndex = (gameState.currentQuestionIndex + 1) % gameState.questions.length; // Cycle questions
            updatePlayerHighlight();
            setTimeout(displayQuestion, 500); // Small delay before next question
        }

        function updatePlayerHighlight() {
            playerElements.forEach((playerEl, index) => {
                if (index === gameState.currentPlayerIndex && gameState.gameStarted) {
                    playerEl.classList.add('active');
                } else {
                    playerEl.classList.remove('active');
                }
            });
        }

        function updateFlasks() {
            gameState.players.forEach((player, index) => {
                const fillHeight = (player.score / gameState.pointsToWin) * 100;
                if (flaskFluidElements[index]) {
                    flaskFluidElements[index].style.height = `${Math.min(100, fillHeight)}%`;
                }
            });
        }

        function displayWin(winnerName) {
            gameState.gameStarted = false;
            winText.textContent = gameState.texts.winMessage(winnerName, gameState.pointsToWin);
            winModal.style.display = 'flex';
            updatePlayerHighlight(); // Remove active highlight
        }

        function closeWinModal() {
            winModal.style.display = 'none';
        }

        function resetGame() {
            closeWinModal();
            gameState.gameStarted = false;
            startButton.style.display = 'block'; // Show READY button
            gameState.players.forEach(p => p.score = 0);
            updateFlasks();
            updatePlayerHighlight();
        }
    </script>
</div>
            `;
        }

        // --- Initial Render ---
        renderPlayersSettings();
        renderQuestionsSettings();
        updatePreview();
    </script>
</body>
</html>
