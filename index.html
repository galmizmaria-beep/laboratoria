<body>
    <div class="container">
        <div class="sidebar">
            <h2>Настройки игры</h2>
            <div class="setting-group">
                <h3>Основные</h3>
                <label for="lang">Язык интерфейса:</label>
                <select id="lang">
                    <option value="ru">Русский</option>
                    <option value="en">English</option>
                </select>
                <label for="titleFont">Шрифт заголовка:</label>
                <select id="titleFont">
                    <option value="'Orbitron', sans-serif">Безграничный (Orbitron)</option>
                    <option value="'Impact', sans-serif">Impact</option>
                    <option value="'DM Sans', sans-serif">DM Sans</option>
                </select>
                <label for="uiFont">Шрифт пользовательского интерфейса:</label>
                <select id="uiFont">
                    <option value="'DM Sans', sans-serif">DM Sans</option>
                    <option value="Arial, sans-serif">Arial</option>
                    <option value="Roboto, sans-serif">Roboto</option>
                </select>
                <label for="bgImageURL">URL фона игрового поля:</label>
                <input type="url" id="bgImageURL" placeholder="https://example.com/background.jpg">
                <input type="file" id="bgImageFile" accept="image/*" style="margin-bottom:10px;">
                <img id="bgImagePreview" alt="Background Preview" style="width: 100%; max-height: 100px; object-fit: cover; border-radius: 5px; margin-top: 10px; display: block;">
            </div>
            <div class="setting-group">
                <h3>Игровая механика</h3>
                <label for="pointsToWin">Очки для победы (полный бак):</label>
                <input type="number" id="pointsToWin" value="20" min="1">
            </div>
            <div class="setting-group">
                <h3>Сумасшедшие учёные (игроки)</h3>
                <div id="playersSettings"></div>
                <button id="addPlayerBtn">+ Добавить игрока</button>
            </div>
            <div class="setting-group">
                <h3>Задания и вопросы</h3>
                <div id="questionsSettings"></div>
                <button id="addQuestionBtn">+ Добавить задание</button>
            </div>
        </div>
        <div class="preview" id="gamePreview">
            <button class="ready-button" id="previewReadyBtn">READY</button>
            <div class="preview-players" id="previewPlayersContainer"></div>
        </div>
    </div>
    <div class="footer">
        <button id="generateCodeBtn">Сгенерировать код для Genially</button>
    </div>
<script>
// --- Game State ---
const gameState = {
    lang: 'ru',
    titleFont: "'Orbitron', sans-serif",
    uiFont: "'DM Sans', sans-serif",
    bgImageURL: 'https://images.unsplash.com/photo-1518770660431-40435d06488c?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=M3w1NzI5MzF8MHwxfHNlYXJjaHwxfHNsYWJ8ZW58MHx8fHwxNzA4NjQ1MTIxfDA&ixlib=rb-4.0.3&q=80&w=1080',
    pointsToWin: 20,
    players: [
        { id: 1, name: 'Genius Marie', avatarURL: 'https://i.imgur.com/dK5rZfS.png', liquidColor: '#8a2be2', avatarSize: 150 },
        { id: 2, name: 'Prof. Crazy', avatarURL: 'https://i.imgur.com/uNf4b9M.png', liquidColor: '#00ff7f', avatarSize: 150 },
        { id: 3, name: 'Dr. Quark', avatarURL: 'https://i.imgur.com/o2kX5Z3.png', liquidColor: '#ff00ff', avatarSize: 150 },
        { id: 4, name: 'Mdm. Franklin', avatarURL: 'https://i.imgur.com/eBf4eD1.png', liquidColor: '#ff4500', avatarSize: 150 },
    ],
    questions: [
        {
            id: 1,
            text: 'Какой элемент обозначен символом "Au"?',
            type: 'multiple_choice',
            options: [
                { text: 'Серебро', isCorrect: false },
                { text: 'Золото', isCorrect: true },
                { text: 'Алюминий', isCorrect: false }
            ]
        },
        {
            id: 2,
            text: 'Какая формула воды?',
            type: 'multiple_choice',
            options: [
                { text: 'CO2', isCorrect: false },
                { text: 'H2O', isCorrect: true },
                { text: 'O2', isCorrect: false }
            ]
        }
    ]
};

// --- DOM Elements ---
const langSelect = document.getElementById('lang');
const titleFontSelect = document.getElementById('titleFont');
const uiFontSelect = document.getElementById('uiFont');
const bgImageURLInput = document.getElementById('bgImageURL');
const bgImageFileInput = document.getElementById('bgImageFile');
const bgImagePreview = document.getElementById('bgImagePreview');
const pointsToWinInput = document.getElementById('pointsToWin');
const playersSettingsDiv = document.getElementById('playersSettings');
const addPlayerBtn = document.getElementById('addPlayerBtn');
const questionsSettingsDiv = document.getElementById('questionsSettings');
const addQuestionBtn = document.getElementById('addQuestionBtn');
const gamePreview = document.getElementById('gamePreview');
const previewPlayersContainer = document.getElementById('previewPlayersContainer');
const previewReadyBtn = document.getElementById('previewReadyBtn');
const generateCodeBtn = document.getElementById('generateCodeBtn');

// --- Initialization for Inputs (set defaults)
bgImageURLInput.value = gameState.bgImageURL;
bgImagePreview.src = gameState.bgImageURL;

// --- Player rendering ---
function renderPlayersSettings() {
    playersSettingsDiv.innerHTML = '';
    addPlayerBtn.disabled = gameState.players.length >= 4;
    gameState.players.forEach(player => {
        const playerDiv = document.createElement('div');
        playerDiv.className = 'setting-group player-card';
        playerDiv.innerHTML = `
            <img src="${player.avatarURL}" alt="${player.name}" class="avatar-preview" onerror="this.src='https://via.placeholder.com/80?text=Error'">
            <div class="player-controls">
                <label>Имя:</label>
                <input type="text" value="${player.name}" data-id="${player.id}" data-field="name">
                <label>URL аватара:</label>
                <input type="url" value="${player.avatarURL}" data-id="${player.id}" data-field="avatarURL">
                <input type="file" class="avatarFileInput" data-id="${player.id}" accept="image/*" style="margin-bottom:7px;">
                <label>Цвет жидкости:</label>
                <input type="color" value="${player.liquidColor}" data-id="${player.id}" data-field="liquidColor">
                <label>Размер аватара (px):</label>
                <input type="number" value="${player.avatarSize}" min="50" max="300" data-id="${player.id}" data-field="avatarSize">
            </div>
            <button class="delete-player-btn" data-id="${player.id}">Удалить</button>
        `;
        playersSettingsDiv.appendChild(playerDiv);
    });
    playersSettingsDiv.querySelectorAll('.player-card input').forEach(input => {
        if(input.type === 'file') return; // будет другое событие
        input.addEventListener('input', (e) => { 
            const id = parseInt(e.target.dataset.id);
            const field = e.target.dataset.field;
            const value = e.target.type === 'number' ? parseInt(e.target.value) : e.target.value;
            const playerIndex = gameState.players.findIndex(p => p.id === id);
            if (playerIndex > -1) {
                gameState.players[playerIndex][field] = value;
                if (field === 'avatarURL') {
                    e.target.closest('.player-card').querySelector('.avatar-preview').src = value;
                }
                renderPreview();
            }
        });
    });
    // --- Новый код: поддержка выбора файлов для аватара
    playersSettingsDiv.querySelectorAll('.avatarFileInput').forEach(fileInput => {
        fileInput.addEventListener('change', function(ev) {
            const file = ev.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const id = parseInt(ev.target.dataset.id);
                    const playerIndex = gameState.players.findIndex(p => p.id === id);
                    gameState.players[playerIndex].avatarURL = e.target.result;
                    renderPlayersSettings();
                    renderPreview();
                }
                reader.readAsDataURL(file);
            }
        });
    });
    playersSettingsDiv.querySelectorAll('.delete-player-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            const id = parseInt(e.target.dataset.id);
            if (gameState.players.length > 1) {
                gameState.players = gameState.players.filter(p => p.id !== id);
                renderPlayersSettings();
                renderPreview();
            } else {
                alert('Должен быть хотя бы один игрок!');
            }
        });
    });
}

// --- Questions rendering ---
function renderQuestionsSettings() {
    questionsSettingsDiv.innerHTML = '';
    gameState.questions.forEach(question => {
        const questionDiv = document.createElement('div');
        questionDiv.className = 'setting-group question-block';
        questionDiv.innerHTML = `
            <label>Текст задания:</label>
            <textarea data-id="${question.id}" data-field="text" rows="3">${question.text}</textarea>
            <label>Тип ответа:</label>
            <div style="display: flex; gap: 15px; margin-bottom: 10px;">
                <label><input type="radio" name="qType_${question.id}" value="multiple_choice" ${question.type === 'multiple_choice' ? 'checked' : ''} data-id="${question.id}"> Выбор из вариантов</label>
            </div>
            <div class="options">
                ${question.options.map((option, index) => `
                    <div class="option-item">
                        <input type="radio" name="correctOption_${question.id}" ${option.isCorrect ? 'checked' : ''} data-q-id="${question.id}" data-opt-index="${index}">
                        <input type="text" value="${option.text}" data-q-id="${question.id}" data-opt-index="${index}" data-field="optionText">
                        <button class="delete-option-btn" data-q-id="${question.id}" data-opt-index="${index}" ${question.options.length <= 1 ? 'disabled' : ''}>X</button>
                    </div>
                `).join('')}
                <button class="add-option-btn" data-q-id="${question.id}">+ Добавить вариант</button>
            </div>
            <button class="delete-question-btn" data-id="${question.id}" ${gameState.questions.length <= 1 ? 'disabled' : ''}>Удалить задание</button>
        `;
        questionsSettingsDiv.appendChild(questionDiv);
    });
    questionsSettingsDiv.querySelectorAll('textarea[data-field="text"]').forEach(input => {
        input.addEventListener('input', (e) => {
            const id = parseInt(e.target.dataset.id);
            const qIndex = gameState.questions.findIndex(q => q.id === id);
            if (qIndex > -1) 
                gameState.questions[qIndex].text = e.target.value;
        });
    });
    questionsSettingsDiv.querySelectorAll('input[name^="qType_"]').forEach(input => {
        input.addEventListener('change', (e) => {
            const id = parseInt(e.target.dataset.id);
            const qIndex = gameState.questions.findIndex(q => q.id === id);
            if (qIndex > -1) 
                gameState.questions[qIndex].type = e.target.value;
        });
    });
    questionsSettingsDiv.querySelectorAll('input[data-field="optionText"]').forEach(input => {
        input.addEventListener('input', (e) => {
            const qId = parseInt(e.target.dataset.qId);
            const optIndex = parseInt(e.target.dataset.optIndex);
            const qIndex = gameState.questions.findIndex(q => q.id === qId);
            if (qIndex > -1 && gameState.questions[qIndex].options[optIndex]) {
                gameState.questions[qIndex].options[optIndex].text = e.target.value;
            }
        });
    });
    questionsSettingsDiv.querySelectorAll('input[name^="correctOption_"]').forEach(radio => {
        radio.addEventListener('change', (e) => {
            const qId = parseInt(e.target.dataset.qId);
            const optIndex = parseInt(e.target.dataset.optIndex);
            const qIndex = gameState.questions.findIndex(q => q.id === qId);
            if (qIndex > -1) {
                gameState.questions[qIndex].options.forEach((opt, idx) => {
                    opt.isCorrect = (idx === optIndex);
                });
            }
        });
    });
    questionsSettingsDiv.querySelectorAll('.add-option-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            const qId = parseInt(e.target.dataset.qId);
            const qIndex = gameState.questions.findIndex(q => q.id === qId);
            if (qIndex > -1) {
                gameState.questions[qIndex].options.push({ text: 'Новый вариант', isCorrect: false });
                renderQuestionsSettings();
            }
        });
    });
    questionsSettingsDiv.querySelectorAll('.delete-option-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            const qId = parseInt(e.target.dataset.qId);
            const optIndex = parseInt(e.target.dataset.optIndex);
            const qIndex = gameState.questions.findIndex(q => q.id === qId);
            if (qIndex > -1 && gameState.questions[qIndex].options.length > 1) {
                gameState.questions[qIndex].options.splice(optIndex, 1);
                if (!gameState.questions[qIndex].options.some(opt => opt.isCorrect) && gameState.questions[qIndex].options.length > 0) {
                    gameState.questions[qIndex].options[0].isCorrect = true;
                }
                renderQuestionsSettings(); // Update interface!
            }
        });
    });
    questionsSettingsDiv.querySelectorAll('.delete-question-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            const id = parseInt(e.target.dataset.id);
            if (gameState.questions.length > 1) {
                gameState.questions = gameState.questions.filter(q => q.id !== id);
                renderQuestionsSettings();
            } else {
                alert('Должен быть хотя бы один вопрос!');
            }
        });
    });
}

// --- Preview rendering ---
function renderPreview() {
    gamePreview.style.backgroundImage = `url('${gameState.bgImageURL}')`;
    gamePreview.style.fontFamily = gameState.uiFont;
    previewPlayersContainer.innerHTML = '';
    previewReadyBtn.style.display = 'none';
    if (gameState.players.length === 0) {
        previewPlayersContainer.innerHTML = '<p style="color: grey; text-align: center; width: 100%;">Добавьте игроков, чтобы увидеть предпросмотр.</p>';
        return;
    }
    gameState.players.forEach(player => {
        const playerItem = document.createElement('div');
        playerItem.className = 'preview-player-item';
        playerItem.innerHTML = `
            <div class="liquid-beaker-container">
                <div class="liquid-fill" style="background-color: ${player.liquidColor}; height: 0%;"></div>
            </div>
            <img src="${player.avatarURL}" alt="${player.name}" class="preview-player-avatar" style="width: ${player.avatarSize}px; height: ${player.avatarSize}px;">
            <div class="preview-player-name" style="font-family: ${gameState.titleFont}">${player.name}</div>
        `;
        previewPlayersContainer.appendChild(playerItem);
    });
}

// --- Events ---
langSelect.addEventListener('change', e => { gameState.lang = e.target.value; });
titleFontSelect.addEventListener('change', e => { gameState.titleFont = e.target.value; renderPreview(); });
uiFontSelect.addEventListener('change', e => { gameState.uiFont = e.target.value; renderPreview(); });
// Фоновое изображение через URL
bgImageURLInput.addEventListener('input', e => { 
    gameState.bgImageURL = e.target.value;
    bgImagePreview.src = e.target.value;
    renderPreview();
});
bgImagePreview.addEventListener('error', () => {
    bgImagePreview.src = 'https://via.placeholder.com/100x100?text=Invalid+URL';
});
// Добавить фон с устройства
bgImageFileInput.addEventListener('change', function(ev){
    const file = ev.target.files[0];
    if(file){
        const reader = new FileReader();
        reader.onload = function(e){
            gameState.bgImageURL = e.target.result;
            bgImagePreview.src = e.target.result;
            bgImageURLInput.value = ''; // Обнулим текстовое поле (чтобы не мешало)
            renderPreview();
        };
        reader.readAsDataURL(file);
    }
});
pointsToWinInput.addEventListener('change', e => { gameState.pointsToWin = parseInt(e.target.value); });
addPlayerBtn.addEventListener('click', () => {
    if (gameState.players.length < 4) {
        const newId = gameState.players.length > 0 ? Math.max(...gameState.players.map(p => p.id)) + 1 : 1;
        gameState.players.push({
            id: newId,
            name: `Игрок ${newId}`,
            avatarURL: 'https://via.placeholder.com/150?text=Avatar',
            liquidColor: '#' + Math.floor(Math.random()*16777215).toString(16),
            avatarSize: 150
        });
        renderPlayersSettings();
        renderPreview();
    }
});
addQuestionBtn.addEventListener('click', () => {
    const newId = gameState.questions.length > 0 ? Math.max(...gameState.questions.map(q => q.id)) + 1 : 1;
    gameState.questions.push({
        id: newId,
        text: `Новый вопрос ${newId}?`,
        type: 'multiple_choice',
        options: [
            { text: 'Вариант 1', isCorrect: true },
            { text: 'Вариант 2', isCorrect: false }
        ]
    });
    renderQuestionsSettings();
});
renderPlayersSettings();
renderQuestionsSettings();
renderPreview();

// --- Генерация кода для Genially (ваш уже работающий вариант) ---
generateCodeBtn.addEventListener('click', () => {
    if (gameState.players.length === 0) { alert('Добавьте хотя бы одного игрока!'); return; }
    if (gameState.questions.length === 0) { alert('Добавьте хотя бы один вопрос!'); return; }
    if (!gameState.questions.every(q => q.options.some(opt => opt.isCorrect))) {
        alert('Каждый вопрос должен иметь хотя бы один правильный вариант ответа!');
        return;
    }
    const generatedCode = generateGeniallyGameCode(gameState);
    navigator.clipboard.writeText(generatedCode).then(() => {
        generateCodeBtn.textContent = 'Скопировано!';
        setTimeout(() => { generateCodeBtn.textContent = 'Сгенерировать код для Genially'; }, 2000);
    }).catch(err => {
        console.error('Не удалось скопировать код: ', err);
        alert('Не удалось скопировать код. Пожалуйста, скопируйте его вручную из консоли разработчика.');
        console.log(generatedCode);
    });
});

    // As before ... (ваш код)
    // Для краткости: скопируйте функцию сюда полностью, она не требует исправлений;
    // все base64 тоже будут работать, если Genially их разрешает.
    // Код слишком объемный для вставки сюда полностью.

}
</script>
</body>
</html>
