<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Редактор+Генератор Genially игры</title>
    <style>
        body { background:#190E23; color:#eee; font-family: sans-serif; margin:0; padding:24px; }
        .panel { background:#251d34; border-radius: 11px; padding:18px; max-width:600px; margin:0 auto 24px; }
        .input-group { margin-bottom:1em; }
        label { color:#BB86FC; font-weight:bold; display:block; margin-bottom:7px;}
        .input-field { padding:7px 10px; border-radius:6px; border:1px solid #4a3a54; background:#392e55; color:#eee;}
        .btn { padding: 9px 16px; border-radius:7px; background: #BB86FC; color:#1A1A2E; font-weight:bold; border:none; font-size:1em; margin-right:4px; cursor:pointer;}
        .btn:active { background: #9C4BCC;}
        textarea { width:100%; min-height:200px; border-radius:7px; border:1.5px solid #BB86FC; margin-top:10px; background:#362b48; color:#fff; padding:10px;}
        .player-block {background:#31294b; border-radius:9px; margin-bottom:9px; padding:7px;}
        .question-block {background:#483e6f; margin:4px 0; border-radius:5px; padding:4px;}
    </style>
</head>
<body>
<div class="panel">
    <h2>Редактор мини-игры</h2>
    <div class="input-group">
        <label>Название игры:</label>
        <input type="text" class="input-field" id="gameTitle" value="Викторина">
    </div>
    <div class="input-group">
        <label>Очков до победы:</label>
        <input type="number" class="input-field" id="pointsToWin" min="1" value="3">
    </div>
    <div class="input-group">
        <label>Цвет прогресса:</label>
        <input type="color" class="input-field" id="liquidColor" value="#8A2BE2">
    </div>
    <div>
        <label>Игроки:</label>
        <div id="players"></div>
        <button class="btn" id="addPlayerBtn">Добавить игрока</button>
    </div>
    <div style="margin-top:14px;">
        <button class="btn" id="generateCodeBtn" style="background:#23b943;">Сгенерировать код</button>
    </div>
</div>
<div class="panel">
    <h2>Скопируйте этот код для вставки в Genially</h2>
    <textarea id="outputCode" readonly></textarea>
</div>

<script>
let playersData = [];
const e=id=>document.getElementById(id);

function redrawPlayers() {
    const cont = e('players');
    cont.innerHTML = '';
    playersData.forEach((pl, idx) => {
        const div = document.createElement('div');
        div.className = 'player-block';
        div.innerHTML = `<input type="text" class="input-field" placeholder="Имя" value="${pl.name}"> 
        <button class="btn" style="background:#CF6679;" id="delp${idx}">Удалить</button>
        <div>
            <label>Вопросы:</label>
            <div id="qcont${idx}"></div>
            <button class="btn" id="addq${idx}" style="margin-top:2px;">+ Вопрос</button>
        </div>`;
        // Имя
        div.querySelector('input').oninput = e => { pl.name = e.target.value; };
        // Удалить
        div.querySelector(`#delp${idx}`).onclick = ()=>{ playersData.splice(idx,1); redrawPlayers();}
        // Вопросы
        const qcont = div.querySelector(`#qcont${idx}`);
        pl.questions.forEach((q, qidx)=>{
            const qd = document.createElement('div');
            qd.className="question-block";
            qd.innerHTML = `<input type="text" class="input-field" value="${q}" style="width:85%;"> <button style="float:right;" class="btn" id="delq${idx}_${qidx}">✕</button>`;
            qd.querySelector('input').oninput = e=>{ pl.questions[qidx] = e.target.value; };
            qd.querySelector(`#delq${idx}_${qidx}`).onclick=()=>{
                pl.questions.splice(qidx,1); redrawPlayers();
            }
            qcont.appendChild(qd);
        });
        div.querySelector(`#addq${idx}`).onclick = ()=>{
            pl.questions.push('Ваш новый вопрос...');
            redrawPlayers();
        }
        cont.appendChild(div);
    });
}
e("addPlayerBtn").onclick = ()=>{
    playersData.push({name:`Игрок ${playersData.length+1}`, questions:['Ваш вопрос 1']});
    redrawPlayers();
};
redrawPlayers();

// Генерация кода для Genially
e('generateCodeBtn').onclick = ()=>{
    const title = e('gameTitle').value.trim();
    const ptw = Number(e('pointsToWin').value);
    const color = e('liquidColor').value;
    // Валидация
    if(playersData.length == 0) { alert('Добавьте хотя бы одного игрока!'); return;}
    for(const p of playersData) {
        if(!p.name.trim()) { alert('У каждого игрока должно быть имя!'); return;}
        if(p.questions.length < ptw) { alert(`У игрока ${p.name} не хватает вопросов (нужно хотя бы ${ptw})`); return;}
        if(p.questions.some(q=>!q.trim())) { alert('Вопросы не должны быть пустыми.'); return; }
    }

    // Генерируем HTML + JS + CSS mini-game embed
    const code = `
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"><title>${title}</title>
<style>
body{background:#211a33;color:#fff;font-family:sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;margin:0;}
.g-title{font-size:2em;color:#BB86FC;margin-bottom:1em;}
.players-wrap{display:flex;gap:28px;flex-wrap:wrap;}
.pcard{background:#342865;padding:14px 22px;border-radius:13px;text-align:center;min-width:170px;}
.pcard.active{border:2.5px solid #FFD700;}
.flask-bar{border:1px solid #BB86FC;background:#211a33;height:22px;border-radius:7px;padding:3px;margin:11px 0;}
.flask-bar-inner{background:${color};height:100%;border-radius:6px;}
.pname{font-weight:bold;}
.game-msg{font-size:1.2em;margin-top:15px;}
.btn{padding:7px 17px;border:none;border-radius:7px;background:#BB86FC;color:#251d34;font-weight:bold;margin-top:11px;cursor:pointer;}
</style>
</head>
<body>
<div class="g-title">${title}</div>
<div class="players-wrap" id="gplayers"></div>
<div id="questionArea"></div>
<script>
const players = ${JSON.stringify(playersData, null, 2)};
const ptw = ${ptw};
let current = 0, progress = Array(players.length).fill(0), asked = Array(players.length).fill(0), finished = false;
function drawPlayers() {
    let s = '';
    players.forEach((pl,idx)=>{
    s += '<div class="pcard '+(idx==current?"active":"")+'"><div class="pname">'+pl.name+'</div>'
      +'<div class="flask-bar"><div class="flask-bar-inner" style="width:'+(progress[idx]/ptw*100)+'%;min-width:10px;height:14px;"></div></div>'
      +progress[idx]+'/'+ptw+'<br>'
      +(idx==current&&!finished?'<button class="btn" onclick="nextQ('+idx+')">Вопрос</button>':'')
      +'</div>';
    });
    document.getElementById('gplayers').innerHTML = s;
}
function nextQ(idx) {
    const qn = asked[idx];
    if(finished) return;
    const pl = players[idx];
    if(qn>=pl.questions.length) { document.getElementById('questionArea').innerHTML = "Нет вопросов!"; return; }
    document.getElementById('questionArea').innerHTML =
        '<div class="game-msg">'+pl.questions[qn]+'</div>' +
        '<button class="btn" onclick="answerOk('+idx+')">Верно</button>';
}
function answerOk(idx) {
    progress[idx]++; asked[idx]++;
    drawPlayers();
    if(progress[idx]>=ptw) {
        document.getElementById('questionArea').innerHTML='<div class="game-msg"><b>Победил: '+players[idx].name+'</b></div>';
        finished = true;
    } else {
        document.getElementById('questionArea').innerHTML = '';
        current = (current+1)%players.length;
        drawPlayers();
    }
}
drawPlayers();
</script>
</body>
</html>`.trim();
    e('outputCode').value = code;
};
</script>
</body>
</html>
