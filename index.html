<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактор игры: Лаборатория (Genially)</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&family=Montserrat:wght@400;700;800&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Палитра в стиле Cthulhu Spacclurn (со 2-й картинки) */
            --bg-deep-space: #0b0616;
            --bg-panel: rgba(26, 15, 46, 0.9);
            --bg-card: #1d1033;
            --neon-purple: #9d4edd;
            --neon-purple-hover: #b975f8;
            --neon-blue: #00f5ff;
            --text-light: #eaddf8;
            --text-muted: #9f8bb3;
            --border-color: #3b2266;
            --success: #10b981;
            --danger: #ef4444;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'DM Sans', sans-serif;
            background: radial-gradient(circle at 50% 0%, #29124f 0%, var(--bg-deep-space) 80%);
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Контейнер редактора с жестким форматом 16:9 */
        #app-container {
            width: 100vw;
            max-width: calc(100vh * (16 / 9));
            height: 100vh;
            max-height: calc(100vw * (9 / 16));
            display: flex;
            background: var(--bg-panel);
            backdrop-filter: blur(15px);
            box-shadow: 0 0 50px rgba(157, 78, 221, 0.15);
            overflow: hidden;
            border: 1px solid rgba(157, 78, 221, 0.2);
            /* Если хотите скругленные углы у самого редактора, раскомментируйте строку ниже: */
            /* border-radius: 16px; */
        }

        /* Sidebar Settings */
        .sidebar {
            width: 35%;
            max-width: 450px;
            background-color: transparent;
            border-right: 1px solid var(--border-color);
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Стилизация скроллбара под космос */
        .sidebar::-webkit-scrollbar { width: 6px; }
        .sidebar::-webkit-scrollbar-track { background: var(--bg-deep-space); }
        .sidebar::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }
        .sidebar::-webkit-scrollbar-thumb:hover { background: var(--neon-purple); }

        .sidebar h2 {
            margin: 0 0 10px 0;
            font-size: 1.3rem;
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid var(--neon-purple);
            padding-bottom: 8px;
            box-shadow: 0 5px 15px -10px var(--neon-purple);
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 15px;
        }

        .form-group label {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, select, button, textarea { /* Добавлено textarea */
            background-color: var(--bg-card);
            color: var(--text-light);
            border: 1px solid var(--border-color);
            padding: 12px 15px;
            border-radius: 12px;
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--neon-purple);
            box-shadow: 0 0 10px rgba(157, 78, 221, 0.3);
            background-color: rgba(29, 16, 51, 0.8);
        }

        input[type="color"] {
            padding: 2px 5px;
            height: 45px;
            width: 100%;
            cursor: pointer;
        }

        input[type="range"] {
            padding: 0;
            accent-color: var(--neon-purple);
        }

        button {
            background-color: rgba(157, 78, 221, 0.1);
            color: var(--neon-purple);
            border: 1px solid var(--neon-purple);
            cursor: pointer;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 30px; /* Круглые кнопки как на картинке */
        }

        button:hover {
            background-color: var(--neon-purple);
            color: #fff;
            box-shadow: 0 0 15px rgba(157, 78, 221, 0.5);
        }

        /* Player & Task Cards */
        .card {
            background-color: var(--bg-card);
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 15px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        /* Уменьшенные кнопки удаления в карточках */
        .card button {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border-color: var(--danger);
            font-size: 0.8rem;
            padding: 8px 12px;
            margin-top: 10px;
            border-radius: 12px; /* Уменьшаем радиус для кнопок внутри карточек */
        }
        
        .card button:hover {
            background: var(--danger);
            color: white;
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.4);
        }
        
        /* Стили для кнопок "Добавить вариант" */
        .card .add-option-btn {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border-color: var(--success);
            font-size: 0.8rem;
            padding: 8px 12px;
            margin-top: 10px;
            border-radius: 12px;
        }
        .card .add-option-btn:hover {
            background: var(--success);
            color: white;
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.4);
        }

        .card input[type="radio"], .card input[type="checkbox"] {
            accent-color: var(--neon-blue);
            width: 20px;
            height: 20px;
            margin-top: 0; /* Убираем верхний отступ */
            margin-right: 5px; /* Небольшой отступ справа */
        }
        
        /* Стили для сообщения о сжатии */
        .info-message {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: -10px;
            margin-bottom: 10px;
            text-align: center;
        }

        /* Main Preview Area */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 25px;
            background: transparent;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .header h2 {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 1.8rem;
            color: #fff;
        }

        .preview-container {
            flex: 1;
            background-color: #000; /* Черный фон для предпросмотра, если игра не имеет своего фона */
            border: 2px solid var(--border-color);
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block; /* Убираем возможные отступы iframe */
        }

        .generate-btn {
            padding: 12px 30px;
            font-size: 1rem;
            background-color: var(--neon-purple);
            color: white;
            border-color: var(--neon-purple);
            box-shadow: 0 0 15px rgba(157, 78, 221, 0.4);
        }
        
        .generate-btn:hover {
            background-color: var(--neon-purple-hover);
            box-shadow: 0 0 25px rgba(157, 78, 221, 0.6);
            transform: translateY(-2px);
        }

        .generate-btn.success {
            background-color: var(--success);
            border-color: var(--success);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.5);
            color: white;
        }
    </style>
</head>
<body>

    <div id="app-container">
        <!-- SIDEBAR WITH SETTINGS -->
        <div class="sidebar">
            <h2>Общие настройки</h2>
            
            <div class="form-group">
                <label>Язык игры</label>
                <select id="lang" onchange="updatePreview()">
                    <option value="ru">Русский</option>
                    <option value="en">English</option>
                </select>
            </div>

            <div class="form-group">
                <label>Шрифт</label>
                <select id="fontFamily" onchange="updatePreview()">
                    <option value="DM Sans">DM Sans</option>
                    <option value="Montserrat">Montserrat</option>
                    <option value="Roboto">Roboto</option>
                </select>
            </div>

            <div class="form-group">
                <label>Очки для победы (полная колба)</label>
                <input type="number" id="maxScore" value="5" min="1" onchange="updatePreview()">
            </div>

            <div class="form-group">
                <label>Цвет жидкости</label>
                <input type="color" id="liquidColor" value="#00ffcc" onchange="updatePreview()">
            </div>

            <div class="form-group">
                <label>Фон игры (URL)</label>
                <input type="text" id="bgUrl" placeholder="Ссылка на картинку (оставьте пустым для прозрачности)" onchange="updatePreview()">
                <div class="info-message">Для лучшей производительности используйте оптимизированные изображения.</div>
            </div>

            <div class="form-group">
                <label>Размер аватаров (%)</label>
                <input type="range" id="avatarSize" min="50" max="150" value="100" onchange="updatePreview()">
            </div>

            <h2>Игроки (Аватары)</h2>
            <div id="playersList"></div>
            <button onclick="addPlayer()">+ Добавить игрока (до 4)</button>

            <h2 style="margin-top: 10px;">Задания (Вопросы)</h2>
            <div id="tasksList"></div>
            <button onclick="addTask()">+ Добавить вопрос</button>
        </div>

        <!-- MAIN AREA -->
        <div class="main-content">
            <div class="header">
                <h2>Предпросмотр</h2>
                <button id="generateBtn" class="generate-btn" onclick="generateCode()">Сгенерировать код</button>
            </div>
            <div class="preview-container">
                <iframe id="previewFrame"></iframe>
            </div>
        </div>
    </div>

    <script>
        // State
        let config = {
            players: [],
            tasks: []
        };

        // Initialize default
        window.onload = () => {
            document.getElementById('bgUrl').value = 'https://i.imgur.com/qE2S1W0.jpeg'; // Пример фона
            
            addPlayer('Игрок 1', 'https://cdn-icons-png.flaticon.com/512/4140/4140048.png'); 
            addPlayer('Игрок 2', 'https://cdn-icons-png.flaticon.com/512/4140/4140047.png');

            addTask('multipleChoice', 'Сколько будет 2 + 2?', ['3', '4', '5'], 1);
            addTask('multipleCorrect', 'Какие числа являются четными?', ['1', '2', '3', '4'], [1, 3]);
            addTask('textInput', 'Назовите столицу Франции (на русском).', '', 'Париж');
            
            updatePreview();
        };

        function addPlayer(name = '', url = '') {
            if (config.players.length >= 4) return console.warn("Максимум 4 игрока!");
            let id = Date.now();
            config.players.push({ id, name, url });
            renderPlayers();
            updatePreview();
        }

        function removePlayer(id) {
            config.players = config.players.filter(p => p.id !== id);
            renderPlayers();
            updatePreview();
        }

        function addTask(type = 'multipleChoice', question = '', options = ['', ''], correct = 0) {
            let id = Date.now() + Math.random(); // Более уникальный ID
            let newTask;
            if (type === 'multipleChoice') {
                newTask = { id, type, question, options: options, correctIdx: correct };
            } else if (type === 'multipleCorrect') {
                newTask = { id, type, question, options: options, correctIndices: Array.isArray(correct) ? correct : [] };
            } else if (type === 'textInput') {
                newTask = { id, type, question, correctAnswer: typeof correct === 'string' ? correct : '' };
            }
            config.tasks.push(newTask);
            renderTasks();
            updatePreview();
        }

        function removeTask(id) {
            config.tasks = config.tasks.filter(t => t.id !== id);
            renderTasks();
            updatePreview();
        }

        function addOption(taskId) {
            const task = config.tasks.find(t => t.id === taskId);
            if (task && (task.type === 'multipleChoice' || task.type === 'multipleCorrect')) {
                task.options.push('');
                renderTasks();
                updatePreview();
            }
        }

        function removeOption(taskId, optionIdx) {
            const task = config.tasks.find(t => t.id === taskId);
            if (task && (task.type === 'multipleChoice' || task.type === 'multipleCorrect')) {
                task.options.splice(optionIdx, 1);
                // Adjust correct indices if needed
                if (task.type === 'multipleChoice' && task.correctIdx === optionIdx) {
                    task.correctIdx = 0; // Default to first option if removed
                } else if (task.type === 'multipleChoice' && task.correctIdx > optionIdx) {
                    task.correctIdx--;
                } else if (task.type === 'multipleCorrect') {
                    task.correctIndices = task.correctIndices.filter(idx => idx !== optionIdx).map(idx => (idx > optionIdx ? idx - 1 : idx));
                }
                renderTasks();
                updatePreview();
            }
        }


        function renderPlayers() {
            const container = document.getElementById('playersList');
            container.innerHTML = '';
            config.players.forEach((p, idx) => {
                container.innerHTML += `
                    <div class="card">
                        <div class="form-group">
                            <input type="text" placeholder="Имя игрока" value="${p.name}" onchange="config.players[${idx}].name=this.value; updatePreview()">
                            <input type="text" placeholder="URL Аватара" value="${p.url}" onchange="config.players[${idx}].url=this.value; updatePreview()">
                            <button onclick="removePlayer(${p.id})">Удалить игрока</button>
                        </div>
                    </div>`;
            });
        }

        function renderTasks() {
            const container = document.getElementById('tasksList');
            container.innerHTML = '';
            config.tasks.forEach((t, idx) => {
                let taskContent = '';
                if (t.type === 'multipleChoice' || t.type === 'multipleCorrect') {
                    let inputType = t.type === 'multipleChoice' ? 'radio' : 'checkbox';
                    taskContent = t.options.map((opt, oIdx) => `
                        <div style="display:flex; gap:10px; margin-top:10px; align-items:center;">
                            <input type="${inputType}" name="correct_${t.id}" 
                                ${t.type === 'multipleChoice' ? (t.correctIdx === oIdx ? 'checked' : '') : (t.correctIndices.includes(oIdx) ? 'checked' : '')} 
                                onchange="${t.type === 'multipleChoice' ? `config.tasks[${idx}].correctIdx=${oIdx}` : `
                                    if(this.checked) {
                                        if(!config.tasks[${idx}].correctIndices.includes(${oIdx})) config.tasks[${idx}].correctIndices.push(${oIdx});
                                    } else {
                                        config.tasks[${idx}].correctIndices = config.tasks[${idx}].correctIndices.filter(i => i !== ${oIdx});
                                    }
                                `}; updatePreview()">
                            <input type="text" placeholder="Вариант ${oIdx+1}" value="${opt}" onchange="config.tasks[${idx}].options[${oIdx}]=this.value; updatePreview()" style="flex:1;">
                            <button class="card-small-btn" onclick="removeOption(${t.id}, ${oIdx})" style="width: auto; padding: 5px 8px; font-size: 0.7rem;">X</button>
                        </div>
                    `).join('');
                    taskContent += `<button class="add-option-btn" onclick="addOption(${t.id})">+ Добавить вариант</button>`;

                } else if (t.type === 'textInput') {
                    taskContent = `
                        <div class="form-group">
                            <label>Правильный ответ</label>
                            <input type="text" placeholder="Например: Париж" value="${t.correctAnswer}" onchange="config.tasks[${idx}].correctAnswer=this.value; updatePreview()">
                        </div>
                    `;
                }

                container.innerHTML += `
                    <div class="card">
                        <div class="form-group">
                            <label>Тип задания</label>
                            <select onchange="config.tasks[${idx}].type=this.value; renderTasks(); updatePreview()">
                                <option value="multipleChoice" ${t.type === 'multipleChoice' ? 'selected' : ''}>Выбор одного ответа</option>
                                <option value="multipleCorrect" ${t.type === 'multipleCorrect' ? 'selected' : ''}>Выбор нескольких ответов</option>
                                <option value="textInput" ${t.type === 'textInput' ? 'selected' : ''}>Ввод текста</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Текст вопроса</label>
                            <textarea placeholder="Текст вопроса" onchange="config.tasks[${idx}].question=this.value; updatePreview()" style="width:calc(100% - 30px);">${t.question}</textarea>
                        </div>
                        ${taskContent}
                        <button onclick="removeTask(${t.id})">Удалить задание</button>
                    </div>`;
            });
        }

        // --- GAME ENGINE TEMPLATE ---
        function getGameHTML() {
            const lang = document.getElementById('lang').value;
            const bgUrl = document.getElementById('bgUrl').value; 
            const liquidColor = document.getElementById('liquidColor').value;
            const maxScore = document.getElementById('maxScore').value;
            const fontFamily = document.getElementById('fontFamily').value;
            const avatarSize = document.getElementById('avatarSize').value;
            
            const txt = lang === 'ru' ? { ready: 'ИГРАТЬ', check: 'ПРОВЕРИТЬ', win: 'ПОБЕДА!', next: 'Следующий ход', submit: 'ОТВЕТИТЬ', multipleCorrectHint: 'Выберите все верные варианты.' } 
                                      : { ready: 'READY', check: 'CHECK', win: 'WINNER!', next: 'Next Turn', submit: 'SUBMIT', multipleCorrectHint: 'Select all correct options.' };

            const gameState = {
                players: config.players,
                tasks: config.tasks,
                maxScore: parseInt(maxScore),
                txt: txt,
                liquidColor: liquidColor, // Передаем цвет жидкости в игру
                avatarSize: avatarSize
            };

            // Если bgUrl пуст, используем прозрачный фон, иначе картинку
            const gameBackgroundStyle = bgUrl ? `background: url('${bgUrl}') no-repeat center center/cover;` : `background: transparent;`;

            return `
<!DOCTYPE html>
<html lang="${lang}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=${fontFamily.replace(' ', '+')}&display=swap');
        
        /* Стили для корневых HTML и BODY внутри iframe */
        html { 
            font-size: 1.5vmin; /* Базовый размер шрифта, масштабируется по наименьшей стороне области просмотра iframe */
            box-sizing: border-box;
        }
        body { 
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            font-family: '${fontFamily}', sans-serif;
            color: white; /* Дефолтный цвет текста для игры */
            background: transparent; /* Обязательно прозрачный фон для body */
            display: flex; /* Делаем body flex-контейнером */
            justify-content: center; /* Центрируем контент по горизонтали */
            align-items: center; /* Центрируем контент по вертикали */
        }
        *, *::before, *::after {
            box-sizing: inherit;
        }

        /* Новый корневой контейнер для всего игрового контента */
        #gameRoot {
            width: 100%; height: 100%;
            ${gameBackgroundStyle} /* Динамический фон применяется к этому контейнеру */
            display: flex; flex-direction: column; justify-content: flex-end; align-items: center;
            box-sizing: border-box;
            position: relative; /* Для абсолютно позиционированных дочерних элементов, таких как overlay */
            padding-bottom: 6vmin; /* Добавим отступ снизу, чтобы игроки не прилипали к самому низу */
        }

        .overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); pointer-events: none; z-index: 1;}
        
        .players-container {
            display: flex; gap: 4vmin;
            z-index: 2; /* Повышаем z-index, чтобы игроки были над оверлеем */
            position: relative; /* Чтобы z-index работал, если это нужно */
            flex-wrap: wrap; /* Позволяет игрокам переноситься на новую строку, если их слишком много для одной */
            justify-content: center; /* Центрирует игроков, если они переносятся */
        }
        
        .player-wrap {
            display: flex;
            flex-direction: column; /* Элементы внутри игрока идут колонкой */
            align-items: center;
            position: relative; /* Для эффекта пульсации */
            transition: 0.3s; opacity: 0.5;
            gap: 2vmin; /* Отступ между элементами внутри player-wrap (кнопка, колба, аватар, имя) */
            justify-content: flex-end; /* Выравнивает содержимое по нижнему краю flex-контейнера */
            min-width: 15vmin; /* Минимальная ширина, чтобы элементы не сжимались слишком сильно */
        }
        
        .player-wrap.active {
            opacity: 1;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); filter: drop-shadow(0 0 1vmin rgba(139, 92, 246, 0.5)); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 2vmin rgba(139, 92, 246, 1)); }
            100% { transform: scale(1); filter: drop-shadow(0 0 1vmin rgba(139, 92, 246, 0.5)); }
        }

        .ready-btn {
            background: #8b5cf6; color: white; border: none;
            padding: 1.5vmin 3vmin;
            border-radius: 1vmin;
            font-weight: bold; cursor: pointer;
            box-shadow: 0 0 1.5vmin #8b5cf6; display: none; z-index: 5;
            font-size: 1em; /* Относительно базового font-size html */
            white-space: nowrap; /* Предотвращает перенос текста */
            transform: translateY(-50%); /* Поднимаем кнопку над игроком */
            position: absolute; /* Позиционируем абсолютно */
            top: 0; /* Привязываем к верху, потом сдвигаем */
        }
        
        .player-wrap.active .ready-btn { display: block; }
        .ready-btn:hover { background: #7c3aed; }

        .flask {
            width: 5vmin;
            height: 15vmin;
            border: 0.4vmin solid rgba(255,255,255,0.7);
            border-radius: 0 0 2.5vmin 2.5vmin;
            overflow: hidden; background: rgba(0,0,0,0.5);
            display: flex; align-items: flex-end;
            flex-shrink: 0; /* Чтобы колба не уменьшалась */
        }
        
        .liquid {
            width: 100%; background: var(--liquid-color); transition: height 0.5s ease;
            box-shadow: 0 0 1vmin var(--liquid-color);
        }

        .avatar {
            width: calc(10vmin * var(--avatar-size-multiplier)); 
            height: calc(10vmin * var(--avatar-size-multiplier)); 
            border-radius: 2vmin;
            object-fit: cover; /* Важно для подгонки изображения в квадрат */
            border: 0.3vmin solid white;
            background: #2a2a35;
            flex-shrink: 0; /* Чтобы аватар не уменьшался */
        }

        .name { 
            color: white; margin-top: 1vmin; font-weight: bold; background: rgba(0,0,0,0.7); padding: 0.5vmin 1vmin; border-radius: 0.5vmin; font-size: 1em;
            white-space: nowrap; /* Предотвращает перенос текста */
            text-align: center;
            max-width: 100%; /* Гарантирует, что имя не выйдет за пределы родителя */
            overflow: hidden;
            text-overflow: ellipsis; /* Добавляет многоточие для длинных имен */
        }

        /* Modal Task */
        .modal-bg {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.8); z-index: 10; justify-content: center; align-items: center;
            padding: 2vmin; /* Добавим небольшой padding, чтобы модалка не прилипала к краям */
        }
        
        .modal {
            background: #121212; border: 0.4vmin solid #8b5cf6;
            border-radius: 2vmin;
            padding: 4vmin;
            width: 90%; /* Ширина модального окна, чтобы оно было более гибким */
            max-width: 80vmin; /* Максимальная ширина в vmin для лучшей адаптации */
            text-align: center;
            box-shadow: 0 0 3vmin rgba(139, 92, 246, 0.5); color: white;
            max-height: 90vh; /* Ограничиваем высоту, чтобы модалка не выходила за экран */
            overflow-y: auto; /* Добавляем прокрутку, если контент не помещается */
        }

        .question { font-size: 2em; margin-bottom: 3vmin; } /* Увеличенный размер шрифта для вопроса */
        .hint-text { font-size: 0.8em; color: #aaa; margin-top: -2vmin; margin-bottom: 2vmin;}
        
        .options { display: flex; flex-wrap: wrap; gap: 2vmin; justify-content: center; } /* Увеличенный отступ */
        
        .option-btn {
            background: transparent; color: white; border: 0.2vmin solid #374151;
            padding: 2vmin 3vmin; /* Увеличенный паддинг */
            border-radius: 1vmin;
            cursor: pointer;
            transition: 0.2s; font-size: 1.2em; /* Увеличенный размер шрифта */
            width: calc(50% - 1vmin); /* Подстраиваем ширину для двух колонок с gap */
            min-height: 8vmin; /* Минимальная высота кнопки */
            display: flex; /* Используем flexbox для центрирования текста */
            align-items: center;
            justify-content: center;
            text-align: center; /* На случай, если flex не применится */
            word-break: break-word; /* Перенос слов, чтобы длинные варианты не вылезали */
        }
        
        .option-btn:hover { border-color: #8b5cf6; }
        .option-btn.selected { background: rgba(139, 92, 246, 0.3); border-color: #8b5cf6; }
        
        .modal-text-input {
            width: calc(100% - 4vmin); /* Ширина с учетом паддингов модала */
            padding: 2vmin;
            font-size: 1.5em;
            border-radius: 1vmin;
            border: 0.2vmin solid #374151;
            background: #2a2a35;
            color: white;
            margin-top: 2vmin;
            margin-bottom: 2vmin;
            text-align: center;
        }

        .check-btn {
            margin-top: 3vmin;
            background: #8b5cf6; color: white; border: none;
            padding: 1.5vmin 4vmin;
            font-size: 1.2em;
            border-radius: 1vmin;
            cursor: pointer;
        }

        /* Winner Screen */
        .winner-screen {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.9); z-index: 20; flex-direction: column;
            justify-content: center; align-items: center; color: white;
            font-size: 1em;
        }
        .winner-screen h1 { font-size: 6em; /* Крупнее для большего эффекта */ color: var(--liquid-color); text-shadow: 0 0 2vmin var(--liquid-color); margin-bottom: 2vmin;}
        .winner-screen img {
            width:30vmin; /* Крупнее аватар */
            height:30vmin;
            border-radius:2vmin;
            border: 0.5vmin solid var(--liquid-color);
            object-fit: cover;
        }
        .winner-screen h2 { font-size: 3em; /* Крупнее имя */ margin-top: 2vmin; }
    </style>
</head>
<body>
    <!-- Новый корневой div для всего игрового контента -->
    <div id="gameRoot"> 
        <div class="overlay"></div>
        <div class="players-container" id="pc"></div>

        <!-- Modal -->
        <div class="modal-bg" id="modalBg">
            <div class="modal">
                <div class="question" id="qText"></div>
                <div class="hint-text" id="qHint"></div>
                <div class="options" id="optsDiv"></div>
                <input type="text" id="textAnswerInput" class="modal-text-input" placeholder="${lang === 'ru' ? 'Введите ваш ответ здесь...' : 'Enter your answer here...'}" style="display:none;">
                <button class="check-btn" id="checkBtn" onclick="checkAnswer()">${txt.check}</button>
            </div>
        </div>

        <!-- Winner -->
        <div class="winner-screen" id="winnerScreen">
            <h1>${txt.win}</h1>
            <img id="winnerAvatar">
            <h2 id="winnerName"></h2>
        </div>
    </div> <!-- Конец #gameRoot -->

    <script>
        console.log("Game script template loaded and starting initialization."); // Отладочное сообщение
        const state = ${JSON.stringify(gameState)};
        console.log("Initial game state:", state); // Отладочное сообщение

        // Переменные для динамических стилей
        document.documentElement.style.setProperty('--liquid-color', state.liquidColor);
        document.documentElement.style.setProperty('--avatar-size-multiplier', state.avatarSize / 100);

        let currentPlayer = 0;
        let scores = Array(state.players.length).fill(0);
        
        let availableTaskIndices = [];
        let usedTaskIndices = [];
        let selectedOption = null; // Для multipleChoice
        let selectedMultipleOptions = []; // Для multipleCorrect

        // Функция для перемешивания массива (Fisher-Yates)
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function init() {
            console.log("init() function called."); 
            const gameRoot = document.getElementById('gameRoot');

            if(state.players.length === 0) {
                console.error("Нет игроков для начала игры. Пожалуйста, добавьте игроков в редакторе.");
                gameRoot.innerHTML = '<div style="color: white; font-size: 2em; text-align: center; padding: 10vmin; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;">Нет игроков в конфигурации! Добавьте их в редакторе.</div>'; 
                return;
            }
            if(state.tasks.length === 0) {
                console.error("Нет заданий для начала игры. Пожалуйста, добавьте задания в редакторе.");
                gameRoot.innerHTML = '<div style="color: white; font-size: 2em; text-align: center; padding: 10vmin; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;">Нет заданий в конфигурации! Добавьте их в редакторе.</div>'; 
                return;
            }

            resetTasks();

            const pc = document.getElementById('pc');
            pc.innerHTML = state.players.map((p, i) => `
                <div class="player-wrap ${i === 0 ? 'active' : ''}" id="p${i}">
                    <button class="ready-btn" onclick="openTask()">${state.txt.ready}</button>
                    <div class="flask">
                        <div class="liquid" id="liq${i}" style="height: 0%;"></div>
                    </div>
                    <img src="${p.url}" class="avatar" onerror="this.src='https://via.placeholder.com/150/000000/FFFFFF?text=No+Avatar';">
                    <div class="name">${p.name}</div>
                </div>
            `).join('');
            console.log("Players rendered in game.");
        }

        function resetTasks() {
            availableTaskIndices = Array.from({length: state.tasks.length}, (_, i) => i);
            shuffleArray(availableTaskIndices);
            usedTaskIndices = [];
            console.log("Задания сброшены и перемешаны. Доступно: " + availableTaskIndices.length);
        }

        function openTask() {
            console.log("openTask() called."); 
            if(state.tasks.length === 0) {
                console.warn("Нет заданий!");
                return;
            }
            if(availableTaskIndices.length === 0) {
                console.log("Все задания использованы, сброс пула заданий.");
                resetTasks();
                if(availableTaskIndices.length === 0) {
                    console.error("Не удалось сбросить задания. Возможно, нет заданий в списке.");
                    return;
                }
            }
            
            const taskIndex = availableTaskIndices.shift();
            usedTaskIndices.push(taskIndex);
            
            const task = state.tasks[taskIndex];
            
            document.getElementById('qText').innerText = task.question;
            const optsDiv = document.getElementById('optsDiv');
            const textAnswerInput = document.getElementById('textAnswerInput');
            const qHint = document.getElementById('qHint');
            
            optsDiv.innerHTML = ''; // Очищаем варианты
            textAnswerInput.style.display = 'none'; // Скрываем текстовый ввод по умолчанию
            qHint.innerText = ''; // Очищаем подсказку
            selectedOption = null; // Сброс для single choice
            selectedMultipleOptions = []; // Сброс для multiple correct

            if (task.type === 'multipleChoice') {
                optsDiv.innerHTML = task.options.map((opt, i) => 
                    `<button class="option-btn" onclick="selectOpt(${i}, this)">${opt}</button>`
                ).join('');
                document.getElementById('checkBtn').innerText = state.txt.check;
            } else if (task.type === 'multipleCorrect') {
                optsDiv.innerHTML = task.options.map((opt, i) => 
                    `<button class="option-btn" onclick="selectMultipleOpt(${i}, this)">${opt}</button>`
                ).join('');
                qHint.innerText = state.txt.multipleCorrectHint;
                document.getElementById('checkBtn').innerText = state.txt.check;
            } else if (task.type === 'textInput') {
                textAnswerInput.style.display = 'block';
                textAnswerInput.value = ''; // Очищаем поле ввода
                textAnswerInput.focus();
                document.getElementById('checkBtn').innerText = state.txt.submit;
            }
            
            document.getElementById('modalBg').style.display = 'flex';
            console.log("Modal opened for task:", task);
        }

        function selectOpt(idx, el) {
            console.log("Option selected:", idx);
            selectedOption = idx;
            document.querySelectorAll('#optsDiv .option-btn').forEach(btn => btn.classList.remove('selected'));
            el.classList.add('selected');
        }

        function selectMultipleOpt(idx, el) {
            console.log("Multiple option toggled:", idx);
            if (selectedMultipleOptions.includes(idx)) {
                selectedMultipleOptions = selectedMultipleOptions.filter(i => i !== idx);
                el.classList.remove('selected');
            } else {
                selectedMultipleOptions.push(idx);
                el.classList.add('selected');
            }
            console.log("Current multiple selections:", selectedMultipleOptions);
        }

        function checkAnswer() {
            console.log("checkAnswer() called."); 
            const lastTaskIndex = usedTaskIndices[usedTaskIndices.length - 1]; 
            const task = state.tasks[lastTaskIndex];
            let isCorrect = false;

            if (task.type === 'multipleChoice') {
                if(selectedOption === null) {
                    console.warn("Не выбран вариант ответа.");
                    return;
                }
                isCorrect = (selectedOption === task.correctIdx);
                console.log("Multiple choice answer checked. Selected:", selectedOption, "Correct:", task.correctIdx, "Result:", isCorrect);
            } else if (task.type === 'multipleCorrect') {
                if(selectedMultipleOptions.length === 0) {
                    console.warn("Не выбраны варианты ответа.");
                    return;
                }
                // Сортируем массивы для корректного сравнения
                const sortedSelected = [...selectedMultipleOptions].sort();
                const sortedCorrect = [...task.correctIndices].sort();
                isCorrect = (sortedSelected.length === sortedCorrect.length &&
                             sortedSelected.every((val, index) => val === sortedCorrect[index]));
                console.log("Multiple correct answer checked. Selected:", sortedSelected, "Correct:", sortedCorrect, "Result:", isCorrect);
            } else if (task.type === 'textInput') {
                const userAnswer = document.getElementById('textAnswerInput').value.trim();
                isCorrect = (userAnswer.toLowerCase() === task.correctAnswer.toLowerCase().trim());
                console.log("Text input answer checked. User:", userAnswer, "Correct:", task.correctAnswer, "Result:", isCorrect);
            }
            
            if(isCorrect) {
                console.log("Правильный ответ!");
                scores[currentPlayer]++;
                const pcn = (scores[currentPlayer] / state.maxScore) * 100;
                document.getElementById('liq'+currentPlayer).style.height = pcn + '%';
                
                if(scores[currentPlayer] >= state.maxScore) {
                    showWinner();
                    return;
                }
            } else {
                console.log("Неправильный ответ.");
            }
            
            document.getElementById('modalBg').style.display = 'none';
            nextTurn();
        }

        function nextTurn() {
            console.log("nextTurn() called. Current player was:", currentPlayer);
            document.getElementById('p'+currentPlayer).classList.remove('active');
            currentPlayer = (currentPlayer + 1) % state.players.length;
            document.getElementById('p'+currentPlayer).classList.add('active');
            console.log("Next player is:", currentPlayer);
        }

        function showWinner() {
            console.log("showWinner() called. Winner is player:", currentPlayer); 
            document.getElementById('modalBg').style.display = 'none';
            document.getElementById('winnerScreen').style.display = 'flex';
            document.getElementById('winnerAvatar').src = state.players[currentPlayer].url;
            document.getElementById('winnerName').innerText = state.players[currentPlayer].name;
        }

        // Запускаем инициализацию после загрузки DOM
        document.addEventListener('DOMContentLoaded', init);
        console.log("DOMContentLoaded listener added for init().");
    <\/script>
</body>
</html>`;
        }

        function updatePreview() {
            const html = getGameHTML();
            const iframe = document.getElementById('previewFrame');
            // Более надежный способ обновления srcdoc
            iframe.srcdoc = html;
        }

        function generateCode() {
            const html = getGameHTML();
            const btn = document.getElementById('generateBtn');
            
            navigator.clipboard.writeText(html).then(() => {
                btn.textContent = "Скопировано!";
                btn.classList.add('success');
                
                setTimeout(() => {
                    btn.textContent = "Сгенерировать код";
                    btn.classList.remove('success');
                }, 2000);
            }).catch(err => {
                console.error("Ошибка копирования в буфер обмена:", err);
                console.log("Ошибка копирования. Скопируйте код вручную из консоли разработчика.");
                console.log("--- Начало сгенерированного кода ---");
                console.log(html);
                console.log("--- Конец сгенерированного кода ---");
            });
        }
    </script>
</body>
</html>
