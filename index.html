<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактор игры: Лаборатория (Genially)</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&family=Montserrat:wght@400;700;800&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Палитра в стиле Cthulhu Spacclurn (со 2-й картинки) */
            --bg-deep-space: #0b0616;
            --bg-panel: rgba(26, 15, 46, 0.9);
            --bg-card: #1d1033;
            --neon-purple: #9d4edd;
            --neon-purple-hover: #b975f8;
            --neon-blue: #00f5ff;
            --text-light: #eaddf8;
            --text-muted: #9f8bb3;
            --border-color: #3b2266;
            --success: #10b981;
            --danger: #ef4444;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'DM Sans', sans-serif;
            background: radial-gradient(circle at 50% 0%, #29124f 0%, var(--bg-deep-space) 80%);
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Контейнер редактора с жестким форматом 16:9 */
        #app-container {
            width: 100vw;
            max-width: calc(100vh * (16 / 9));
            height: 100vh;
            max-height: calc(100vw * (9 / 16));
            display: flex;
            background: var(--bg-panel);
            backdrop-filter: blur(15px);
            box-shadow: 0 0 50px rgba(157, 78, 221, 0.15);
            overflow: hidden;
            border: 1px solid rgba(157, 78, 221, 0.2);
            /* Если хотите скругленные углы у самого редактора, раскомментируйте строку ниже: */
            /* border-radius: 16px; */
        }

        /* Sidebar Settings */
        .sidebar {
            width: 35%;
            max-width: 450px;
            background-color: transparent;
            border-right: 1px solid var(--border-color);
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Стилизация скроллбара под космос */
        .sidebar::-webkit-scrollbar { width: 6px; }
        .sidebar::-webkit-scrollbar-track { background: var(--bg-deep-space); }
        .sidebar::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }
        .sidebar::-webkit-scrollbar-thumb:hover { background: var(--neon-purple); }

        .sidebar h2 {
            margin: 0 0 10px 0;
            font-size: 1.3rem;
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid var(--neon-purple);
            padding-bottom: 8px;
            box-shadow: 0 5px 15px -10px var(--neon-purple);
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 15px;
        }

        .form-group label {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, select, button {
            background-color: var(--bg-card);
            color: var(--text-light);
            border: 1px solid var(--border-color);
            padding: 12px 15px;
            border-radius: 12px;
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--neon-purple);
            box-shadow: 0 0 10px rgba(157, 78, 221, 0.3);
            background-color: rgba(29, 16, 51, 0.8);
        }

        input[type="color"] {
            padding: 2px 5px;
            height: 45px;
            width: 100%;
            cursor: pointer;
        }

        input[type="range"] {
            padding: 0;
            accent-color: var(--neon-purple);
        }

        button {
            background-color: rgba(157, 78, 221, 0.1);
            color: var(--neon-purple);
            border: 1px solid var(--neon-purple);
            cursor: pointer;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 30px; /* Круглые кнопки как на картинке */
        }

        button:hover {
            background-color: var(--neon-purple);
            color: #fff;
            box-shadow: 0 0 15px rgba(157, 78, 221, 0.5);
        }

        /* Player & Task Cards */
        .card {
            background-color: var(--bg-card);
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 15px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        /* Уменьшенные кнопки удаления в карточках */
        .card button {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border-color: var(--danger);
            font-size: 0.8rem;
            padding: 8px 12px;
            margin-top: 10px;
        }
        
        .card button:hover {
            background: var(--danger);
            color: white;
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.4);
        }

        .card input[type="radio"] {
            accent-color: var(--neon-blue);
            width: 20px;
            height: 20px;
            margin-top: 10px;
        }

        /* Main Preview Area */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 25px;
            background: transparent;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .header h2 {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 1.8rem;
            color: #fff;
        }

        .preview-container {
            flex: 1;
            background-color: #000;
            border: 2px solid var(--border-color);
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .generate-btn {
            padding: 12px 30px;
            font-size: 1rem;
            background-color: var(--neon-purple);
            color: white;
            border-color: var(--neon-purple);
            box-shadow: 0 0 15px rgba(157, 78, 221, 0.4);
        }
        
        .generate-btn:hover {
            background-color: var(--neon-purple-hover);
            box-shadow: 0 0 25px rgba(157, 78, 221, 0.6);
            transform: translateY(-2px);
        }

        .generate-btn.success {
            background-color: var(--success);
            border-color: var(--success);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.5);
            color: white;
        }
    </style>
</head>
<body>

    <div id="app-container">
        <!-- SIDEBAR WITH SETTINGS -->
        <div class="sidebar">
            <h2>Общие настройки</h2>
            
            <div class="form-group">
                <label>Язык игры</label>
                <select id="lang" onchange="updatePreview()">
                    <option value="ru">Русский</option>
                    <option value="en">English</option>
                </select>
            </div>

            <div class="form-group">
                <label>Шрифт</label>
                <select id="fontFamily" onchange="updatePreview()">
                    <option value="DM Sans">DM Sans</option>
                    <option value="Montserrat">Montserrat</option>
                    <option value="Roboto">Roboto</option>
                </select>
            </div>

            <div class="form-group">
                <label>Очки для победы (полная колба)</label>
                <input type="number" id="maxScore" value="5" min="1" onchange="updatePreview()">
            </div>

            <div class="form-group">
                <label>Цвет жидкости</label>
                <input type="color" id="liquidColor" value="#00ffcc" onchange="updatePreview()">
            </div>

            <div class="form-group">
                <label>Фон игры (URL или Файл)</label>
                <input type="text" id="bgUrl" placeholder="Ссылка на картинку" onchange="updatePreview()">
                <input type="file" accept="image/*" onchange="handleFileUpload(event, 'bgUrl')" style="padding: 5px; font-size: 0.8rem;">
            </div>

            <div class="form-group">
                <label>Размер аватаров (%)</label>
                <input type="range" id="avatarSize" min="50" max="150" value="100" onchange="updatePreview()">
            </div>

            <h2>Игроки (Аватары)</h2>
            <div id="playersList"></div>
            <button onclick="addPlayer()">+ Добавить игрока (до 4)</button>

            <h2 style="margin-top: 10px;">Задания (Вопросы)</h2>
            <div id="tasksList"></div>
            <button onclick="addTask()">+ Добавить вопрос</button>
        </div>

        <!-- MAIN AREA -->
        <div class="main-content">
            <div class="header">
                <h2>Предпросмотр</h2>
                <button id="generateBtn" class="generate-btn" onclick="generateCode()">Сгенерировать код</button>
            </div>
            <div class="preview-container">
                <iframe id="previewFrame"></iframe>
            </div>
        </div>
    </div>

    <script>
        // State
        let config = {
            players: [],
            tasks: []
        };

        // Initialize default
        window.onload = () => {
            addPlayer('Игрок 1', 'https://cdn-icons-png.flaticon.com/512/4140/4140048.png');
            addPlayer('Игрок 2', 'https://cdn-icons-png.flaticon.com/512/4140/4140047.png');
            addTask('Сколько будет 2+2?', ['3', '4', '5'], 1);
            updatePreview();
        };

        function addPlayer(name = '', url = '') {
            if (config.players.length >= 4) return alert("Максимум 4 игрока!");
            let id = Date.now();
            config.players.push({ id, name, url });
            renderPlayers();
            updatePreview();
        }

        function removePlayer(id) {
            config.players = config.players.filter(p => p.id !== id);
            renderPlayers();
            updatePreview();
        }

        function addTask(q = '', options = ['', '', ''], correctIdx = 0) {
            let id = Date.now();
            config.tasks.push({ id, question: q, options, correctIdx });
            renderTasks();
            updatePreview();
        }

        function removeTask(id) {
            config.tasks = config.tasks.filter(t => t.id !== id);
            renderTasks();
            updatePreview();
        }

        function handleFileUpload(event, targetId) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    // Convert to base64
                    document.getElementById(targetId).value = e.target.result;
                    if(targetId.startsWith('p_url_')) {
                        let pid = parseInt(targetId.split('_')[2]);
                        let player = config.players.find(p => p.id === pid);
                        if(player) player.url = e.target.result;
                    }
                    updatePreview();
                };
                reader.readAsDataURL(file);
            }
        }

        function renderPlayers() {
            const container = document.getElementById('playersList');
            container.innerHTML = '';
            config.players.forEach((p, idx) => {
                container.innerHTML += `
                    <div class="card">
                        <div class="form-group">
                            <input type="text" placeholder="Имя" value="${p.name}" onchange="config.players[${idx}].name=this.value; updatePreview()">
                            <input type="text" id="p_url_${p.id}" placeholder="URL Аватара" value="${p.url}" onchange="config.players[${idx}].url=this.value; updatePreview()">
                            <input type="file" accept="image/*" style="padding: 5px; font-size: 0.8rem;" onchange="handleFileUpload(event, 'p_url_${p.id}')">
                            <button onclick="removePlayer(${p.id})">Удалить</button>
                        </div>
                    </div>`;
            });
        }

        function renderTasks() {
            const container = document.getElementById('tasksList');
            container.innerHTML = '';
            config.tasks.forEach((t, idx) => {
                let optionsHTML = t.options.map((opt, oIdx) => `
                    <div style="display:flex; gap:10px; margin-top:10px; align-items:center;">
                        <input type="radio" name="correct_${t.id}" ${t.correctIdx === oIdx ? 'checked' : ''} onchange="config.tasks[${idx}].correctIdx=${oIdx}; updatePreview()">
                        <input type="text" placeholder="Вариант ${oIdx+1}" value="${opt}" onchange="config.tasks[${idx}].options[${oIdx}]=this.value; updatePreview()" style="flex:1;">
                    </div>
                `).join('');

                container.innerHTML += `
                    <div class="card">
                        <input type="text" placeholder="Текст вопроса" value="${t.question}" onchange="config.tasks[${idx}].question=this.value; updatePreview()" style="width:calc(100% - 30px);">
                        ${optionsHTML}
                        <button onclick="removeTask(${t.id})">Удалить</button>
                    </div>`;
            });
        }

        // --- GAME ENGINE TEMPLATE ---
        function getGameHTML() {
            const lang = document.getElementById('lang').value;
            const bgUrl = document.getElementById('bgUrl').value || 'https://images.unsplash.com/photo-1532094349884-543bc11b234d?auto=format&fit=crop&q=80&w=1000';
            const liquidColor = document.getElementById('liquidColor').value;
            const maxScore = document.getElementById('maxScore').value;
            const fontFamily = document.getElementById('fontFamily').value;
            const avatarSize = document.getElementById('avatarSize').value;
            
            const txt = lang === 'ru' ? { ready: 'ИГРАТЬ', check: 'ПРОВЕРИТЬ', win: 'ПОБЕДА!', next: 'Следующий ход' } 
                                      : { ready: 'READY', check: 'CHECK', win: 'WINNER!', next: 'Next Turn' };

            // Inject state into the game
            const gameState = {
                players: config.players,
                tasks: config.tasks,
                maxScore: parseInt(maxScore),
                txt: txt
            };

            return `
<!DOCTYPE html>
<html lang="${lang}">
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=${fontFamily.replace(' ', '+')}&display=swap');
        
        /* ИСПРАВЛЕНИЕ ДЛЯ GENIALLY: Использование 100% вместо 100vw/100vh */
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            background: url('${bgUrl}') no-repeat center center/cover;
            display: flex; flex-direction: column; justify-content: flex-end; align-items: center;
            font-family: '${fontFamily}', sans-serif; /* Убедимся, что шрифт применяется */
            font-size: 1.6vmin; /* Базовый размер шрифта масштабируется по наименьшей стороне области просмотра */
            box-sizing: border-box; /* Важно для корректного расчета размеров с отступами */
        }
        *, *::before, *::after {
            box-sizing: inherit; /* Все элементы наследуют box-sizing */
        }
        .overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); pointer-events: none; z-index: 1;}
        
        .players-container {
            display: flex; gap: 4vmin; /* Изменено с 40px */
            margin-bottom: 6vmin; /* Изменено с 50px */
            z-index: 2; position: relative;
        }
        
        .player-wrap {
            display: flex; flex-direction: column; align-items: center; position: relative;
            transition: 0.3s; opacity: 0.5;
        }
        
        .player-wrap.active {
            opacity: 1;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); filter: drop-shadow(0 0 1vmin rgba(139, 92, 246, 0.5)); } /* Изменено с 10px */
            50% { transform: scale(1.05); filter: drop-shadow(0 0 2vmin rgba(139, 92, 246, 1)); } /* Изменено с 20px */
            100% { transform: scale(1); filter: drop-shadow(0 0 1vmin rgba(139, 92, 246, 0.5)); } /* Изменено с 10px */
        }

        .ready-btn {
            position: absolute; top: -20vmin; /* Изменено с -180px */
            background: #8b5cf6; color: white; border: none;
            padding: 1.5vmin 3vmin; /* Изменено с 10px 20px */
            border-radius: 1vmin; /* Изменено с 8px */
            font-weight: bold; cursor: pointer;
            box-shadow: 0 0 1.5vmin #8b5cf6; display: none; z-index: 5; /* Изменено с 15px */
            font-size: 1em; /* Масштабируется от root font size */
        }
        
        .player-wrap.active .ready-btn { display: block; }
        .ready-btn:hover { background: #7c3aed; }

        .flask {
            width: 5vmin; /* Изменено с 40px */
            height: 15vmin; /* Изменено с 120px */
            border: 0.4vmin solid rgba(255,255,255,0.7); /* Изменено с 3px */
            border-radius: 0 0 2.5vmin 2.5vmin; /* Изменено с 20px */
            position: absolute; top: -17vmin; /* Изменено с -140px, скорректировано для выравнивания с аватаром */
            overflow: hidden; background: rgba(0,0,0,0.5);
            display: flex; align-items: flex-end;
        }
        
        .liquid {
            width: 100%; background: ${liquidColor}; transition: height 0.5s ease;
            box-shadow: 0 0 1vmin ${liquidColor}; /* Изменено с 10px */
        }

        .avatar {
            /* Базовый размер аватара 10vmin, затем масштабируется процентом avatarSize */
            width: calc(10vmin * ${avatarSize/100}); 
            height: calc(10vmin * ${avatarSize/100}); 
            border-radius: 2vmin; /* Изменено с 16px */
            object-fit: cover;
            border: 0.3vmin solid white; /* Изменено с 2px */
            background: #2a2a35;
        }

        .name { color: white; margin-top: 1vmin; font-weight: bold; background: rgba(0,0,0,0.7); padding: 0.5vmin 1vmin; border-radius: 0.5vmin; font-size: 1em;}

        /* Modal Task */
        .modal-bg {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.8); z-index: 10; justify-content: center; align-items: center;
        }
        
        .modal {
            background: #121212; border: 0.4vmin solid #8b5cf6; /* Изменено с 2px */
            border-radius: 2vmin; /* Изменено с 20px */
            padding: 4vmin; /* Изменено с 40px */
            width: 80%; max-width: 600px; text-align: center;
            box-shadow: 0 0 3vmin rgba(139, 92, 246, 0.5); color: white; /* Изменено с 30px */
        }

        .question { font-size: 1.5em; margin-bottom: 3vmin; } /* Изменено rem на em, margin на vmin */
        
        .options { display: flex; flex-wrap: wrap; gap: 1.5vmin; justify-content: center; } /* Изменено с 15px */
        
        .option-btn {
            background: transparent; color: white; border: 0.2vmin solid #374151; /* Изменено с 2px */
            padding: 1.5vmin 3vmin; /* Изменено с 15px 30px */
            border-radius: 1vmin; /* Изменено с 10px */
            cursor: pointer;
            transition: 0.2s; font-size: 1.1em; /* Изменено rem на em */
            width: 45%;
        }
        
        .option-btn:hover { border-color: #8b5cf6; }
        .option-btn.selected { background: rgba(139, 92, 246, 0.3); border-color: #8b5cf6; }
        
        .check-btn {
            margin-top: 3vmin; /* Изменено с 30px */
            background: #8b5cf6; color: white; border: none;
            padding: 1.5vmin 4vmin; /* Изменено с 15px 40px */
            font-size: 1.2em; /* Изменено rem на em */
            border-radius: 1vmin; /* Изменено с 10px */
            cursor: pointer;
        }

        /* Winner Screen */
        .winner-screen {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.9); z-index: 20; flex-direction: column;
            justify-content: center; align-items: center; color: white;
            font-size: 1em; /* Убедимся, что текст масштабируется с корневым размером шрифта */
        }
        .winner-screen h1 { font-size: 4em; color: ${liquidColor}; text-shadow: 0 0 2vmin ${liquidColor}; margin-bottom: 2vmin;} /* Изменено rem на em, тень с 20px на 2vmin */
        .winner-screen img {
            width:25vmin; /* Изменено с 200px */
            height:25vmin; /* Добавлена высота для квадратного аватара */
            border-radius:2vmin; /* Изменено с 20px */
            border: 0.5vmin solid ${liquidColor}; /* Изменено с 4px */
            object-fit: cover;
        }
        .winner-screen h2 { font-size: 2em; margin-top: 2vmin; } /* Добавлено */
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="players-container" id="pc"></div>

    <!-- Modal -->
    <div class="modal-bg" id="modalBg">
        <div class="modal">
            <div class="question" id="qText"></div>
            <div class="options" id="optsDiv"></div>
            <button class="check-btn" id="checkBtn" onclick="checkAnswer()">${txt.check}</button>
        </div>
    </div>

    <!-- Winner -->
    <div class="winner-screen" id="winnerScreen">
        <h1>${txt.win}</h1>
        <img id="winnerAvatar">
        <h2 id="winnerName"></h2>
    </div>

    <script>
        const state = ${JSON.stringify(gameState)};
        let currentPlayer = 0;
        let scores = Array(state.players.length).fill(0);
        let currentTaskIdx = 0;
        let selectedOption = null;

        function init() {
            if(state.players.length === 0) return;
            const pc = document.getElementById('pc');
            pc.innerHTML = state.players.map((p, i) => \`
                <div class="player-wrap \${i === 0 ? 'active' : ''}" id="p\${i}">
                    <button class="ready-btn" onclick="openTask()">\${state.txt.ready}</button>
                    <div class="flask">
                        <div class="liquid" id="liq\${i}" style="height: 0%;"></div>
                    </div>
                    <img src="\${p.url}" class="avatar">
                    <div class="name">\${p.name}</div>
                </div>
            \`).join('');
        }

        function openTask() {
            if(state.tasks.length === 0) return alert("Нет заданий!");
            
            // Randomize or sequence task
            currentTaskIdx = Math.floor(Math.random() * state.tasks.length);
            const task = state.tasks[currentTaskIdx];
            
            document.getElementById('qText').innerText = task.question;
            const optsDiv = document.getElementById('optsDiv');
            optsDiv.innerHTML = task.options.map((opt, i) => 
                \`<button class="option-btn" onclick="selectOpt(\${i}, this)">\${opt}</button>\`
            ).join('');
            
            selectedOption = null;
            document.querySelectorAll('.option-btn').forEach(btn => btn.classList.remove('selected')); // Clear previous selection visuals
            document.getElementById('modalBg').style.display = 'flex';
        }

        function selectOpt(idx, el) {
            selectedOption = idx;
            document.querySelectorAll('.option-btn').forEach(btn => btn.classList.remove('selected'));
            el.classList.add('selected');
        }

        function checkAnswer() {
            if(selectedOption === null) return;
            const task = state.tasks[currentTaskIdx];
            
            if(selectedOption === task.correctIdx) {
                scores[currentPlayer]++;
                const pcn = (scores[currentPlayer] / state.maxScore) * 100;
                document.getElementById('liq'+currentPlayer).style.height = pcn + '%';
                
                if(scores[currentPlayer] >= state.maxScore) {
                    showWinner();
                    return;
                }
            }
            
            document.getElementById('modalBg').style.display = 'none';
            nextTurn();
        }

        function nextTurn() {
            document.getElementById('p'+currentPlayer).classList.remove('active');
            currentPlayer = (currentPlayer + 1) % state.players.length;
            document.getElementById('p'+currentPlayer).classList.add('active');
        }

        function showWinner() {
            document.getElementById('modalBg').style.display = 'none';
            document.getElementById('winnerScreen').style.display = 'flex';
            document.getElementById('winnerAvatar').src = state.players[currentPlayer].url;
            document.getElementById('winnerName').innerText = state.players[currentPlayer].name;
        }

        window.onload = init;
    <\/script>
</body>
</html>`;
        }

        function updatePreview() {
            const html = getGameHTML();
            const iframe = document.getElementById('previewFrame');
            iframe.srcdoc = html;
        }

        function generateCode() {
            const html = getGameHTML();
            const btn = document.getElementById('generateBtn');
            
            navigator.clipboard.writeText(html).then(() => {
                btn.textContent = "Скопировано!";
                btn.classList.add('success');
                
                setTimeout(() => {
                    btn.textContent = "Сгенерировать код";
                    btn.classList.remove('success');
                }, 2000);
            }).catch(err => {
                alert("Ошибка копирования. Скопируйте код вручную из консоли.");
                console.log(html);
            });
        }
    </script>
</body>
</html>
