<!DOCTYPE html>
<html lang="${lang}">
<head>
    <meta charset="UTF-8">
    <title>${txt.gameTitle || 'Игра'}</title> <!-- Добавлен заголовок для вкладки браузера -->
    <style>
        /* 
         * ИСПРАВЛЕНИЯ ДЛЯ GENIALLY: 
         * 1. Шрифты: @import или <link> на внешние шрифты (например, Google Fonts) часто блокируются Genially
         *    из-за ограничений безопасности или iframe-среды.
         *    Для максимальной совместимости рекомендуется использовать системные шрифты (например, Arial, Verdana, sans-serif).
         *    Если нужен кастомный шрифт, попробуйте:
         *    а) Вставить его как @font-face напрямую с URL, разрешенным Genially,
         *    б) Использовать кодировку Base64 для очень маленьких шрифтов (увеличит размер кода HTML).
         */
        body { font-family: '${fontFamily}', sans-serif; } /* Использует заданный шрифт или системный sans-serif */

        /* ИСПРАВЛЕНИЕ ДЛЯ GENIALLY: Использование 100% вместо 100vw/100vh для базовых размеров */
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            /* 
             * Фон: Убедитесь, что bgUrl - это URL, а не слишком длинное Base64 изображение.
             * Если Base64 слишком длинное, Genially может обрезать код. Используйте оптимизированные URL.
             * Для лучшей производительности используйте сжатые изображения (например, WebP).
             */
            background: url('${bgUrl}') no-repeat center center/cover;
            display: flex; flex-direction: column; justify-content: flex-end; align-items: center;
            font-family: '${fontFamily}', sans-serif; /* Убедимся, что шрифт применяется */
            font-size: 1.6vmin; /* Базовый размер шрифта масштабируется по наименьшей стороне области просмотра.
                                   ВНИМАНИЕ: Иногда Genially может некорректно обрабатывать vmin/vw/vh.
                                   Если наблюдаются проблемы с масштабированием, попробуйте использовать rem или em
                                   и задать font-size на html или body, или использовать JavaScript для динамического расчета размеров. */
            box-sizing: border-box; /* Важно для корректного расчета размеров с отступами */
        }
        *, *::before, *::after {
            box-sizing: inherit; /* Все элементы наследуют box-sizing */
        }
        .overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); pointer-events: none; z-index: 1;}
        
        .players-container {
            display: flex; gap: 4vmin;
            margin-bottom: 6vmin;
            z-index: 2; position: relative;
        }
        
        .player-wrap {
            display: flex; flex-direction: column; align-items: center; position: relative;
            transition: 0.3s; opacity: 0.5;
        }
        
        .player-wrap.active {
            opacity: 1;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); filter: drop-shadow(0 0 1vmin rgba(139, 92, 246, 0.5)); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 2vmin rgba(139, 92, 246, 1)); }
            100% { transform: scale(1); filter: drop-shadow(0 0 1vmin rgba(139, 92, 246, 0.5)); }
        }

        .ready-btn {
            position: absolute; top: -20vmin;
            background: #8b5cf6; color: white; border: none;
            padding: 1.5vmin 3vmin;
            border-radius: 1vmin;
            font-weight: bold; cursor: pointer;
            box-shadow: 0 0 1.5vmin #8b5cf6; display: none; z-index: 5;
            font-size: 1em; /* Используем em для относительного размера шрифта */
        }
        
        .player-wrap.active .ready-btn { display: block; }
        .ready-btn:hover { background: #7c3aed; }

        .flask {
            width: 5vmin;
            height: 15vmin;
            border: 0.4vmin solid rgba(255,255,255,0.7);
            border-radius: 0 0 2.5vmin 2.5vmin; position: absolute; top: -17vmin;
            overflow: hidden; background: rgba(0,0,0,0.5);
            display: flex; align-items: flex-end;
        }
        
        .liquid {
            width: 100%; background: ${liquidColor}; transition: height 0.5s ease;
            box-shadow: 0 0 1vmin ${liquidColor};
        }

        /* 
         * Оптимизация изображений: Этот код устанавливает РАЗМЕР ОТОБРАЖЕНИЯ картинок
         * с помощью 'vmin' единиц, которые масштабируются относительно размера Genially-окна.
         * 
         * Для реального "сжатия" (уменьшения размера файла и ускорения загрузки)
         * изображения ДОЛЖНЫ быть предварительно оптимизированы и сжаты
         * перед загрузкой и использованием в Genially.
         * 
         * Genially может обрезать код, если URL изображений слишком длинные или данные Base64 слишком велики.
         * Используйте сервисы для сжатия изображений (например, TinyPNG, Squoosh) или CDN,
         * которые позволяют изменять размеры изображений по URL-параметрам (если возможно).
         */
        .avatar {
            width: calc(10vmin * ${avatarSize/100}); 
            height: calc(10vmin * ${avatarSize/100}); 
            border-radius: 2vmin;
            object-fit: cover;
            border: 0.3vmin solid white;
            background: #2a2a35;
            /* loading="lazy" помогает отложить загрузку изображений, которые не видны сразу */
        }

        .name { color: white; margin-top: 1vmin; font-weight: bold; background: rgba(0,0,0,0.7); padding: 0.5vmin 1vmin; border-radius: 0.5vmin; font-size: 1em;}

        /* Modal Task */
        .modal-bg {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.8); z-index: 10; justify-content: center; align-items: center;
        }
        
        .modal {
            background: #121212; border: 0.4vmin solid #8b5cf6;
            border-radius: 2vmin;
            padding: 4vmin;
            width: 80%; max-width: 600px; text-align: center;
            box-shadow: 0 0 3vmin rgba(139, 92, 246, 0.5); color: white;
        }

        .question { font-size: 1.5em; margin-bottom: 3vmin; }
        
        .options { display: flex; flex-wrap: wrap; gap: 1.5vmin; justify-content: center; }
        
        .option-btn {
            background: transparent; color: white; border: 0.2vmin solid #374151;
            padding: 1.5vmin 3vmin;
            border-radius: 1vmin;
            cursor: pointer;
            transition: 0.2s; font-size: 1.1em;
            width: 45%;
        }
        
        .option-btn:hover { border-color: #8b5cf6; }
        .option-btn.selected { background: rgba(139, 92, 246, 0.3); border-color: #8b5cf6; }
        
        .check-btn {
            margin-top: 3vmin; background: #8b5cf6; color: white; border: none;
            padding: 1.5vmin 4vmin; font-size: 1.2em; border-radius: 1vmin; cursor: pointer;
        }

        /* Winner Screen */
        .winner-screen {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.9); z-index: 20; flex-direction: column;
            justify-content: center; align-items: center; color: white;
            font-size: 1em;
        }
        .winner-screen h1 { font-size: 4em; color: ${liquidColor}; text-shadow: 0 0 2vmin ${liquidColor}; margin-bottom: 2vmin;}
        .winner-screen img {
            width:25vmin;
            height:25vmin;
            border-radius:2vmin;
            border: 0.5vmin solid ${liquidColor};
            object-fit: cover;
            /* loading="lazy" помогает отложить загрузку изображений, которые не видны сразу */
        }
        .winner-screen h2 { font-size: 2em; margin-top: 2vmin; }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="players-container" id="pc"></div>

    <!-- Modal -->
    <div class="modal-bg" id="modalBg">
        <div class="modal">
            <div class="question" id="qText"></div>
            <div class="options" id="optsDiv"></div>
            <button class="check-btn" id="checkBtn" onclick="checkAnswer()">${txt.check}</button>
        </div>
    </div>

    <!-- Winner -->
    <div class="winner-screen" id="winnerScreen">
        <h1>${txt.win}</h1>
        <img id="winnerAvatar" loading="lazy"> <!-- Добавлен атрибут loading="lazy" -->
        <h2 id="winnerName"></h2>
    </div>

    <script>
        // ИНЖЕКТИРОВАННЫЙ ОБЪЕКТ СОСТОЯНИЯ. Убедитесь, что он не слишком большой!
        // Genially может обрезать код, если объем данных слишком велик,
        // особенно для строки JSON. Старайтесь держать 'gameState' минимальным.
        const state = ${JSON.stringify(gameState)};
        let currentPlayer = 0;
        let scores = Array(state.players.length).fill(0);
        let currentTaskIdx = 0;
        let selectedOption = null;

        function init() {
            if(state.players.length === 0) return;
            const pc = document.getElementById('pc');
            pc.innerHTML = state.players.map((p, i) => \`
                <div class="player-wrap \${i === 0 ? 'active' : ''}" id="p\${i}">
                    <button class="ready-btn" onclick="openTask()">\${state.txt.ready}</button>
                    <div class="flask">
                        <div class="liquid" id="liq\${i}" style="height: 0%;"></div>
                    </div>
                    <img src="\${p.url}" class="avatar" loading="lazy"> <!-- Добавлен атрибут loading="lazy" -->
                    <div class="name">\${p.name}</div>
                </div>
            \`).join('');
        }

        function openTask() {
            if(state.tasks.length === 0) {
                alert(state.txt.noTasks || "Нет заданий!"); // Используем тексты из gameState
                return;
            }
            
            // Выбираем случайное задание, чтобы игра была более реиграбельной.
            // Если нужно, чтобы задания не повторялись до исчерпания, понадобится более сложная логика.
            currentTaskIdx = Math.floor(Math.random() * state.tasks.length);
            const task = state.tasks[currentTaskIdx];
            
            document.getElementById('qText').innerText = task.question;
            const optsDiv = document.getElementById('optsDiv');
            optsDiv.innerHTML = task.options.map((opt, i) => 
                \`<button class="option-btn" onclick="selectOpt(\${i}, this)">\${opt}</button>\`
            ).join('');
            
            selectedOption = null;
            document.querySelectorAll('.option-btn').forEach(btn => btn.classList.remove('selected'));
            document.getElementById('modalBg').style.display = 'flex';
        }

        function selectOpt(idx, el) {
            selectedOption = idx;
            document.querySelectorAll('.option-btn').forEach(btn => btn.classList.remove('selected'));
            el.classList.add('selected');
        }

        function checkAnswer() {
            if(selectedOption === null) {
                alert(state.txt.selectAnswer || "Пожалуйста, выберите ответ!"); // Используем тексты из gameState
                return;
            }
            const task = state.tasks[currentTaskIdx];
            
            if(selectedOption === task.correctIdx) {
                scores[currentPlayer]++;
                // Проверяем, что state.maxScore > 0, чтобы избежать деления на ноль
                const pcn = state.maxScore > 0 ? (scores[currentPlayer] / state.maxScore) * 100 : 0;
                document.getElementById('liq'+currentPlayer).style.height = pcn + '%';
                
                if(scores[currentPlayer] >= state.maxScore) {
                    showWinner();
                    return;
                }
            } else {
                // Опционально: можно добавить обратную связь при неправильном ответе
                // alert(state.txt.wrongAnswer || "Неправильный ответ!");
            }
            
            document.getElementById('modalBg').style.display = 'none';
            nextTurn();
        }

        function nextTurn() {
            document.getElementById('p'+currentPlayer).classList.remove('active');
            currentPlayer = (currentPlayer + 1) % state.players.length;
            document.getElementById('p'+currentPlayer).classList.add('active');
        }

        function showWinner() {
            document.getElementById('modalBg').style.display = 'none';
            document.getElementById('winnerScreen').style.display = 'flex';
            document.getElementById('winnerAvatar').src = state.players[currentPlayer].url;
            document.getElementById('winnerName').innerText = state.players[currentPlayer].name;
        }

        // Используем DOMContentLoaded для более ранней инициализации скрипта
        document.addEventListener('DOMContentLoaded', init);
        // Fallback на window.onload, если DOMContentLoaded вызывает проблемы (менее вероятно)
        // window.onload = init; 
    <\/script>
</body>
</html>
