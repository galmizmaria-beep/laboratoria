<script>
    /* --- JavaScript для редактора и генерации кода --- */
    document.addEventListener('DOMContentLoaded', () => {
        const playersContainer = document.getElementById('playersContainer');
        const addPlayerBtn = document.getElementById('addPlayerBtn');
        const playerCountText = document.getElementById('playerCountText');
        const playerTemplate = document.getElementById('playerTemplate');
        const questionTemplate = document.getElementById('questionTemplate');
        const generateCodeBtn = document.getElementById('generateCodeBtn');
        const copyCodeBtn = document.getElementById('copyCodeBtn');
        const outputCode = document.getElementById('outputCode');
        const bgImageUpload = document.getElementById('bgImageUpload');
        const bgImageUrl = document.getElementById('bgImageUrl');
        const bgImagePreview = document.getElementById('bgImagePreview').querySelector('img');
        const gamePreviewFrame = document.getElementById('gamePreviewFrame');

        let playersData = []; // Array to store configuration for each player
        let previewObjectURL = null; // Для отзыва URL объекта предпросмотра и предотвращения утечек памяти

        // --- Utility Functions ---

        // Функция для экранирования HTML-специальных символов (для HTML, не CSS url())
        function escapeHtml(unsafe) {
            return unsafe
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // НОВАЯ вспомогательная функция для экранирования строки для встраивания в шаблонный литерал JS
        function escapeForTemplateLiteral(str) {
            if (typeof str !== 'string') return str;
            // Экранируем обратные кавычки обратным слэшем
            return str.replace(/`/g, '\\`');
        }

        // Function to compress image using canvas
        async function compressImage(fileOrUrl, maxWidth = 800, maxHeight = 800, quality = 0.8) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;

                    // Calculate new dimensions
                    if (width > height) {
                        if (width > maxWidth) {
                            height *= maxWidth / width;
                            width = maxWidth;
                        }
                    } else {
                        if (height > maxHeight) {
                            width *= maxHeight / height;
                            height = maxHeight;
                        }
                    }
                    canvas.width = width;
                    canvas.height = height;

                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    // Convert canvas to JPEG data URL
                    resolve(canvas.toDataURL('image/jpeg', quality));
                };

                img.onerror = () => {
                    console.warn('Failed to load image for compression, using original URL/empty string.', fileOrUrl);
                    // Fallback to original URL or empty. Important for external URLs without CORS.
                    resolve(typeof fileOrUrl === 'string' && fileOrUrl.startsWith('http') ? fileOrUrl : ''); 
                };
                
                if (typeof fileOrUrl === 'string' && fileOrUrl.startsWith('data:')) {
                    img.src = fileOrUrl; // Already a data URL, process it
                } else if (typeof fileOrUrl === 'string' && fileOrUrl.startsWith('http')) {
                     img.crossOrigin = "anonymous"; // Attempt to load cross-origin for external images
                     img.src = fileOrUrl;
                } else if (fileOrUrl instanceof File) {
                    const reader = new FileReader();
                    reader.onload = (e) => { img.src = e.target.result; };
                    reader.readAsDataURL(fileOrUrl);
                } else {
                    resolve(''); // No valid input
                }
            });
        }

        function updatePlayerCount() {
            playerCountText.textContent = playersData.length;
            addPlayerBtn.disabled = playersData.length >= 4;
        }

        // Функция для обновления предварительного просмотра изображений (аватар и фон)
        async function updateImagePreview(fileInput, urlInput, previewImgElement) {
            let imageData = '';
            if (fileInput && fileInput.files && fileInput.files[0]) {
                imageData = await compressImage(fileInput.files[0]);
                if (urlInput) urlInput.value = ''; // Clear URL if file is uploaded
            } else if (urlInput && urlInput.value) {
                imageData = await compressImage(urlInput.value); 
                // Если сжатие не удалось или вернулся оригинальный URL, используем оригинальный URL
                if (!imageData || (imageData === urlInput.value && !imageData.startsWith('data:'))) {
                    imageData = urlInput.value; 
                }
                if (fileInput) fileInput.value = ''; // Clear file input if URL is entered
            }

            if (imageData) {
                previewImgElement.src = imageData;
                previewImgElement.style.display = 'block';
            } else {
                previewImgElement.src = '#';
                previewImgElement.style.display = 'none';
            }
            return imageData; // Возвращаем обработанные данные изображения
        }

        // --- Player Management ---
        addPlayerBtn.addEventListener('click', () => {
            if (playersData.length < 4) {
                const playerIndex = playersData.length;
                const playerConfig = {
                    id: Date.now(), // Unique ID for keying
                    name: `Игрок ${playerIndex + 1}`, // Исправлено: Начальное имя с номером
                    avatar: '', // data URL или внешний URL
                    questions: []
                };
                playersData.push(playerConfig);
                renderPlayer(playerConfig, playerIndex);
                updatePlayerCount();
            }
        });

        function renderPlayer(playerConfig, playerIndex) {
            const clone = playerTemplate.content.cloneNode(true);
            const playerDiv = clone.querySelector('.player-config');
            playerDiv.dataset.playerId = playerConfig.id;
            playerDiv.querySelector('.player-number').textContent = playerIndex + 1;

            const playerNameInput = playerDiv.querySelector('.player-name');
            playerNameInput.value = playerConfig.name;
            playerNameInput.addEventListener('input', (e) => {
                playerConfig.name = e.target.value;
            });

            const avatarUrlInput = playerDiv.querySelector('.avatar-url');
            const avatarUploadInput = playerDiv.querySelector('.avatar-upload');
            const avatarPreviewImg = playerDiv.querySelector('.avatar-preview img');

            // Устанавливаем начальное значение URL аватара
            avatarUrlInput.value = playerConfig.avatar; 
            // Обновляем предпросмотр, если уже есть аватар
            if (playerConfig.avatar) {
                avatarPreviewImg.src = playerConfig.avatar;
                avatarPreviewImg.style.display = 'block';
            }

            avatarUrlInput.addEventListener('input', async () => {
                playerConfig.avatar = await updateImagePreview(null, avatarUrlInput, avatarPreviewImg); // Передаем null для fileInput
            });

            avatarUploadInput.addEventListener('change', async () => {
                playerConfig.avatar = await updateImagePreview(avatarUploadInput, avatarUrlInput, avatarPreviewImg);
            });

            const removePlayerBtn = playerDiv.querySelector('.remove-player-btn');
            removePlayerBtn.addEventListener('click', () => {
                playersData = playersData.filter(p => p.id !== playerConfig.id);
                // Перерисовываем всех игроков, чтобы обновить номера и привязки событий
                playersContainer.innerHTML = ''; 
                playersData.forEach((p, idx) => renderPlayer(p, idx));
                updatePlayerCount();
            });

            const questionsContainer = playerDiv.querySelector('.questions-container');
            const addQuestionBtn = playerDiv.querySelector('.add-question-btn');
            addQuestionBtn.addEventListener('click', () => {
                const newQuestion = {
                    type: 'open',
                    text: '',
                    options: ['', '', '', ''],
                    correctAnswerIndex: -1 // -1 means no correct answer selected for MC
                };
                playerConfig.questions.push(newQuestion);
                renderQuestion(newQuestion, playerConfig, questionsContainer, playerConfig.questions.length - 1);
            });

            // Render existing questions
            questionsContainer.innerHTML = ''; // Очищаем перед рендерингом, чтобы избежать дублирования
            playerConfig.questions.forEach((qObj, qIdx) => renderQuestion(qObj, playerConfig, questionsContainer, qIdx));

            // Append to container or re-insert if re-rendering
            const existingPlayerDiv = playersContainer.querySelector(`[data-player-id="${playerConfig.id}"]`);
            if (existingPlayerDiv) {
                existingPlayerDiv.replaceWith(playerDiv);
            } else {
                playersContainer.appendChild(clone);
            }
        }

        function renderQuestion(questionObj, playerConfig, questionsContainer, questionIndex) {
            const clone = questionTemplate.content.cloneNode(true);
            const questionItemDiv = clone.querySelector('.question-item');
            
            const questionTypeSelect = questionItemDiv.querySelector('.question-type');
            const questionTextInput = questionItemDiv.querySelector('.question-text');
            const mcOptionsContainer = questionItemDiv.querySelector('.mc-options-container');
            const optionInputs = questionItemDiv.querySelectorAll('.option-text');
            const correctOptionRadios = questionItemDiv.querySelectorAll('.correct-option-radio');

            // Set initial values
            questionTypeSelect.value = questionObj.type;
            questionTextInput.value = questionObj.text;
            if (questionObj.type === 'mc') {
                mcOptionsContainer.style.display = 'block';
                questionObj.options.forEach((opt, idx) => {
                    if (optionInputs[idx]) optionInputs[idx].value = opt;
                });
                if (questionObj.correctAnswerIndex !== -1 && correctOptionRadios[questionObj.correctAnswerIndex]) {
                    correctOptionRadios[questionObj.correctAnswerIndex].checked = true;
                }
            } else {
                mcOptionsContainer.style.display = 'none';
            }

            // Event Listeners
            questionTypeSelect.addEventListener('change', (e) => {
                questionObj.type = e.target.value;
                mcOptionsContainer.style.display = (e.target.value === 'mc') ? 'block' : 'none';
                // Reset MC specific data if changing to open-ended
                if (e.target.value === 'open') {
                    questionObj.options = ['', '', '', ''];
                    questionObj.correctAnswerIndex = -1;
                    optionInputs.forEach(input => input.value = '');
                    correctOptionRadios.forEach(radio => radio.checked = false);
                }
            });

            questionTextInput.addEventListener('input', (e) => {
                questionObj.text = e.target.value;
            });

            optionInputs.forEach((input, idx) => {
                input.addEventListener('input', (e) => {
                    questionObj.options[idx] = e.target.value;
                });
            });

            correctOptionRadios.forEach((radio, idx) => {
                radio.name = `correct-option-${playerConfig.id}-${questionIndex}`; // Unique name per question
                radio.addEventListener('change', () => {
                    if (radio.checked) {
                        questionObj.correctAnswerIndex = idx;
                    }
                });
            });

            const removeQuestionBtn = questionItemDiv.querySelector('.remove-question-btn');
            removeQuestionBtn.addEventListener('click', () => {
                // Удаляем вопрос из массива игрока
                playerConfig.questions.splice(questionIndex, 1);
                // Очищаем и перерисовываем все вопросы для этого игрока, чтобы обновить индексы и радио-кнопки
                questionsContainer.innerHTML = ''; 
                playerConfig.questions.forEach((qObj, qIdx) => renderQuestion(qObj, playerConfig, questionsContainer, qIdx));
            });

            questionsContainer.appendChild(clone);
        }

        // --- Global Image Preview for Background ---
        let bgImageFinalData = ''; // Переменная для хранения окончательных данных фонового изображения
        bgImageUpload.addEventListener('change', async () => {
            bgImageFinalData = await updateImagePreview(bgImageUpload, bgImageUrl, bgImagePreview);
        });
        bgImageUrl.addEventListener('input', async () => {
            bgImageFinalData = await updateImagePreview(null, bgImageUrl, bgImagePreview); // Передаем null для fileInput
        });


        // --- Code Generation ---
        generateCodeBtn.addEventListener('click', async () => {
            const gameLang = document.getElementById('gameLang').value;
            const titleFont = document.getElementById('titleFont').value;
            const uiFont = document.getElementById('uiFont').value;
            const avatarSize = document.getElementById('avatarSize').value;
            const liquidColor = document.getElementById('liquidColor').value;
            const highlightColor = document.getElementById('highlightColor').value;
            const pointsToWin = parseInt(document.getElementById('pointsToWin').value);

            // Ensure background image data is up-to-date before final generation
            bgImageFinalData = await updateImagePreview(bgImageUpload, bgImageUrl, bgImagePreview);


            // Finalize players data, ensuring avatars are processed
            const finalPlayersData = [];
            for (const player of playersData) {
                const playerDiv = playersContainer.querySelector(`.player-config[data-player-id="${player.id}"]`);
                const avatarUploadInput = playerDiv.querySelector('.avatar-upload');
                const avatarUrlInput = playerDiv.querySelector('.avatar-url');
                const avatarPreviewImg = playerDiv.querySelector('.avatar-preview img');
                
                // Обновляем и получаем окончательные данные аватара
                const finalAvatar = await updateImagePreview(avatarUploadInput, avatarUrlInput, avatarPreviewImg);

                finalPlayersData.push({
                    name: player.name,
                    avatar: finalAvatar,
                    questions: player.questions.filter(q => q.text.trim() !== '') // Filter out questions with empty text
                });
            }
            
            // Basic validation
            if (finalPlayersData.length === 0) {
                alert('Пожалуйста, добавьте хотя бы одного игрока.');
                return;
            }
            for (const player of finalPlayersData) {
                if (!player.avatar) {
                    alert(`Игрок "${player.name}" не имеет аватара. Пожалуйста, укажите URL или загрузите файл.`);
                    return;
                }
                if (player.questions.length < pointsToWin) {
                    alert(`Игрок "${player.name}" имеет меньше вопросов (${player.questions.length}) чем "Очков для победы" (${pointsToWin}). Добавьте больше вопросов.`);
                    return;
                }
                if (player.questions.some(q => q.type === 'mc' && (q.correctAnswerIndex === -1 || q.options.filter(o => o.trim() !== '').length < 2))) {
                    alert(`Игрок "${player.name}" имеет вопросы с вариантами ответа, где не выбран правильный ответ или недостаточно вариантов. Проверьте все вопросы.`);
                    return;
                }
            }

            // Экранируем URL для CSS, чтобы избежать проблем со специальными символами
            const escapedBgImageUrl = escapeHtml(bgImageFinalData);

            // Экранируем обратные кавычки в JSON-строке, прежде чем встраивать ее в шаблонный литерал
            const rawGameDataString = JSON.stringify(finalPlayersData, null, 2);
            const safeGameData = escapeForTemplateLiteral(rawGameDataString);

            // --- START OF GENIALLY WIDGET CODE GENERATION ---
            const generatedHtmlContent = `

        const gameOverTitle = document.getElementById('gameOverTitle');
        const gameOverMessage = document.getElementById('gameOverMessage');
        const restartGameButton = document.getElementById('restartGameButton');
        const gameTitleElement = document.querySelector('.game-title');

        let currentPlayerIndex = 0;
        let playerScores = Array(gameData.length).fill(0);
        let playerQuestionIndexes = Array(gameData.length).fill(0); // Track which question is next for each player
        let gameActive = true;
        let selectedOption = -1; // For multiple choice questions

        gameTitleElement.textContent = texts[LANGUAGE].gameTitle;

        function initializeGame() {
            playerContainer.innerHTML = '';
            playerScores = Array(gameData.length).fill(0);
            playerQuestionIndexes = Array(gameData.length).fill(0);
            currentPlayerIndex = 0;
            gameActive = true;
            modalFeedback.style.display = 'none';

            gameData.forEach((player, index) => {
                const playerCard = document.createElement('div');
                playerCard.classList.add('player-card');
                playerCard.dataset.playerIndex = index;

                const avatarFrame = document.createElement('div');
                avatarFrame.classList.add('avatar-frame');
                const avatarImg = document.createElement('img');
                avatarImg.src = player.avatar;
                avatarImg.alt = player.name;
                avatarFrame.appendChild(avatarImg);

                const playerName = document.createElement('div');
                playerName.classList.add('player-name');
                playerName.textContent = player.name;

                const flaskContainer = document.createElement('div');
                flaskContainer.classList.add('flask-container');
                const liquid = document.createElement('div');
                liquid.classList.add('liquid');
                liquid.style.height = '0%';
                flaskContainer.appendChild(liquid);

                const fillButton = document.createElement('button');
                fillButton.classList.add('fill-button');
                fillButton.textContent = texts[LANGUAGE].takeTurn;
                fillButton.addEventListener('click', () => handlePlayerTurn(index));

                playerCard.append(avatarFrame, playerName, flaskContainer, fillButton);
                playerContainer.appendChild(playerCard);
            });
            updateActivePlayerHighlight();
            gameOverOverlay.classList.remove('active');
        }

        function updateActivePlayerHighlight() {
            document.querySelectorAll('.player-card').forEach((card, index) => {
                if (index === currentPlayerIndex) {
                    card.classList.add('active');
                } else {
                    card.classList.remove('active');
                }
            });
        }

        function handlePlayerTurn(playerIdx) {
            if (!gameActive || playerIdx !== currentPlayerIndex) return;

            const player = gameData[playerIdx];
            const currentQuestionIdx = playerQuestionIndexes[playerIdx];

            if (currentQuestionIdx >= player.questions.length) {
                // This scenario should be caught by editor validation, but a fallback is good
                alert(LANGUAGE === 'ru' ? 'У этого игрока больше нет вопросов!' : 'This player has no more questions!');
                // Automatically move to next player if no questions left for current
                moveToNextPlayer();
                return;
            }

            const question = player.questions[currentQuestionIdx];
            modalQuestionTitle.textContent = `${texts[LANGUAGE].questionTitle} ${player.name}`;
            modalQuestionText.textContent = question.text;
            modalFeedback.style.display = 'none';
            selectedOption = -1; // Reset selected option

            modalOptionsContainer.innerHTML = ''; // Clear previous options
            modalOptionsContainer.style.display = 'none'; // Hide by default

            if (question.type === 'mc') {
                modalOptionsContainer.style.display = 'flex';
                question.options.forEach((optionText, idx) => {
                    if (optionText.trim() === '') return; // Skip empty options
                    const optionDiv = document.createElement('label');
                    optionDiv.classList.add('modal-option');
                    const radio = document.createElement('input');
                    radio.type = 'radio';
                    radio.name = 'mc-option';
                    radio.value = idx;
                    radio.addEventListener('change', () => {
                        selectedOption = parseInt(radio.value);
                        document.querySelectorAll('.modal-option').forEach(opt => opt.classList.remove('selected'));
                        optionDiv.classList.add('selected');
                    });
                    optionDiv.append(radio, document.createTextNode(optionText));
                    modalOptionsContainer.appendChild(optionDiv);
                });
                modalActionButton.textContent = texts[LANGUAGE].checkAnswer;
                modalActionButton.onclick = () => checkAnswer(playerIdx, question);
            } else { // 'open' type
                modalActionButton.textContent = texts[LANGUAGE].nextTurn; 
                modalActionButton.onclick = () => {
                    fillFlask(playerIdx);
                    questionOverlay.classList.remove('active');
                    moveToNextPlayer();
                };
            }
            questionOverlay.classList.add('active');
        }

        function checkAnswer(playerIdx, question) {
            if (selectedOption === -1) {
                modalFeedback.textContent = texts[LANGUAGE].selectOption;
                modalFeedback.classList.remove('correct', 'incorrect');
                modalFeedback.style.display = 'block';
                return;
            }

            modalFeedback.style.display = 'block';
            if (selectedOption === question.correctAnswerIndex) {
                modalFeedback.textContent = texts[LANGUAGE].correctAnswer;
                modalFeedback.classList.remove('incorrect');
                modalFeedback.classList.add('correct');
                modalActionButton.textContent = texts[LANGUAGE].nextTurn; // Change button to "Next Turn"
                modalActionButton.onclick = () => {
                    fillFlask(playerIdx);
                    questionOverlay.classList.remove('active');
                    moveToNextPlayer();
                };
            } else {
                modalFeedback.textContent = texts[LANGUAGE].incorrectAnswer;
                modalFeedback.classList.remove('correct');
                modalFeedback.classList.add('incorrect');
                // For incorrect answer, don't fill flask, just move to next player
                modalActionButton.textContent = texts[LANGUAGE].nextTurn; // Change button to "Next Turn"
                modalActionButton.onclick = () => {
                    questionOverlay.classList.remove('active');
                    moveToNextPlayer(); // Move turn to next player even if incorrect
                };
            }
        }

        function fillFlask(playerIdx) {
            if (!gameActive) return;

            playerScores[playerIdx]++;
            playerQuestionIndexes[playerIdx]++;

            const playerCard = document.querySelector(`.player-card[data-player-index="${playerIdx}"]`);
            const liquid = playerCard.querySelector('.liquid');
            const newHeight = (playerScores[playerIdx] / POINTS_TO_WIN) * 100;
            liquid.style.height = `${newHeight}%`;

            if (playerScores[playerIdx] >= POINTS_TO_WIN) {
                endGame(playerIdx);
            }
        }

        function moveToNextPlayer() {
            if (!gameActive) return;
            currentPlayerIndex = (currentPlayerIndex + 1) % gameData.length;
            updateActivePlayerHighlight();
            modalFeedback.style.display = 'none'; // Hide feedback for next turn
        }

        function endGame(winnerIndex) {
            gameActive = false;
            const winnerName = gameData[winnerIndex].name;
            gameOverTitle.textContent = texts[LANGUAGE].gameOverTitle;
            gameOverMessage.textContent = `${texts[LANGUAGE].gameOverMessage}${winnerName}!`;
            restartGameButton.textContent = texts[LANGUAGE].restartGame;
            restartGameButton.onclick = initializeGame;
            gameOverOverlay.classList.add('active');
        }

        initializeGame(); // Start the game on load
    </script>
</body>
</html>
