<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактор игры: Лаборатория (Genially)</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&family=Montserrat:wght@400;700;800&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep-space: #0b0616;
            --bg-panel: rgba(26, 15, 46, 0.9);
            --bg-card: #1d1033;
            --neon-purple: #9d4edd;
            --neon-purple-hover: #b975f8;
            --neon-blue: #00f5ff;
            --text-light: #eaddf8;
            --text-muted: #9f8bb3;
            --border-color: #3b2266;
            --success: #10b981;
            --danger: #ef4444;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'DM Sans', sans-serif;
            background: radial-gradient(circle at 50% 0%, #29124f 0%, var(--bg-deep-space) 80%);
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #app-container {
            width: 100vw;
            max-width: calc(100vh * (16 / 9));
            height: 100vh;
            max-height: calc(100vw * (9 / 16));
            display: flex;
            background: var(--bg-panel);
            backdrop-filter: blur(15px);
            box-shadow: 0 0 50px rgba(157, 78, 221, 0.15);
            overflow: hidden;
            border: 1px solid rgba(157, 78, 221, 0.2);
        }

        .sidebar {
            width: 35%;
            max-width: 450px;
            background-color: transparent;
            border-right: 1px solid var(--border-color);
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .sidebar::-webkit-scrollbar { width: 6px; }
        .sidebar::-webkit-scrollbar-track { background: var(--bg-deep-space); }
        .sidebar::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }
        .sidebar::-webkit-scrollbar-thumb:hover { background: var(--neon-purple); }

        .sidebar h2 {
            margin: 0 0 10px 0;
            font-size: 1.3rem;
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid var(--neon-purple);
            padding-bottom: 8px;
            box-shadow: 0 5px 15px -10px var(--neon-purple);
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 15px;
        }

        .form-group label {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, select, button {
            background-color: var(--bg-card);
            color: var(--text-light);
            border: 1px solid var(--border-color);
            padding: 12px 15px;
            border-radius: 12px;
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--neon-purple);
            box-shadow: 0 0 10px rgba(157, 78, 221, 0.3);
            background-color: rgba(29, 16, 51, 0.8);
        }

        input[type="color"] {
            padding: 2px 5px;
            height: 45px;
            width: 100%;
            cursor: pointer;
        }

        input[type="range"] {
            padding: 0;
            accent-color: var(--neon-purple);
        }

        button {
            background-color: rgba(157, 78, 221, 0.1);
            color: var(--neon-purple);
            border: 1px solid var(--neon-purple);
            cursor: pointer;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 30px;
        }

        button:hover {
            background-color: var(--neon-purple);
            color: #fff;
            box-shadow: 0 0 15px rgba(157, 78, 221, 0.5);
        }

        .card {
            background-color: var(--bg-card);
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 15px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .card button {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border-color: var(--danger);
            font-size: 0.8rem;
            padding: 8px 12px;
            margin-top: 10px;
        }
        
        .card button:hover {
            background: var(--danger);
            color: white;
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.4);
        }

        .card button.add-option-btn {
            background: rgba(0, 245, 255, 0.1);
            color: var(--neon-blue);
            border-color: var(--neon-blue);
        }
        .card button.add-option-btn:hover {
            background: var(--neon-blue);
            color: #000;
        }

        .card button.remove-option-btn {
            padding: 6px 10px;
            font-size: 0.75rem;
            margin-top: 0;
            margin-left: 5px;
        }

        .card input[type="radio"] {
            accent-color: var(--neon-blue);
            width: 20px;
            height: 20px;
            margin-top: 10px;
        }
        
        .info-message {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: -10px;
            margin-bottom: 10px;
            text-align: center;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 25px;
            background: transparent;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .header h2 {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 1.8rem;
            color: #fff;
        }

        .preview-container {
            flex: 1;
            background-color: #000;
            border: 2px solid var(--border-color);
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .generate-btn {
            padding: 12px 30px;
            font-size: 1rem;
            background-color: var(--neon-purple);
            color: white;
            border-color: var(--neon-purple);
            box-shadow: 0 0 15px rgba(157, 78, 221, 0.4);
        }
        
        .generate-btn:hover {
            background-color: var(--neon-purple-hover);
            box-shadow: 0 0 25px rgba(157, 78, 221, 0.6);
            transform: translateY(-2px);
        }

        .generate-btn.success {
            background-color: var(--success);
            border-color: var(--success);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.5);
            color: white;
        }

        .task-type-select {
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <div id="app-container">
        <div class="sidebar">
            <h2>Общие настройки</h2>
            
            <div class="form-group">
                <label>Язык игры</label>
                <select id="lang" onchange="updatePreview()">
                    <option value="ru">Русский</option>
                    <option value="en">English</option>
                </select>
            </div>

            <div class="form-group">
                <label>Шрифт</label>
                <select id="fontFamily" onchange="updatePreview()">
                    <option value="DM Sans">DM Sans</option>
                    <option value="Montserrat">Montserrat</option>
                    <option value="Roboto">Roboto</option>
                </select>
            </div>

            <div class="form-group">
                <label>Очки для победы (полная колба)</label>
                <input type="number" id="maxScore" value="5" min="1" onchange="updatePreview()">
            </div>

            <div class="form-group">
                <label>Цвет жидкости</label>
                <input type="color" id="liquidColor" value="#00ffcc" onchange="updatePreview()">
            </div>

            <div class="form-group">
                <label>Фон игры (URL)</label>
                <input type="text" id="bgUrl" placeholder="Ссылка на картинку (оставьте пустым для прозрачности)" onchange="updatePreview()">
                <div class="info-message">Для лучшей производительности используйте оптимизированные изображения.</div>
            </div>

            <div class="form-group">
                <label>Размер аватаров (%)</label>
                <input type="range" id="avatarSize" min="50" max="150" value="100" onchange="updatePreview()">
            </div>

            <h2>Игроки (Аватары)</h2>
            <div id="playersList"></div>
            <button onclick="addPlayer()">+ Добавить игрока (до 4)</button>

            <h2 style="margin-top: 10px;">Задания (Вопросы)</h2>
            <div id="tasksList"></div>
            <button onclick="addTask()">+ Добавить вопрос</button>
        </div>

        <div class="main-content">
            <div class="header">
                <h2>Предпросмотр</h2>
                <button id="generateBtn" class="generate-btn" onclick="generateCode()">Сгенерировать код</button>
            </div>
            <div class="preview-container">
                <iframe id="previewFrame"></iframe>
            </div>
        </div>
    </div>

    <script>
        let config = {
            players: [],
            tasks: []
        };

        window.onload = () => {
            document.getElementById('bgUrl').value = ''; 
            addPlayer('Игрок 1', 'https://cdn-icons-png.flaticon.com/512/4140/4140048.png'); 
            addPlayer('Игрок 2', 'https://cdn-icons-png.flaticon.com/512/4140/4140047.png');
            addTask('choice', 'Сколько будет 2+2?', ['3', '4', '5'], 1);
            addTask('input', 'Столица Франции?', [], 0, 'Париж');
            updatePreview();
        };

        function addPlayer(name = '', url = '') {
            if (config.players.length >= 4) return console.warn("Максимум 4 игрока!");
            let id = Date.now() + Math.random();
            config.players.push({ id, name, url });
            renderPlayers();
            updatePreview();
        }

        function removePlayer(id) {
            config.players = config.players.filter(p => p.id !== id);
            renderPlayers();
            updatePreview();
        }

        function addTask(type = 'choice', q = '', options = ['', ''], correctIdx = 0, correctText = '') {
            let id = Date.now() + Math.random();
            config.tasks.push({ id, type, question: q, options: [...options], correctIdx, correctText });
            renderTasks();
            updatePreview();
        }

        function removeTask(id) {
            config.tasks = config.tasks.filter(t => t.id !== id);
            renderTasks();
            updatePreview();
        }

        function addOptionToTask(idx) {
            config.tasks[idx].options.push('');
            renderTasks();
            updatePreview();
        }

        function removeOptionFromTask(idx, oIdx) {
            if (config.tasks[idx].options.length <= 2) return;
            config.tasks[idx].options.splice(oIdx, 1);
            if (config.tasks[idx].correctIdx >= config.tasks[idx].options.length) {
                config.tasks[idx].correctIdx = 0;
            }
            renderTasks();
            updatePreview();
        }

        function changeTaskType(idx, newType) {
            config.tasks[idx].type = newType;
            if (newType === 'choice' && config.tasks[idx].options.length < 2) {
                config.tasks[idx].options = ['', ''];
            }
            renderTasks();
            updatePreview();
        }

        function renderPlayers() {
            const container = document.getElementById('playersList');
            container.innerHTML = '';
            config.players.forEach((p, idx) => {
                container.innerHTML += `
                    <div class="card">
                        <div class="form-group">
                            <input type="text" placeholder="Имя" value="${p.name}" onchange="config.players[${idx}].name=this.value; updatePreview()">
                            <input type="text" id="p_url_${p.id}" placeholder="URL Аватара" value="${p.url}" onchange="config.players[${idx}].url=this.value; updatePreview()">
                            <button onclick="removePlayer(${p.id})">Удалить</button>
                        </div>
                    </div>`;
            });
        }

        function renderTasks() {
            const container = document.getElementById('tasksList');
            container.innerHTML = '';
            config.tasks.forEach((t, idx) => {
                let typeSelect = `
                    <select class="task-type-select" onchange="changeTaskType(${idx}, this.value)" style="margin-bottom:10px;">
                        <option value="choice" ${t.type === 'choice' ? 'selected' : ''}>Выбор ответа</option>
                        <option value="input" ${t.type === 'input' ? 'selected' : ''}>Ввод ответа</option>
                    </select>
                `;

                let bodyHTML = '';
                if (t.type === 'choice') {
                    let optionsHTML = t.options.map((opt, oIdx) => `
                        <div style="display:flex; gap:10px; margin-top:10px; align-items:center;">
                            <input type="radio" name="correct_${idx}" ${t.correctIdx === oIdx ? 'checked' : ''} onchange="config.tasks[${idx}].correctIdx=${oIdx}; updatePreview()">
                            <input type="text" placeholder="Вариант ${oIdx+1}" value="${opt}" onchange="config.tasks[${idx}].options[${oIdx}]=this.value; updatePreview()" style="flex:1;">
                            ${t.options.length > 2 ? `<button class="remove-option-btn" onclick="removeOptionFromTask(${idx}, ${oIdx})">✕</button>` : ''}
                        </div>
                    `).join('');
                    bodyHTML = optionsHTML + `<button class="add-option-btn" onclick="addOptionToTask(${idx})" style="margin-top:10px;">+ Вариант</button>`;
                } else {
                    bodyHTML = `
                        <div class="form-group" style="margin-top:10px;">
                            <label>Правильный ответ (текст)</label>
                            <input type="text" placeholder="Введите правильный ответ" value="${t.correctText || ''}" onchange="config.tasks[${idx}].correctText=this.value; updatePreview()">
                        </div>
                    `;
                }

                container.innerHTML += `
                    <div class="card">
                        ${typeSelect}
                        <input type="text" placeholder="Текст вопроса" value="${t.question}" onchange="config.tasks[${idx}].question=this.value; updatePreview()" style="width:calc(100% - 30px);">
                        ${bodyHTML}
                        <button onclick="removeTask(${t.id})">Удалить вопрос</button>
                    </div>`;
            });
        }

        function getGameHTML() {
            const lang = document.getElementById('lang').value;
            const bgUrl = document.getElementById('bgUrl').value; 
            const liquidColor = document.getElementById('liquidColor').value;
            const maxScore = document.getElementById('maxScore').value;
            const fontFamily = document.getElementById('fontFamily').value;
            const avatarSize = document.getElementById('avatarSize').value;
            
            const txt = lang === 'ru' ? { ready: 'ИГРАТЬ', check: 'ПРОВЕРИТЬ', win: 'ПОБЕДА!', next: 'Следующий ход', inputPlaceholder: 'Введите ответ...' } 
                                      : { ready: 'READY', check: 'CHECK', win: 'WINNER!', next: 'Next Turn', inputPlaceholder: 'Type your answer...' };

            // Фильтруем пустые варианты для choice
            const cleanTasks = config.tasks.map(t => {
                if (t.type === 'choice') {
                    const filtered = t.options.filter(o => o.trim() !== '');
                    let ci = t.correctIdx;
                    if (ci >= filtered.length) ci = 0;
                    return { ...t, options: filtered, correctIdx: ci };
                }
                return { ...t };
            });

            const gameState = {
                players: config.players,
                tasks: cleanTasks,
                maxScore: parseInt(maxScore),
                txt: txt
            };

            const gameBackgroundStyle = bgUrl ? `background: url('${bgUrl}') no-repeat center center/cover;` : `background: transparent;`;

            return `<!DOCTYPE html>
<html lang="${lang}">
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=${fontFamily.replace(' ', '+')}&display=swap');

html, body { 
    margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
    font-family: '${fontFamily}', sans-serif;
    box-sizing: border-box;
    background: transparent;
}
*, *::before, *::after { box-sizing: inherit; }

#gameRoot {
    width: 100%; height: 100%;
    ${gameBackgroundStyle}
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    box-sizing: border-box;
    position: relative;
}

.overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); z-index: 1;}

.players-container {
    display: flex; gap: 4%;
    z-index: 2;
    position: relative;
    align-items: flex-end;
}

.player-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    transition: 0.3s; opacity: 0.5;
    gap: 2%;
    justify-content: flex-end;
}

.player-wrap.active {
    opacity: 1;
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); filter: drop-shadow(0 0 8px rgba(139, 92, 246, 0.5)); }
    50% { transform: scale(1.05); filter: drop-shadow(0 0 16px rgba(139, 92, 246, 1)); }
    100% { transform: scale(1); filter: drop-shadow(0 0 8px rgba(139, 92, 246, 0.5)); }
}

.ready-btn {
    background: #8b5cf6; color: white; border: none;
    padding: 12px 24px;
    border-radius: 8px;
    font-weight: bold; cursor: pointer;
    box-shadow: 0 0 12px #8b5cf6; display: none; z-index: 5;
    font-size: 16px;
    white-space: nowrap;
    margin-bottom: 8px;
}

.player-wrap.active .ready-btn { display: block; }
.ready-btn:hover { background: #7c3aed; }

.flask {
    width: 40px;
    height: 120px;
    border: 3px solid rgba(255,255,255,0.7);
    border-radius: 0 0 20px 20px;
    overflow: hidden; background: rgba(0,0,0,0.5);
    display: flex; align-items: flex-end;
    flex-shrink: 0;
    margin-bottom: 8px;
}

.liquid {
    width: 100%; background: ${liquidColor}; transition: height 0.5s ease;
    box-shadow: 0 0 8px ${liquidColor};
}

.avatar {
    width: ${Math.round(80 * avatarSize / 100)}px; 
    height: ${Math.round(80 * avatarSize / 100)}px; 
    border-radius: 12px;
    object-fit: cover;
    border: 2px solid white;
    background: #2a2a35;
    flex-shrink: 0;
}

.name { 
    color: white; margin-top: 6px; font-weight: bold; background: rgba(0,0,0,0.7); padding: 4px 8px; border-radius: 4px; font-size: 14px;
    white-space: nowrap;
    text-align: center;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
}

.modal-bg {
    display: none; position: absolute; top:0; left:0; width:100%; height:100%;
    background: rgba(0,0,0,0.85); z-index: 10; justify-content: center; align-items: center;
}

.modal {
    background: #121212; border: 3px solid #8b5cf6;
    border-radius: 16px;
    padding: 30px;
    width: 80%;
    max-width: 600px;
    text-align: center;
    box-shadow: 0 0 24px rgba(139, 92, 246, 0.5); color: white;
}

.question { font-size: 22px; margin-bottom: 20px; }

.options { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }

.option-btn {
    background: transparent; color: white; border: 2px solid #374151;
    padding: 14px 20px;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.2s; font-size: 16px;
    min-width: 45%;
    min-height: 50px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    flex-grow: 1;
}

.option-btn:hover { border-color: #8b5cf6; }
.option-btn.selected { background: rgba(139, 92, 246, 0.3); border-color: #8b5cf6; }

.text-input-answer {
    width: 80%; padding: 14px 20px; font-size: 18px; border: 2px solid #374151;
    border-radius: 8px; background: #1a1a2e; color: white; outline: none;
    text-align: center; margin-bottom: 10px;
    font-family: inherit;
}
.text-input-answer:focus { border-color: #8b5cf6; }

.check-btn {
    margin-top: 20px;
    background: #8b5cf6; color: white; border: none;
    padding: 12px 30px;
    font-size: 16px;
    border-radius: 8px;
    cursor: pointer;
}
.check-btn:hover { background: #7c3aed; }

.winner-screen {
    display: none; position: absolute; top:0; left:0; width:100%; height:100%;
    background: rgba(0,0,0,0.9); z-index: 20; flex-direction: column;
    justify-content: center; align-items: center; color: white;
}
.winner-screen h1 { font-size: 48px; color: ${liquidColor}; text-shadow: 0 0 16px ${liquidColor}; margin-bottom: 16px;}
.winner-screen img {
    width: 200px;
    height: 200px;
    border-radius: 16px;
    border: 4px solid ${liquidColor};
    object-fit: cover;
}
.winner-screen h2 { font-size: 28px; margin-top: 16px; }
</style>
</head>
<body>
<div id="gameRoot"> 
    <div class="overlay"></div>
    <div class="players-container" id="pc"></div>
    <div class="modal-bg" id="modalBg">
        <div class="modal">
            <div class="question" id="qText"></div>
            <div class="options" id="optsDiv"></div>
            <div id="inputDiv" style="display:none;">
                <input type="text" class="text-input-answer" id="textAnswer" placeholder="${txt.inputPlaceholder}">
            </div>
            <button class="check-btn" id="checkBtn">${txt.check}</button>
        </div>
    </div>
    <div class="winner-screen" id="winnerScreen">
        <h1>${txt.win}</h1>
        <img id="winnerAvatar">
        <h2 id="winnerName"></h2>
    </div>
</div>

<script>
var state = ${JSON.stringify(gameState)};
var currentPlayer = 0;
var scores = [];
var availableTaskIndices = [];
var usedTaskIndices = [];
var selectedOption = null;
var currentTaskRef = null;

for(var i=0;i<state.players.length;i++) scores.push(0);

function shuffleArray(array) {
    for (var i = array.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var temp = array[i]; array[i] = array[j]; array[j] = temp;
    }
}

function resetTasks() {
    availableTaskIndices = [];
    for(var i=0;i<state.tasks.length;i++) availableTaskIndices.push(i);
    shuffleArray(availableTaskIndices);
    usedTaskIndices = [];
}

function init() {
    if(state.players.length === 0 || state.tasks.length === 0) return;
    resetTasks();
    var pc = document.getElementById('pc');
    var html = '';
    for(var i=0;i<state.players.length;i++){
        var p = state.players[i];
        html += '<div class="player-wrap '+(i===0?'active':'')+'" id="p'+i+'">';
        html += '<button class="ready-btn" id="readyBtn'+i+'">'+state.txt.ready+'</button>';
        html += '<div class="flask"><div class="liquid" id="liq'+i+'" style="height:0%"></div></div>';
        html += '<img src="'+p.url+'" class="avatar">';
        html += '<div class="name">'+p.name+'</div>';
        html += '</div>';
    }
    pc.innerHTML = html;

    for(var i=0;i<state.players.length;i++){
        (function(idx){
            document.getElementById('readyBtn'+idx).addEventListener('click', function(e){
                e.preventDefault();
                e.stopPropagation();
                openTask();
            });
        })(i);
    }

    document.getElementById('checkBtn').addEventListener('click', function(e){
        e.preventDefault();
        e.stopPropagation();
        checkAnswer();
    });
}

function openTask() {
    if(state.tasks.length === 0) return;
    if(availableTaskIndices.length === 0) {
        resetTasks();
        if(availableTaskIndices.length === 0) return;
    }
    
    var taskIndex = availableTaskIndices.shift();
    usedTaskIndices.push(taskIndex);
    var task = state.tasks[taskIndex];
    currentTaskRef = task;
    
    document.getElementById('qText').innerText = task.question;
    var optsDiv = document.getElementById('optsDiv');
    var inputDiv = document.getElementById('inputDiv');
    
    if(task.type === 'input') {
        optsDiv.style.display = 'none';
        inputDiv.style.display = 'block';
        document.getElementById('textAnswer').value = '';
        selectedOption = null;
    } else {
        optsDiv.style.display = 'flex';
        inputDiv.style.display = 'none';
        var html = '';
        for(var i=0;i<task.options.length;i++){
            html += '<button class="option-btn" data-idx="'+i+'">'+task.options[i]+'</button>';
        }
        optsDiv.innerHTML = html;
        selectedOption = null;
        
        var btns = optsDiv.querySelectorAll('.option-btn');
        for(var i=0;i<btns.length;i++){
            (function(btn, idx){
                btn.addEventListener('click', function(e){
                    e.preventDefault();
                    e.stopPropagation();
                    selectedOption = idx;
                    var all = optsDiv.querySelectorAll('.option-btn');
                    for(var j=0;j<all.length;j++) all[j].classList.remove('selected');
                    btn.classList.add('selected');
                });
            })(btns[i], parseInt(btns[i].getAttribute('data-idx')));
        }
    }
    
    document.getElementById('modalBg').style.display = 'flex';
}

function checkAnswer() {
    if(!currentTaskRef) return;
    var task = currentTaskRef;
    var correct = false;
    
    if(task.type === 'input') {
        var userAnswer = document.getElementById('textAnswer').value.trim().toLowerCase();
        if(userAnswer === '') return;
        var correctAnswer = (task.correctText || '').trim().toLowerCase();
        correct = (userAnswer === correctAnswer);
    } else {
        if(selectedOption === null) return;
        correct = (selectedOption === task.correctIdx);
    }
    
    if(correct) {
        scores[currentPlayer]++;
        var pcn = (scores[currentPlayer] / state.maxScore) * 100;
        document.getElementById('liq'+currentPlayer).style.height = pcn + '%';
        if(scores[currentPlayer] >= state.maxScore) {
            showWinner();
            return;
        }
    }
    
    document.getElementById('modalBg').style.display = 'none';
    currentTaskRef = null;
    nextTurn();
}

function nextTurn() {
    document.getElementById('p'+currentPlayer).classList.remove('active');
    currentPlayer = (currentPlayer + 1) % state.players.length;
    document.getElementById('p'+currentPlayer).classList.add('active');
}

function showWinner() {
    document.getElementById('modalBg').style.display = 'none';
    document.getElementById('winnerScreen').style.display = 'flex';
    document.getElementById('winnerAvatar').src = state.players[currentPlayer].url;
    document.getElementById('winnerName').innerText = state.players[currentPlayer].name;
}

init();
<\/script>

        function generateCode() {

            const btn = document.getElementById('generateBtn');
            
            navigator.clipboard.writeText(html).then(() => {

                console.log("--- Начало сгенерированного кода ---");
                console.log(html);
